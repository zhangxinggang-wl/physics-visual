            &lt;div&gt;速度: &lt;span id=&quot;vel-display2&quot;&gt;0.00&lt;/span&gt; m/s | 位移: &lt;span id=&quot;x-display2&quot;&gt;0.00&lt;/span&gt; m&lt;/div&gt;

&lt;div id=&quot;canvas-container&quot;&gt;&lt;/div&gt;

&lt;script&gt;
let isPlaying = false;
let time = 0;
const g = 9.8;
let beltLength = 12; // meters
const pixelsPerMeter = 40;

// Physical State
let state = {
    xb: 0,      // belt displacement (m)
    blocks: [
        { x: 0, v: 0, a: 0, x_rel: 0, t0: -1, history: [], active: true, color: [255, 86, 0], m: 1.0, bw: 40, bh: 30 },
        { x: 0, v: 0, a: 0, x_rel: 0, t0: -1, history: [], active: true, color: [155, 89, 182], m: 2.0, bw: 40, bh: 30 }
    ],
    collisionOccurred: false,
    collisionTime: -1
};

// Parameters
let params = {
    vb: 2.0,
    v01: 4.0,
    v02: 0.0,
    m1: 1.0,
    m2: 2.0,
    theta: 0,
    mu: 0.4,
    startPos1: 'left',
    startPos2: 'right',
    beltLen: 12.0,
    radius: 30,
    enableBlock2: true,
    collisionType: 'elastic'
};

function setup() {
    let canvas = createCanvas(windowWidth - 300, windowHeight);
    canvas.parent('canvas-container');
    
    // UI Events
    select('#btn-play').mousePressed(() =&gt; {
        isPlaying = !isPlaying;
        select('#btn-play').html(isPlaying ? '暂停' : '启动');
    });
    
    select('#btn-reset').mousePressed(resetSim);

    select('#enable-block2').changed(function() {
        params.enableBlock2 = this.checked();
        select('#block2-controls').style('display', params.enableBlock2 ? 'block' : 'none');
        select('#display2').style('display', params.enableBlock2 ? 'block' : 'none');
        select('#collision-settings').style('display', params.enableBlock2 ? 'block' : 'none');
        resetSim();
    });

    const sliders = ['vb', 'v01', 'v02', 'theta', 'mu', 'len', 'radius'];
    sliders.forEach(s =&gt; {
        let slider = select(`#${s}-slider`);
        if (slider) {
            slider.input(function() {
                let val = parseFloat(this.value());
                if (s === 'len') {
                    params.beltLen = val;
                    beltLength = val;
                    select('#len-val').html(val.toFixed(1));
                } else if (s === 'radius') {
                    params.radius = val;
                    select('#radius-val').html(val);
                } else {
                    params[s] = val;
                    select(`#${s}-val`).html(s === 'theta' ? val + '&deg;' : val.toFixed(2));
                }
                if (!isPlaying) resetSim();
            });
        }
    });

    selectAll('input[name=&quot;start-pos1&quot;]').forEach(el =&gt; el.changed(() =&gt; { params.startPos1 = el.value(); if (!isPlaying) resetSim(); }));
    selectAll('input[name=&quot;start-pos2&quot;]').forEach(el =&gt; el.changed(() =&gt; { params.startPos2 = el.value(); if (!isPlaying) resetSim(); }));
    selectAll('input[name=&quot;collision-type&quot;]').forEach(el =&gt; el.changed(() =&gt; { params.collisionType = el.value(); if (!isPlaying) resetSim(); }));
    
    select('#m1-input').input(function() { params.m1 = parseFloat(this.value()) || 0.1; if (!isPlaying) resetSim(); });
    select('#m2-input').input(function() { params.m2 = parseFloat(this.value()) || 0.1; if (!isPlaying) resetSim(); });

    select('#active1').changed(function() { state.blocks[0].active = this.checked(); });
    select('#active2').changed(function() { state.blocks[1].active = this.checked(); });

    resetSim();
}

function resetSim() {
    isPlaying = false;
    time = 0;
    state.xb = 0;
    state.collisionOccurred = false;
    state.collisionTime = -1;
    
    const scaleFactor = (params.radius / 30);
    
    state.blocks[0].x = params.startPos1 === 'left' ? 0 : beltLength;
    state.blocks[0].v = params.v01;
    state.blocks[0].a = 0;
    state.blocks[0].x_rel = 0;
    state.blocks[0].t0 = -1;
    state.blocks[0].history = [];
    state.blocks[0].active = select('#active1').checked();
    state.blocks[0].m = params.m1;
    state.blocks[0].bw = 40 * scaleFactor;
    state.blocks[0].bh = 30 * scaleFactor;

    state.blocks[1].x = params.startPos2 === 'left' ? 0 : beltLength;
    state.blocks[1].v = params.v02;
    state.blocks[1].a = 0;
    state.blocks[1].x_rel = 0;
    state.blocks[1].t0 = -1;
    state.blocks[1].history = [];
    state.blocks[1].active = params.enableBlock2 &amp;&amp; select('#active2').checked();
    state.blocks[1].m = params.m2;
    state.blocks[1].bw = 40 * scaleFactor;
    state.blocks[1].bh = 30 * scaleFactor;

    select('#btn-play').html('启动');
}

function updatePhysics() {
    if (!isPlaying) return;

    const dt = 1/60;
    const rad = radians(params.theta);
    const cosT = cos(rad);
    const sinT = sin(rad);

    state.xb += params.vb * dt;
    time += dt;

    // 1. 动力学更新
    state.blocks.forEach((b, idx) =&gt; {
        if (!b.active) return;
        if (b.x &gt; beltLength || b.x &lt; 0) return;

        let gravity_comp = -g * sinT; 
        let friction_max = params.mu * g * cosT;
        let v_rel = b.v - params.vb;
        let a = 0;

        if (abs(v_rel) &gt; 0.01) {
            let f_dir = v_rel &gt; 0 ? -1 : 1;
            a = gravity_comp + f_dir * friction_max;
        } else {
            if (abs(gravity_comp) &lt;= friction_max) {
                a = 0;
                b.v = params.vb;
            } else {
                let f_dir = gravity_comp &gt; 0 ? -1 : 1;
                a = gravity_comp - f_dir * friction_max;
            }
        }

        b.a = a;
        b.v += a * dt;
        
        let next_v_rel = b.v - params.vb;
        if (Math.sign(v_rel) !== Math.sign(next_v_rel) &amp;&amp; abs(v_rel) &gt; 0.01) {
            if (abs(gravity_comp) &lt;= friction_max) b.v = params.vb;
            if (b.t0 === -1) b.t0 = time;
        }

        b.x += b.v * dt;
        b.x_rel += abs(b.v - params.vb) * dt;

        if (frameCount % 2 === 0) {
            b.history.push({t: time, v: b.v, x: b.x});
            if (b.history.length &gt; 1000) b.history.shift();
        }
    });

    // 2. 碰撞检测与处理
    if (params.enableBlock2 &amp;&amp; state.blocks[0].active &amp;&amp; state.blocks[1].active) {
        let b1 = state.blocks[0];
        let b2 = state.blocks[1];
        let dist_m = abs(b1.x - b2.x);
        let min_dist = (b1.bw + b2.bw) / (2 * pixelsPerMeter);

        if (dist_m &lt; min_dist) {
            // 发生碰撞
            handleCollision(b1, b2);
            
            // 防止重叠：根据位置微调
            let overlap = min_dist - dist_m;
            if (b1.x &lt; b2.x) {
                b1.x -= overlap/2;
                b2.x += overlap/2;
            } else {
                b1.x += overlap/2;
                b2.x -= overlap/2;
            }
            state.collisionOccurred = true;
            state.collisionTime = time;
        }
    }

    // Update UI
    select('#vel-display1').html(state.blocks[0].v.toFixed(2));
    select('#x-display1').html(state.blocks[0].x.toFixed(2));
    if (params.enableBlock2) {
        select('#vel-display2').html(state.blocks[1].v.toFixed(2));
        select('#x-display2').html(state.blocks[1].x.toFixed(2));
    }
}

function handleCollision(b1, b2) {
    let m1 = b1.m;
    let m2 = b2.m;
    let v1 = b1.v;
    let v2 = b2.v;

    if (params.collisionType === 'elastic') {
        // 弹性碰撞公式
        b1.v = ((m1 - m2) * v1 + 2 * m2 * v2) / (m1 + m2);
        b2.v = ((m2 - m1) * v2 + 2 * m1 * v1) / (m1 + m2);
    } else {
        // 完全非弹性碰撞
        let v_final = (m1 * v1 + m2 * v2) / (m1 + m2);
        b1.v = v_final;
        b2.v = v_final;
    }
}

function draw() {
    background(245, 248, 250);
    updatePhysics();

    push();
    translate(width/2, height * 0.75);
    rotate(radians(-params.theta));
    drawBeltSystem();
    pop();

    drawGraphs();
    // drawCollisionInfo();
}

function drawBeltSystem() {
    const w = beltLength * pixelsPerMeter;
    const r = params.radius;

    // Rollers &amp; Belt
    stroke(100); strokeWeight(2); fill(200);
    ellipse(-w/2, r, r*2); ellipse(w/2, r, r*2);
    let angle = state.xb / (r / pixelsPerMeter);
    [ -w/2, w/2 ].forEach(x =&gt; {
        push(); translate(x, r); rotate(angle);
        line(-r, 0, r, 0); line(0, -r, 0, r);
        line(r*cos(PI/3), r*sin(PI/3), -r*cos(PI/3), -r*sin(PI/3));
        line(r*cos(2*PI/3), r*sin(2*PI/3), -r*cos(2*PI/3), -r*sin(2*PI/3));
        pop();
    });
    stroke(50); strokeWeight(4);
    line(-w/2, 0, w/2, 0); line(-w/2, r*2, w/2, r*2);

    // Blocks
    state.blocks.forEach((b, idx) =&gt; {
        if (idx === 1 &amp;&amp; !params.enableBlock2) return;
        if (!b.active) return;
        
        let bx = b.x * pixelsPerMeter - w/2;
        let bw = b.bw, bh = b.bh;

        // Block Body
        fill(b.color); noStroke();
        rect(bx - bw/2, -bh, bw, bh);
        
        // Label
        fill(255); textAlign(CENTER, CENTER); textSize(12);
        text('m'+(idx+1), bx, -bh/2);
        
        // M point
        let startPos = idx === 0 ? params.startPos1 : params.startPos2;
        let mx = startPos === 'left' ? bx - bw/2 : bx + bw/2;
        fill(50); ellipse(mx, 0, 6);
        fill(0); textAlign(CENTER); text('M'+(idx+1), mx, 15);

        // P point (belt point)
        let px = ((startPos === 'left' ? 0 : beltLength) + state.xb) * pixelsPerMeter - w/2;
        fill(0, 0, 255); ellipse(px, 0, 4);
        text('P'+(idx+1), px, 15);

        if (select('#show-scratch').checked()) {
            stroke(34, 197, 94, 150); strokeWeight(4);
            line(px, 0, mx, 0);
        }

        // 绘制位移标记箭头 (x物 和 x皮)
        let ox = (startPos === 'left' ? 0 : beltLength) * pixelsPerMeter - w/2;
        drawDashedArrow(ox, -bh - 20 - idx*20, mx, -bh - 20 - idx*20, b.color, 'x物'+(idx+1));
        drawDashedArrow(ox, -bh - 40 - idx*20, px, -bh - 40 - idx*20, [0,0,255], 'x皮'+(idx+1));
    });
}

function drawDashedArrow(x1, y1, x2, y2, col, label) {
    if (abs(x1 - x2) &lt; 2) return;
    stroke(col);
    strokeWeight(1);
    let d = dist(x1, y1, x2, y2);
    let steps = d / 5;
    for (let i = 0; i &lt; steps; i++) {
        if (i % 2 === 0) {
            let startX = lerp(x1, x2, i / steps);
            let startY = lerp(y1, y2, i / steps);
            let endX = lerp(x1, x2, (i + 1) / steps);
            let endY = lerp(y1, y2, (i + 1) / steps);
            line(startX, startY, endX, endY);
        }
    }
    line(x1, y1 - 5, x1, y1 + 5);
    line(x2, y1 - 5, x2, y1 + 5);
    push();
    translate(x2, y1);
    rotate(x2 &gt; x1 ? 0 : PI);
    fill(col);
    noStroke();
    triangle(0, 0, -8, -3, -8, 3);
    pop();
    textAlign(CENTER);
    noStroke();
    fill(col);
    text(label, (x1 + x2) / 2, y1 - 5);
}

function drawGraphs() {
    const gw = 300, gh = 150;
    const margin = 40;
    const startX = 20;
    const rightX = width - gw - 20;
    
    if (select('#show-vt').checked()) {
        drawGraphBox(startX, margin, gw, gh, &quot;v-t 图像&quot;, &quot;t (s)&quot;, &quot;v&quot;, -12, 12);
        drawSingleGraphLine(startX, margin, gw, gh, state.blocks[0].history.map(h =&gt; ({t:h.t, v:params.vb})), -12, 12, [0,0,255, 100], 'v皮');
        state.blocks.forEach((b, i) =&gt; {
            if (i === 1 &amp;&amp; !params.enableBlock2) return;
            drawSingleGraphLine(startX, margin, gw, gh, b.history, -12, 12, b.color, 'v'+(i+1));
            
            // 在 v-t 图像中标记 t0
            if (select('#show-t0').checked() &amp;&amp; b.t0 !== -1) {
                const maxT = max(5, time);
                let tx = map(b.t0, 0, maxT, startX, startX + gw);
                if (tx &gt; startX &amp;&amp; tx &lt; startX + gw) {
                    stroke(b.color); drawingContext.setLineDash([5, 5]);
                    line(tx, margin, tx, margin + gh);
                    drawingContext.setLineDash([]);
                    noStroke(); fill(b.color); textSize(10); textAlign(CENTER);
                    text('t₀'+(i+1), tx, margin + gh + 12);
                }
            }
        });
    }

    if (select('#show-xt').checked()) {
        drawGraphBox(rightX, margin, gw, gh, &quot;x-t 图像&quot;, &quot;t (s)&quot;, &quot;x&quot;, 0, beltLength, true);
        state.blocks.forEach((b, i) =&gt; {
            if (i === 1 &amp;&amp; !params.enableBlock2) return;
            drawSingleGraphLine(rightX, margin, gw, gh, b.history.map(h =&gt; ({t:h.t, v:h.x})), 0, beltLength, b.color, 'x'+(i+1));
        });
    }
}

function drawSingleGraphLine(x, y, w, h, data, minVal, maxVal, col, label) {
    if (data.length &lt; 2) return;
    const maxT = max(5, time);
    noFill(); stroke(col); beginShape();
    data.forEach(d =&gt; {
        let px = map(d.t, 0, maxT, x, x + w);
        let py = map(d.v, minVal, maxVal, y + h, y);
        vertex(px, py);
    });
    endShape();
    let last = data[data.length-1];
    fill(col); noStroke(); textAlign(LEFT);
    text(label, map(last.t, 0, maxT, x, x + w) + 5, map(last.v, minVal, maxVal, y + h, y));
}

function drawGraphBox(x, y, w, h, title, xl, yl, minVal, maxVal, isXT = false) {
    fill(255, 255, 255, 230); stroke(200); rect(x, y, w, h);
    fill(50); noStroke(); textSize(14); textAlign(CENTER); text(title, x + w/2, y - 10);
    
    // Axes
    stroke(50); line(x, y + h, x, y); // Y
    let zeroY = map(0, minVal, maxVal, y + h, y);
    line(x, zeroY, x + w, zeroY); // X
    
    if (state.collisionOccurred) {
        const maxT = max(5, time);
        let cx = map(state.collisionTime, 0, maxT, x, x + w);
        if (cx &gt; x &amp;&amp; cx &lt; x + w) {
            stroke(255, 0, 0, 100); line(cx, y, cx, y + h);
            fill(255, 0, 0); textSize(10); text('碰撞', cx, y + 10);
        }
    }
}

function drawCollisionInfo() {
    if (!params.enableBlock2) return;
    let b1 = state.blocks[0];
    let b2 = state.blocks[1];
    let p_total = b1.m * b1.v + b2.m * b2.v;
    let ek_total = 0.5 * b1.m * b1.v**2 + 0.5 * b2.m * b2.v**2;

    push();
    translate(20, height - 80);
    fill(255, 255, 255, 200); stroke(100); rect(0, 0, 260, 60, 5);
    fill(0); noStroke(); textAlign(LEFT); textSize(12);
    text(`总动量 P = m₁v₁ + m₂v₂ = ${p_total.toFixed(2)} kg&middot;m/s`, 10, 20);
    text(`总动能 Ek = &frac12;m₁v₁&sup2; + &frac12;m₂v₂&sup2; = ${ek_total.toFixed(2)} J`, 10, 40);
    if (state.collisionOccurred) {
        fill(200, 0, 0);
        text(`最近碰撞时刻: ${state.collisionTime.toFixed(2)} s`, 10, 55);
    }
    pop();
}

function windowResized() {
    resizeCanvas(windowWidth - 300, windowHeight);
}
&lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
