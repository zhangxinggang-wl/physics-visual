    &lt;style&gt;
        :root {
            --primary: #2D593E;
            --bg: #F4F3EC;
            --accent: #DC2626;
            --sensor: #175FFF;
        }
        body { background-color: var(--bg); font-family: &quot;PingFang SC&quot;, sans-serif; color: #333; margin: 0; padding: 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; }
        
        /* 实验台布局 */
        .lab-stage { height: 300px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding-bottom: 60px; }
        .table-base { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: #e2e8f0; border-top: 4px solid #cbd5e1; }
        
        /* 轨道与倾角 - 关键修改：transform-origin 改为右侧，即滑轮端固定，计时器端抬高 */
        .track-wrapper { width: 80%; height: 12px; position: relative; transform-origin: right bottom; transition: transform 0.3s ease; z-index: 10; }
        .track { width: 100%; height: 100%; background: linear-gradient(to bottom, #666, #333); border-radius: 6px; position: relative; }
        
        /* 核心器材 */
        .timer { width: 40px; height: 40px; background: #444; position: absolute; left: 20px; bottom: 12px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 8px; }
        .timer::after { content: '打点计时器'; position: absolute; top: -15px; white-space: nowrap; color: #666; }
        
        .cart { 
            width: 80px; height: 40px; background: var(--primary); border-radius: 4px; 
            position: absolute; bottom: 12px; left: 100px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); border: 2px solid #fff;
        }
        .cart-label { color: #FFFF00; font-size: 10px; font-weight: bold; }
        .cart-mass { color: #00FF00; font-size: 12px; font-weight: 900; }
        
        /* 纸带 */
        .paper-tape { position: absolute; height: 4px; background: #eee; border: 1px solid #ddd; left: 60px; bottom: 30px; width: 40px; z-index: 5; }

        /* 创新器材 */
        .force-sensor { width: 30px; height: 20px; background: var(--sensor); border-radius: 3px; position: absolute; right: -32px; top: 10px; color: white; font-size: 8px; display: flex; align-items: center; justify-content: center; }
        .photogate { width: 10px; height: 60px; background: #222; position: absolute; bottom: 12px; border-radius: 2px; }
        .photogate::after { content: ''; position: absolute; top: 10px; left: 4px; width: 2px; height: 2px; background: red; box-shadow: 0 0 5px red; }

        /* 悬挂系统 */
        .pulley { width: 30px; height: 30px; background: #666; border-radius: 50%; border: 3px solid #444; position: absolute; right: -15px; top: 5px; }
        .weight-system { position: absolute; right: -10px; top: 35px; display: flex; flex-direction: column; align-items: center; }
        .sand-bucket { width: 20px; height: 25px; background: #b45309; border-radius: 2px 2px 8px 8px; border: 1px solid #78350f; position: relative; }
        .sand-bucket::after { content: '沙桶'; position: absolute; bottom: -15px; font-size: 10px; color: #92400e; font-weight: bold; }

        /* 交互组件 */
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-insufficient { background: #fee2e2; color: #991b1b; }
        .badge-perfect { background: #dcfce7; color: #166534; }
        .badge-excessive { background: #fef9c3; color: #854d0e; }
        
        .control-btn { background: #FF5600; color: white; padding: 10px 30px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; }
        /* 受力分析图示 */
        .force-analysis { position: absolute; left: 20px; top: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.9); border: 1px solid #ccc; border-radius: 8px; padding: 5px; pointer-events: none; z-index: 100; }
        .vector { position: absolute; transform-origin: 0 0; height: 2px; }
        .vector::after { content: ''; position: absolute; right: -5px; top: -3px; border: 4px solid transparent; }
        .v-mg { background: #ef4444; } .v-mg::after { border-left-color: #ef4444; }
        .v-f { background: #3b82f6; } .v-f::after { border-left-color: #3b82f6; }
        .v-n { background: #10b981; } .v-n::after { border-left-color: #10b981; }
        /* 气垫导轨样式 */
        .air-track { background: linear-gradient(to bottom, #94a3b8, #475569) !important; border-top: 2px solid #f1f5f9 !important; }
        .air-hole { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; bottom: 2px; box-shadow: 0 0 2px #fff; }
        
        /* 拟合线样式 */
        /* 细线样式 */
        .string-line { position: absolute; height: 1px; background: #999; z-index: 4; pointer-events: none; transition: opacity 0.3s; }
        .string-error { background: #ef4444; height: 2px; }

                        &lt;span&gt;沙桶重力 mg (N)&lt;/span&gt;
                        &lt;span id=&quot;val-force&quot; class=&quot;font-bold text-primary&quot;&gt;0.04&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;input type=&quot;range&quot; id=&quot;input-force&quot; min=&quot;0&quot; max=&quot;1.2&quot; step=&quot;0.02&quot; value=&quot;0.04&quot; class=&quot;w-full accent-primary&quot;&gt;
                    &lt;p class=&quot;text-[10px] text-gray-400&quot;&gt;提示：平衡摩擦力时请将此项设为 0&lt;/p&gt;
                &lt;/div&gt;

                &lt;div class=&quot;p-4 bg-blue-50 rounded-xl border border-blue-100&quot;&gt;
                    &lt;h4 class=&quot;text-xs font-bold text-blue-800 mb-1&quot;&gt;实时数据&lt;/h4&gt;
                    &lt;div class=&quot;grid grid-cols-2 gap-2 text-center&quot;&gt;
                        &lt;div&gt;&lt;p class=&quot;text-[10px] text-blue-600&quot;&gt;速度 m/s&lt;/p&gt;&lt;p id=&quot;dash-v&quot; class=&quot;font-mono font-bold&quot;&gt;0.00&lt;/p&gt;&lt;/div&gt;
                        &lt;div&gt;&lt;p class=&quot;text-[10px] text-blue-600&quot;&gt;加速度 m/s&sup2;&lt;/p&gt;&lt;p id=&quot;dash-a&quot; class=&quot;font-mono font-bold text-primary&quot;&gt;0.00&lt;/p&gt;&lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;

                &lt;div id=&quot;analysis-box&quot; class=&quot;p-4 bg-amber-50 rounded-xl border border-amber-100 text-xs leading-relaxed text-amber-800&quot;&gt;
                    &lt;div class=&quot;font-bold mb-2 text-sm border-b border-amber-200 pb-1&quot;&gt;🧪 实验操作要点预警&lt;/div&gt;
                    &lt;div id=&quot;warning-friction&quot; class=&quot;mb-2 p-2 rounded bg-white/50&quot;&gt;
                        &lt;strong&gt;1. 平衡摩擦力：&lt;/strong&gt;&lt;span id=&quot;status-friction&quot;&gt;&lt;span class=&quot;text-red-600 font-bold&quot;&gt;❌ 平衡不足&lt;/span&gt; (Gx &amp;lt; f)&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;div id=&quot;warning-mass&quot; class=&quot;mb-2 p-2 rounded bg-white/50&quot;&gt;
                        &lt;strong&gt;2. 质量关系：&lt;/strong&gt;&lt;span id=&quot;status-mass&quot;&gt;&lt;span class=&quot;text-green-600 font-bold&quot;&gt;✅ 满足 m &amp;lt;&amp;lt; M&lt;/span&gt; (比值:0.02)&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;mt-2 pt-2 border-t border-amber-200&quot;&gt;
                        &lt;strong&gt;💡 理论分析：&lt;/strong&gt;
                        &lt;p id=&quot;analysis-text&quot;&gt;&lt;strong&gt;理论分析：&lt;/strong&gt;当前满足远小于条件，T &asymp; mg。a-1/M 图象斜率近似为沙桶重力 mg，线性度良好。&lt;br&gt;&lt;strong&gt;平衡摩擦力分析：&lt;/strong&gt;平衡不足会导致图象在 F 轴产生正截距。&lt;/p&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/main&gt;

    &lt;script&gt;
        let scene = 'standard';
        let isRunning = false;
        let isConnected = false;
        let isStringParallel = false;
        let animationId = null;
        let M = 0.2, F_set = 0.04, angle = 0, v = 0, x = 100, a = 0;
        const mu = 0.05, g = 9.8;
        let historyData = [];
        let isFitting = false;

        const chartAF = echarts.init(document.getElementById('chart-af'));
        const chartAM = echarts.init(document.getElementById('chart-am'));

        window.toggleConnection = () =&gt; {
            isConnected = !isConnected;
            const btn = document.getElementById('connect-btn');
            if (isConnected) {
                btn.innerText = &quot;断开细绳&quot;;
                btn.className = &quot;px-6 py-2 bg-amber-600 text-white rounded-full text-sm font-bold&quot;;
                isStringParallel = false;
                setTimeout(() =&gt; {
                    if(confirm(&quot;注意：当前细绳与木板不平行（错误示范）。是否调整滑轮高度使细绳与木板平行？&quot;)) {
                        isStringParallel = true;
                        updateStringPosition();
                    }
                }, 500);
            } else {
                btn.innerText = &quot;连接细绳&quot;;
                btn.className = &quot;px-6 py-2 bg-amber-100 text-amber-700 rounded-full text-sm font-bold hover:bg-amber-200&quot;;
                isStringParallel = false;
            }
            updateStringPosition();
        };

        function linearRegression(data) {
            if (data.length &lt; 2) return null;
            let n = data.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (let i = 0; i &lt; n; i++) {
                sumX += data[i][0];
                sumY += data[i][1];
                sumXY += data[i][0] * data[i][1];
                sumX2 += data[i][0] * data[i][0];
            }
            let slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            let intercept = (sumY - slope * sumX) / n;
            return { slope, intercept };
        }

        function updateCharts() {
            if (!chartAF || !chartAM) return;
            
            let afSeries = [{ 
                name: '实验数据',
                data: historyData.map(d =&gt; [d.f, d.a]), 
                type: 'scatter', 
                itemStyle: { color: '#DC2626' } 
            }];
            
            let amSeries = [{ 
                name: '实验数据',
                data: historyData.map(d =&gt; [parseFloat((1/d.m).toFixed(2)), d.a]), 
                type: 'scatter', 
                itemStyle: { color: '#2D593E' } 
            }];

            let afSlopeText = &quot;&quot;;
            let amSlopeText = &quot;&quot;;

            if (isFitting &amp;&amp; historyData.length &gt;= 2) {
                if (scene === 'standard') {
                    let fitData = [];
                    let maxF = Math.max(...historyData.map(d =&gt; d.f), 1.2);
                    for (let f = 0; f &lt;= maxF; f += 0.05) {
                        let m_h = f / g;
                        let a_fit = f / (M + m_h);
                        fitData.push([f, a_fit]);
                    }
                    afSeries.push({
                        name: '实验数据拟合',
                        type: 'line',
                        smooth: true,
                        showSymbol: false,
                        data: fitData,
                        lineStyle: { type: 'dashed', color: '#666', width: 2 }
                    });
                    afSlopeText = ` (理想斜率 1/M &asymp; ${(1/M).toFixed(2)})`;
                } else {
                    let afPoints = historyData.map(d =&gt; [d.f, d.a]);
                    let afFit = linearRegression(afPoints);
                    if (afFit) {
                        let maxF = Math.max(...afPoints.map(p =&gt; p[0]), 0.8) * 1.2;
                        afSeries.push({
                            name: '实验数据拟合',
                            type: 'line',
                            showSymbol: false,
                            data: [[0, afFit.intercept], [maxF, afFit.slope * maxF + afFit.intercept]],
                            lineStyle: { type: 'dashed', color: '#666', width: 2 }
                        });
                        afSlopeText = ` (理想斜率 1/M &asymp; ${(1/M).toFixed(2)})`;
                    }
                }

                if (scene === 'standard') {
                    let amFitData = [];
                    let amPoints = historyData.map(d =&gt; [parseFloat((1/d.m).toFixed(2)), d.a]);
                    let maxInvM = Math.max(...amPoints.map(p =&gt; p[0]), 10) * 1.2;
                    for (let invM = 0; invM &lt;= maxInvM; invM += 0.5) {
                        let currentM = 1 / invM;
                        let m_h = F_set / g;
                        let a_fit = F_set / (currentM + m_h);
                        if (invM &gt; 0) amFitData.push([invM, a_fit]);
                    }
                    amSeries.push({
                        name: '实验数据拟合',
                        type: 'line',
                        smooth: true,
                        showSymbol: false,
                        data: amFitData,
                        lineStyle: { type: 'dashed', color: '#666', width: 2 }
                    });
                    amSlopeText = ` (理想斜率 F &asymp; ${F_set.toFixed(2)})`;
                } else {
                    let amPoints = historyData.map(d =&gt; [parseFloat((1/d.m).toFixed(2)), d.a]);
                    let amFit = linearRegression(amPoints);
                    if (amFit) {
                        let maxInvM = Math.max(...amPoints.map(p =&gt; p[0]), 5) * 1.2;
                        amSeries.push({
                            name: '实验数据拟合',
                            type: 'line',
                            showSymbol: false,
                            data: [[0, amFit.intercept], [maxInvM, amFit.slope * maxInvM + amFit.intercept]],
                            lineStyle: { type: 'dashed', color: '#666', width: 2 }
                        });
                        amSlopeText = ` (理想斜率 F &asymp; ${F_set.toFixed(2)})`;
                    }
                }
            }


            chartAF.setOption({
                title: { text: 'a - F 图象' + afSlopeText, textStyle: { fontSize: 11, color: '#DC2626' } },
                legend: { show: isFitting, bottom: 0 },
                grid: { bottom: '20%', right: '10%' },
                xAxis: { name: 'F (N)', type: 'value', min: 0, nameLocation: 'middle', nameGap: 25 },
                yAxis: { name: 'a (m/s&sup2;)', type: 'value', min: 0 },
                series: afSeries
            });
            chartAM.setOption({
                title: { text: 'a - 1/M 图象' + amSlopeText, textStyle: { fontSize: 11, color: '#2D593E' } },
                legend: { show: isFitting, bottom: 0 },
                grid: { bottom: '20%', right: '10%' },
                xAxis: { name: '1/M (kg⁻&sup1;)', type: 'value', min: 0, nameLocation: 'middle', nameGap: 25 },
                yAxis: { name: 'a (m/s&sup2;)', type: 'value', min: 0 },
                series: amSeries
            });
        }

        window.toggleFitting = () =&gt; {
            if (historyData.length &lt; 2) {
                alert(&quot;请至少采集两组数据后再进行拟合。&quot;);
                return;
            }
            isFitting = !isFitting;
            document.getElementById('fit-btn').innerText = isFitting ? '隐藏拟合曲线' : '实验数据拟合';
            updateCharts();
        };
        updateCharts();

        window.switchScene = (type) =&gt; {
            if (historyData.length &gt; 0) {
                if (!confirm('切换实验模式将清空当前实验数据，是否继续？')) return;
            }
            clearAllData();
            scene = type;
            
            document.getElementById('btn-standard').className = type === 'standard' ? 'px-4 py-2 glass-panel text-sm font-bold border-b-4 border-primary' : 'px-4 py-2 glass-panel text-sm';
            document.getElementById('btn-innovation').className = type === 'innovation' ? 'px-4 py-2 glass-panel text-sm font-bold border-b-4 border-primary' : 'px-4 py-2 glass-panel text-sm';
            
            document.getElementById('innovation-elements').classList.toggle('hidden', type === 'standard');
            document.getElementById('force-sensor').classList.toggle('hidden', type === 'standard');
            document.getElementById('friction-status-container').classList.toggle('hidden', type === 'innovation');
            document.getElementById('angle-control').classList.toggle('hidden', type === 'innovation');
            
            const track = document.querySelector('.track');
            const timer = document.querySelector('.timer');
            const tape = document.getElementById('paper-tape');
            
            if(type === 'innovation') {
                angle = 0;
                track.classList.add('air-track');
                timer.style.display = 'none';
                tape.style.display = 'none';
                document.getElementById('track-wrapper').style.transform = 'rotate(0deg)';
                
                // 更新创新实验预警内容
                document.getElementById('status-friction').innerHTML = &quot;&lt;span class='text-blue-600 font-bold'&gt;ℹ️ 气垫导轨模式&lt;/span&gt; (无需平衡摩擦力)&quot;;
                document.getElementById('status-mass').innerHTML = &quot;&lt;span class='text-blue-600 font-bold'&gt;ℹ️ 力传感器模式&lt;/span&gt; (无需满足 m &lt;&lt; M)&quot;;
                
                document.getElementById('analysis-text').innerHTML = `
                    &lt;strong&gt;创新点：&lt;/strong&gt;气垫导轨利用气垫减小摩擦，力传感器直接测量拉力。&lt;br&gt;
                    &lt;strong&gt;加速度计算：&lt;/strong&gt;a = (v₂&sup2; - v₁&sup2;) / 2s。其中 v = d/&Delta;t (d为遮光条宽度)。&lt;br&gt;
                    &lt;strong&gt;优势：&lt;/strong&gt;由于传感器直接测得拉力 F，实验不再受&ldquo;沙桶质量远小于小车质量&rdquo;条件的限制，a-F 图象在较大拉力下仍保持线性。
                `;
                document.getElementById('warning-friction').style.display = 'block';
                document.getElementById('warning-mass').style.display = 'block';
            } else {
                track.classList.remove('air-track');
                timer.style.display = 'flex';
                tape.style.display = 'block';
                document.getElementById('warning-friction').style.display = 'block';
                document.getElementById('warning-mass').style.display = 'block';
                updateFrictionStatus();
            }
            resetExp();
        };

        window.clearAllData = () =&gt; {
            historyData = [];
            updateCharts();
            resetExp();
        };

        document.getElementById('input-angle').oninput = (e) =&gt; {
            angle = parseFloat(e.target.value);
            document.getElementById('val-angle').innerText = angle.toFixed(1) + '&deg;';
            document.getElementById('track-wrapper').style.transform = `rotate(${angle}deg)`;
            updateFrictionStatus();
        };

        function updateFrictionStatus() {
            const badge = document.getElementById('friction-status');
            const text = document.getElementById('analysis-text');
            const analysisPanel = document.getElementById('force-analysis');
            const statusFriction = document.getElementById('status-friction');
            const statusMass = document.getElementById('status-mass');
            
            if (scene === 'innovation') {
                badge.className = 'status-badge badge-perfect'; badge.innerText = '气垫导轨模式';
                analysisPanel.classList.add('hidden'); // 确保创新实验隐藏受力分析图标
                statusFriction.innerHTML = &quot;&lt;span class='text-blue-600 font-bold'&gt;ℹ️ 气垫导轨模式&lt;/span&gt; (无需平衡摩擦力)&quot;;
                statusMass.innerHTML = &quot;&lt;span class='text-blue-600 font-bold'&gt;ℹ️ 力传感器模式&lt;/span&gt; (无需满足 m &lt;&lt; M)&quot;;
                text.innerHTML = `
                    &lt;strong&gt;创新点：&lt;/strong&gt;气垫导轨利用气垫减小摩擦，力传感器直接测量拉力。&lt;br&gt;
                    &lt;strong&gt;优势：&lt;/strong&gt;由于传感器直接测得拉力 F，实验不再受&ldquo;沙桶质量远小于小车质量&rdquo;条件的限制，a-F 和 a-1/M 图象在较大拉力下仍保持线性。
                `;
                return;
            }

            const targetAngle = Math.atan(mu) * 180 / Math.PI;
            const diff = angle - targetAngle;

            const rad = angle * Math.PI / 180;
            const gx = M * g * Math.sin(rad);
            const f = mu * M * g * Math.cos(rad);

            analysisPanel.classList.remove('hidden');
            const vecGx = document.getElementById('vec-gx');
            const vecF = document.getElementById('vec-f');
            const compareText = document.getElementById('force-compare');
            
            vecGx.style.width = (gx * 100) + 'px';
            vecF.style.width = (f * 100) + 'px';
            
            if (Math.abs(diff) &lt; 0.2) {
                badge.className = 'status-badge badge-perfect'; badge.innerText = '平衡完美';
                statusFriction.innerHTML = &quot;&lt;span class='text-green-600 font-bold'&gt;✅ 平衡完美&lt;/span&gt;&quot;;
                compareText.innerText = &quot;Gx &asymp; f (平衡完美)&quot;;
                compareText.className = &quot;text-[9px] mt-1 text-center font-bold text-green-600&quot;;
            } else if (diff &lt; 0) {
                badge.className = 'status-badge badge-insufficient'; badge.innerText = '平衡不足';
                statusFriction.innerHTML = &quot;&lt;span class='text-red-600 font-bold'&gt;❌ 平衡不足&lt;/span&gt; (Gx &amp;lt; f)&quot;;
                compareText.innerText = &quot;Gx &amp;lt; f (平衡不足)&quot;;
                compareText.className = &quot;text-[9px] mt-1 text-center font-bold text-red-600&quot;;
            } else {
                badge.className = 'status-badge badge-excessive'; badge.innerText = '平衡过度';
                statusFriction.innerHTML = &quot;&lt;span class='text-orange-600 font-bold'&gt;⚠️ 平衡过度&lt;/span&gt; (Gx &amp;gt; f)&quot;;
                compareText.innerText = &quot;Gx &amp;gt; f (平衡过度)&quot;;
                compareText.className = &quot;text-[9px] mt-1 text-center font-bold text-orange-600&quot;;
            }
            
            const m_hang = F_set / g;
            const ratio = m_hang / M;
            if (ratio &gt; 0.1) {
                statusMass.innerHTML = `&lt;span class='text-red-600 font-bold'&gt;❌ 不满足 m &amp;lt;&amp;lt; M&lt;/span&gt; (比值:${ratio.toFixed(2)})`;
                text.innerHTML = `&lt;strong&gt;理论分析：&lt;/strong&gt;由于 T = mg / (1 + m/M)，当 m 不远小于 M 时，拉力 T 显著小于 mg。在 a-1/M 图象中，斜率代表拉力 T。随着 1/M 增大（M 减小），m/M 比值增大，导致 T 减小，因此图象斜率会逐渐减小并向下弯曲。`;
            } else {
                statusMass.innerHTML = `&lt;span class='text-green-600 font-bold'&gt;✅ 满足 m &amp;lt;&amp;lt; M&lt;/span&gt; (比值:${ratio.toFixed(2)})`;
                text.innerHTML = `&lt;strong&gt;理论分析：&lt;/strong&gt;当前满足远小于条件，T &asymp; mg。a-1/M 图象斜率近似为沙桶重力 mg，线性度良好。`;
            }
            
            if (Math.abs(diff) &gt;= 0.2) {
                text.innerHTML += `&lt;br&gt;&lt;strong&gt;平衡摩擦力分析：&lt;/strong&gt;${diff &lt; 0 ? '平衡不足会导致图象在 F 轴产生正截距。' : '平衡过度会导致图象在 a 轴产生正截距。'}`;
            }
        }

        const audioUrls = [
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/icw9LKyA8evFeJWpUvvJB4.mp3&quot;,
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/7m2CJPkbQiwdo5oiPag4f.mp3&quot;,
            &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/384XWoS9XcympgnZCSESt8.mp3&quot;
        ];
        let currentAudioIndex = 0;
        let currentAudio = null;
        function playAudio() {
            if (currentAudio) currentAudio.pause();
            currentAudio = new Audio(audioUrls[currentAudioIndex]);
            currentAudio.play();
            currentAudioIndex = (currentAudioIndex + 1) % audioUrls.length;
        }

        document.getElementById('input-mass').oninput = (e) =&gt; {
            M = parseFloat(e.target.value);
            document.getElementById('val-mass').innerText = M.toFixed(2);
            document.getElementById('cart-mass-display').innerText = M.toFixed(2) + 'kg';
            updateFrictionStatus();
        };

        document.getElementById('input-force').oninput = (e) =&gt; {
            F_set = parseFloat(e.target.value);
            document.getElementById('val-force').innerText = F_set.toFixed(2);
            const container = document.getElementById('weights-container');
            container.innerHTML = '';
            
            const bucket = document.querySelector('.sand-bucket');
            if (F_set === 0) {
                bucket.style.opacity = '0.2';
            } else {
                bucket.style.opacity = '1';
                for(let i=0; i&lt;Math.floor(F_set*10); i++) {
                    const w = document.createElement('div');
                    w.style.width = '18px'; w.style.height = '4px'; w.style.background = '#333'; w.style.marginBottom = '1px';
                    container.appendChild(w);
                }
            }
            updateFrictionStatus();
            updateStringPosition();
        };

        function updateStringPosition() {
            const cart = document.getElementById('cart');
            const pulley = document.querySelector('.pulley');
            const s1 = document.getElementById('string-to-pulley');
            const s2 = document.getElementById('string-to-bucket');
            
            if(!cart || !pulley) return;

            if (!isConnected) {
                s1.style.opacity = '0';
                s2.style.opacity = '0';
                return;
            }
            s1.style.opacity = '1';
            s2.style.opacity = '1';

            const x1 = cart.offsetLeft + cart.offsetWidth;
            const y1 = cart.offsetTop + 10; 
            const x2 = pulley.offsetLeft + 5;
            let y2 = isStringParallel ? y1 : pulley.offsetTop + 5;

            s1.style.left = x1 + 'px';
            s1.style.top = y1 + 'px';
            s1.style.width = (x2 - x1) + 'px';
            s1.style.transform = `rotate(${Math.atan2(y2-y1, x2-x1)}rad)`;
            s1.style.transformOrigin = '0 0';
            s1.className = isStringParallel ? 'string-line' : 'string-line string-error';

            s2.style.left = x2 + 'px';
            s2.style.top = y2 + 'px';
            s2.style.width = '40px';
            s2.style.transform = 'rotate(90deg)';
            s2.style.transformOrigin = '0 0';
        }
        setTimeout(updateStringPosition, 100);

        function step() {
            if(!isRunning) return;
            const rad = angle * Math.PI / 180;
            const gravityComp = M * g * Math.sin(rad);
            const frictionForce = (scene === 'innovation' ? 0.005 : mu) * M * g * Math.cos(rad);
            
            const m_hang = F_set / g;
            let actualF = 0;
            if (isConnected) {
                const cosTheta = isStringParallel ? 1 : 0.95;
                actualF = (scene === 'innovation') ? F_set : (M * m_hang * g * cosTheta) / (M + m_hang);
            }
            
            let netForce = actualF + gravityComp - frictionForce;
            
            if(netForce &lt;= 0 &amp;&amp; v &lt;= 0) {
                netForce = 0; a = 0; v = 0;
            } else {
                a = netForce / M;
            }
            
            v += a * 0.016;
            x += v * 120;
            
            if(x &gt; 550) {
                isRunning = false;
                recordData(F_set);
                document.getElementById('start-btn').disabled = false;
                return;
            }
            
            document.getElementById('cart').style.left = x + 'px';
            document.getElementById('paper-tape').style.width = (x - 60) + 'px';
            updateStringPosition();
            document.getElementById('dash-v').innerText = Math.max(0, v).toFixed(2);
            document.getElementById('dash-a').innerText = a.toFixed(2);
            animationId = requestAnimationFrame(step);
        }

        function startExp() {
            if(isRunning) return;
            isRunning = true;
            document.getElementById('start-btn').disabled = true;
            step();
        }

        function resetExp() {
            isRunning = false;
            cancelAnimationFrame(animationId);
            x = 100; v = 0; a = 0;
            document.getElementById('cart').style.left = '100px';
            document.getElementById('paper-tape').style.width = '40px';
            document.getElementById('dash-v').innerText = '0.00';
            document.getElementById('dash-a').innerText = '0.00';
            document.getElementById('start-btn').disabled = false;
            updateStringPosition();
        }

        function recordData(f_mg) {
            const rad = angle * Math.PI / 180;
            const m_h = f_mg / g;
            let preciseA;
            
            if (scene === 'innovation') {
                // 创新实验：a = F / M，F 是传感器直接测得的力
                // 考虑气垫导轨极微小的残余阻力 f_residual &asymp; 0.005N
                const f_residual = 0.005;
                preciseA = Math.max(0, (f_mg - f_residual) / M);
            } else {
                // 传统实验：a = (mg + Mg sin&theta; - &mu;Mg cos&theta;) / (M + m)
                const netFrictionEffect = M * g * Math.sin(rad) - mu * M * g * Math.cos(rad);
                preciseA = Math.max(0, (f_mg + netFrictionEffect) / (M + m_h));
            }
            
            historyData.push({ 
                f: parseFloat(f_mg.toFixed(3)), 
                m: M, 
                a: parseFloat(preciseA.toFixed(3)) 
            });
            updateCharts();
        }

        updateFrictionStatus();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
