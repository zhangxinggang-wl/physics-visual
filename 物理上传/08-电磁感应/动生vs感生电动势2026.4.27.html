<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动生电动势 vs 感生电动势 - 交互式演示</title>
    <style>
        :root {
            --bg: #f7f4ed;
            --panel-bg: #ffffff;
            --text: #2c3e50;
            --text-secondary: #5a6c7d;
            --accent: #4a90d9;
            --accent2: #e8875b;
            --border: #dde4ea;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.10);
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: linear-gradient(160deg, #f0ece3 0%, #e8e4da 30%, #f5f1e9 60%, #ece7dd 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 20px 24px 18px;
            max-width: 820px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .title .icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffe0c0, #ffc890);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: var(--transition);
        }
        .badge-inductive {
            background: #e8f4fd;
            color: #2d7fc1;
            border: 1.5px solid #c5dff5;
        }
        .badge-motional {
            background: #fef3ed;
            color: #c96a3a;
            border: 1.5px solid #f8d8c5;
        }

        .canvas-wrapper {
            position: relative;
            background: #fdfcf9;
            border-radius: var(--radius);
            border: 1.5px solid var(--border);
            overflow: hidden;
            cursor: default;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.03);
            aspect-ratio: 1.5 / 1;
            min-height: 380px;
        }
        .canvas-wrapper.dragging {
            cursor: grabbing;
        }
        .canvas-wrapper.magnet-hover {
            cursor: grab;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 9px 16px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.01em;
        }
        .btn:hover {
            background: #f5f7fa;
            border-color: #c0c8d2;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
        }
        .btn:active {
            transform: scale(0.97);
            transition: 0.12s ease;
        }
        .btn.active {
            background: #eef4fb;
            border-color: #a0c4e8;
            color: #2d6faf;
            font-weight: 600;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.10);
        }
        .btn.accent {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
            font-weight: 600;
        }
        .btn.accent:hover {
            background: #3d7ec0;
            border-color: #3d7ec0;
        }
        .btn.accent.active {
            background: #e8875b;
            border-color: #e8875b;
            box-shadow: 0 0 0 3px rgba(232, 135, 91, 0.15);
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .speed-slider {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .speed-slider input[type="range"] {
            width: 80px;
            accent-color: #4a90d9;
            height: 6px;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .info-card {
            flex: 1;
            min-width: 170px;
            max-width: 240px;
            background: #fafbfc;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
        }
        .info-card.highlight {
            border-color: #f0c060;
            background: #fffdf6;
            box-shadow: 0 0 0 4px rgba(240, 180, 50, 0.08);
        }
        .info-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .info-card .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .info-card .sub {
            font-size: 0.78rem;
            color: #7a8a9a;
            margin-top: 2px;
        }

        .legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .legend .dot.north {
            background: #e74c3c;
        }
        .legend .dot.south {
            background: #3498db;
        }
        .legend .dot.field {
            background: rgba(120, 160, 210, 0.7);
            border: 1px dashed #7a9ec0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px 10px 10px;
                gap: 10px;
                border-radius: 14px;
            }
            .header .title {
                font-size: 1rem;
            }
            .btn {
                padding: 7px 11px;
                font-size: 0.78rem;
                border-radius: 18px;
            }
            .canvas-wrapper {
                aspect-ratio: 1.3 / 1;
                min-height: 280px;
            }
            .info-card {
                min-width: 120px;
                padding: 8px 10px;
            }
            .info-card .value {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="header">
            <span class="title">
                <span class="icon">🧲</span>动生 vs 感生电动势
            </span>
            <span id="badgeEmfType" class="badge badge-inductive">🔬 感生电动势</span>
        </div>

        <!-- 画布 -->
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
        </div>

        <!-- 控制栏 -->
        <div class="controls">
            <button class="btn btn-icon" id="btnPlay" title="播放/暂停自动循环">▶</button>
            <button class="btn btn-icon" id="btnReverse" title="反向运动">↕</button>
            <button class="btn active" id="btnGroundFrame" title="地面参考系">🌍 地面参考系</button>
            <button class="btn" id="btnMagnetFrame" title="磁铁参考系">🧲 磁铁参考系</button>
            <div class="speed-slider">
                <span>慢</span>
                <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="1">
                <span>快</span>
            </div>
            <button class="btn" id="btnToggleFieldLines" title="显示/隐藏磁感线">👁 磁感线</button>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="info-card" id="cardCoil">
                <div class="label">线圈状态</div>
                <div class="value">静止</div>
                <div class="sub">相对地面</div>
            </div>
            <div class="info-card" id="cardMagnet">
                <div class="label">磁铁状态</div>
                <div class="value">运动 ⬇</div>
                <div class="sub">插入线圈中</div>
            </div>
            <div class="info-card highlight" id="cardFlux">
                <div class="label">穿过线圈的磁通量</div>
                <div class="value" id="fluxValue">增大 ↑</div>
                <div class="sub">感应电流阻碍磁通变化</div>
            </div>
            <div class="info-card" id="cardEmf">
                <div class="label">电动势类型</div>
                <div class="value" id="emfTypeValue">感生电动势</div>
                <div class="sub">磁场变化产生</div>
            </div>
        </div>

        <!-- 图例 -->
        <div class="legend">
            <span><span class="dot north"></span> N极（北极）</span>
            <span><span class="dot south"></span> S极（南极）</span>
            <span><span class="dot field"></span> 磁感线</span>
            <span style="color:#e8875b;">⚡ 感应电流方向</span>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');

            // --- DOM元素 ---
            const btnPlay = document.getElementById('btnPlay');
            const btnReverse = document.getElementById('btnReverse');
            const btnGroundFrame = document.getElementById('btnGroundFrame');
            const btnMagnetFrame = document.getElementById('btnMagnetFrame');
            const btnToggleFieldLines = document.getElementById('btnToggleFieldLines');
            const speedSlider = document.getElementById('speedSlider');
            const badgeEmfType = document.getElementById('badgeEmfType');
            const cardCoil = document.getElementById('cardCoil');
            const cardMagnet = document.getElementById('cardMagnet');
            const cardFlux = document.getElementById('cardFlux');
            const cardEmf = document.getElementById('cardEmf');
            const fluxValue = document.getElementById('fluxValue');
            const emfTypeValue = document.getElementById('emfTypeValue');

            // --- 状态变量 ---
            let magnetY = 0; // 磁铁中心Y坐标（在地面参考系中的位置）
            const magnetHeight = 155;
            const magnetWidth = 34;
            const coilCenterY = 0; // 线圈中心Y（在地面参考系中固定）
            const coilHeight = 170;
            const coilWidth = 72;
            let referenceFrame = 'ground'; // 'ground' | 'magnet'
            let isPlaying = true;
            let playDirection = 1; // 1=向下插入, -1=向上拔出
            let speedMultiplier = 1.0;
            let showFieldLines = true;
            let isDragging = false;
            let dragStartY = 0;
            let dragStartMagnetY = 0;
            let isHoveringMagnet = false;
            let transitionProgress = 1.0; // 参考系切换过渡进度
            let prevFrame = 'ground';

            // --- 粒子系统 ---
            let particles = [];
            const MAX_PARTICLES = 60;

            // --- Canvas尺寸管理 ---
            let W, H;
            let dpr;

            function resizeCanvas() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                const rect = wrapper.getBoundingClientRect();
                W = rect.width;
                H = rect.height;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            // --- 坐标计算 ---
            function getCoilCenterY() {
                return H * 0.52;
            }

            function getMagnetRestY() {
                // 磁铁初始在 coil 上方
                return getCoilCenterY() - coilHeight * 0.5 - magnetHeight * 0.5 - 30;
            }

            function getMagnetRange() {
                const top = getCoilCenterY() - coilHeight * 0.5 - magnetHeight * 0.5 - 10;
                const bottom = getCoilCenterY() + coilHeight * 0.5 + magnetHeight * 0.5 + 10;
                return { top, bottom, range: bottom - top };
            }

            function getViewOffset() {
                // 在地面参考系中偏移为0，在磁铁参考系中偏移使磁铁保持静止
                if (referenceFrame === 'ground') return 0;
                const restY = getMagnetRestY();
                return -(magnetY - restY);
            }

            function getEffectiveViewOffset() {
                const targetOffset = getViewOffset();
                const t = easeInOutCubic(transitionProgress);
                if (prevFrame === 'ground' && referenceFrame === 'magnet') {
                    return targetOffset * t;
                } else if (prevFrame === 'magnet' && referenceFrame === 'ground') {
                    return targetOffset * (1 - t);
                }
                return targetOffset;
            }

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            // --- 初始化 ---
            function init() {
                resizeCanvas();
                const coilCY = getCoilCenterY();
                magnetY = coilCY - coilHeight * 0.5 - magnetHeight * 0.5 - 25;
                particles = [];
                transitionProgress = 1.0;
                prevFrame = referenceFrame;
            }

            // --- 磁通量计算 ---
            function getFluxThroughCoil() {
                const viewOff = getEffectiveViewOffset();
                const coilCY = getCoilCenterY() + viewOff;
                const magCY = magnetY + viewOff;
                const coilTop = coilCY - coilHeight / 2;
                const coilBot = coilCY + coilHeight / 2;
                const magTop = magCY - magnetHeight / 2;
                const magBot = magCY + magnetHeight / 2;

                // 磁铁N极在上，S极在下
                // 磁感线从N出发到S，在外部从N到S，在内部从S到N
                // 简化：计算磁铁与线圈的重叠程度来估算磁通量
                // 线圈内部磁场方向向下（从N到S，在磁铁外部）
                // 当N极插入线圈时，向下的磁通量增大

                let flux = 0;
                // 磁铁在线圈内部的部分贡献磁通
                const overlapTop = Math.max(coilTop, magTop);
                const overlapBot = Math.min(coilBot, magBot);
                if (overlapBot > overlapTop) {
                    const overlapFrac = (overlapBot - overlapTop) / magnetHeight;
                    flux = overlapFrac * 1.0; // 归一化磁通量
                }
                // 接近效应：磁铁靠近但未插入时也有部分磁通
                const distToCoilCenter = magCY - coilCY;
                const sigma = coilHeight * 0.7;
                const proximityFlux = 0.35 * Math.exp(-(distToCoilCenter * distToCoilCenter) / (2 * sigma * sigma));
                // N极朝下
                const nPoleY = magTop; // N极在顶部
                const sPoleY = magBot; // S极在底部
                const nDistToCoil = nPoleY - coilCY;
                const sDistToCoil = sPoleY - coilCY;
                const nProx = 0.25 * Math.exp(-(nDistToCoil * nDistToCoil) / (2 * sigma * sigma));
                const sProx = -0.25 * Math.exp(-(sDistToCoil * sDistToCoil) / (2 * sigma * sigma));
                flux += proximityFlux + nProx + sProx;
                return Math.max(-0.5, Math.min(1.3, flux));
            }

            function getFluxChangeRate() {
                // 通过磁铁的运动速度来估算磁通量变化率
                const viewOff = getEffectiveViewOffset();
                const relativeVelocity = (referenceFrame === 'ground') ? (isPlaying ? playDirection * speedMultiplier :
                    0) : (isPlaying ? -playDirection * speedMultiplier : 0);
                // 实际使用磁铁在地面参考系中的速度
                const groundVel = isPlaying ? playDirection * speedMultiplier : 0;
                const flux = getFluxThroughCoil();
                // 简化：磁通量变化率与磁铁速度及磁铁相对于线圈的位置有关
                const coilCY = getCoilCenterY();
                const magCY = magnetY;
                const dist = magCY - coilCY;
                const sigma = coilHeight * 0.55;
                const sensitivity = Math.exp(-(dist * dist) / (2 * sigma * sigma));
                return groundVel * sensitivity * 0.8;
            }

            // --- 粒子管理 ---
            function spawnParticles(fluxRate) {
                const viewOff = getEffectiveViewOffset();
                const coilCY = getCoilCenterY() + viewOff;
                const rate = Math.abs(fluxRate);
                const count = Math.floor(rate * 8 + 1);
                for (let i = 0; i < count; i++) {
                    if (particles.length >= MAX_PARTICLES) break;
                    const side = Math.random() < 0.5 ? -1 : 1;
                    const px = W / 2 + side * (coilWidth / 2 + 18 + Math.random() * 25);
                    const py = coilCY - coilHeight / 2 + Math.random() * coilHeight;
                    const angle = side > 0 ? Math.PI / 2 + (Math.random() - 0.5) * 0.8 : -Math.PI / 2 + (Math.random() -
                        0.5) * 0.8;
                    const speed = 0.4 + Math.random() * 1.2;
                    particles.push({
                        x: px,
                        y: py,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: 0.008 + Math.random() * 0.025,
                        size: 1.8 + Math.random() * 3.5,
                        color: fluxRate > 0 ? '255,180,60' : '255,140,80',
                    });
                }
            }

            function updateParticles() {
                const viewOff = getEffectiveViewOffset();
                const coilCY = getCoilCenterY() + viewOff;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    // 粒子围绕线圈区域循环
                    const dx = p.x - W / 2;
                    const dy = p.y - coilCY;
                    const distFromCoilCenter = Math.sqrt(dx * dx + dy * dy);
                    const coilRadius = coilWidth / 2 + 15;
                    if (distFromCoilCenter > coilRadius + 30 || distFromCoilCenter < coilRadius - 8) {
                        p.life -= 0.03;
                    }
                    // 引导粒子沿线圈环形运动
                    const tangentAngle = Math.atan2(dy, dx) + Math.PI / 2;
                    const tangentSpeed = 0.15;
                    p.vx += Math.cos(tangentAngle) * tangentSpeed * 0.04;
                    p.vy += Math.sin(tangentAngle) * tangentSpeed * 0.04;
                    const maxSpeed = 2.5;
                    const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (spd > maxSpeed) {
                        p.vx *= maxSpeed / spd;
                        p.vy *= maxSpeed / spd;
                    }
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            // --- 绘制函数 ---
            function drawBackground(offsetY) {
                // 柔和背景
                ctx.fillStyle = '#fdfcf9';
                ctx.fillRect(0, 0, W, H);

                // 网格线（随参考系移动）
                ctx.strokeStyle = 'rgba(180,190,200,0.18)';
                ctx.lineWidth = 0.8;
                const gridSpacing = 35;
                const startY = (offsetY % gridSpacing + gridSpacing) % gridSpacing;
                for (let y = startY; y < H; y += gridSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }
                for (let x = gridSpacing; x < W; x += gridSpacing) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }

                // 地面参考线
                const groundY = H * 0.88 + offsetY;
                ctx.strokeStyle = 'rgba(140,150,160,0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 4]);
                ctx.beginPath();
                ctx.moveTo(30, groundY);
                ctx.lineTo(W - 30, groundY);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#8a9098';
                ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.fillText('地面参考线', 36, groundY - 8);

                // 固定标记（仅在地面参考系中可见且不移动）
                if (referenceFrame === 'ground' || transitionProgress < 1) {
                    const alpha = referenceFrame === 'ground' ? 1 - transitionProgress * 0.7 : transitionProgress * 0.7;
                    if (alpha > 0.05) {
                        ctx.fillStyle = `rgba(140,150,160,${alpha})`;
                        ctx.beginPath();
                        const fixY = H * 0.88;
                        ctx.arc(50, fixY, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillText('固定参考点', 62, fixY + 4);
                    }
                }
            }

            function drawMagnet(cx, cy, alpha = 1) {
                const hw = magnetWidth / 2;
                const hh = magnetHeight / 2;
                const top = cy - hh;
                const bot = cy + hh;

                ctx.save();
                ctx.globalAlpha = alpha;

                // 阴影
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.beginPath();
                ctx.roundRect(cx - hw + 3, top + 3, magnetWidth, magnetHeight, 6);
                ctx.fill();

                // N极（上半部）- 红色
                const nGrad = ctx.createLinearGradient(cx - hw, top, cx + hw, top);
                nGrad.addColorStop(0, '#d94436');
                nGrad.addColorStop(0.3, '#f05548');
                nGrad.addColorStop(0.5, '#f57065');
                nGrad.addColorStop(0.7, '#f05548');
                nGrad.addColorStop(1, '#c73a2e');
                ctx.fillStyle = nGrad;
                ctx.beginPath();
                ctx.roundRect(cx - hw, top, magnetWidth, magnetHeight / 2, [6, 6, 0, 0]);
                ctx.fill();

                // S极（下半部）- 蓝色
                const sGrad = ctx.createLinearGradient(cx - hw, cy, cx + hw, cy);
                sGrad.addColorStop(0, '#2471b8');
                sGrad.addColorStop(0.3, '#3b8dd4');
                sGrad.addColorStop(0.5, '#5aa0e0');
                sGrad.addColorStop(0.7, '#3b8dd4');
                sGrad.addColorStop(1, '#1d5f9e');
                ctx.fillStyle = sGrad;
                ctx.beginPath();
                ctx.roundRect(cx - hw, cy, magnetWidth, magnetHeight / 2, [0, 0, 6, 6]);
                ctx.fill();

                // 边框
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(cx - hw, top, magnetWidth, magnetHeight, 6);
                ctx.stroke();

                // N/S标记
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px "Segoe UI","PingFang SC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('N', cx, top + magnetHeight * 0.22);
                ctx.fillText('S', cx, cy + magnetHeight * 0.22);

                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.roundRect(cx - hw + 4, top + 4, magnetWidth * 0.35, magnetHeight - 8, 3);
                ctx.fill();

                ctx.restore();
            }

            function drawCoil(cx, cy, alpha = 1) {
                const hw = coilWidth / 2;
                const hh = coilHeight / 2;
                const top = cy - hh;
                const bot = cy + hh;

                ctx.save();
                ctx.globalAlpha = alpha;

                // 螺线管骨架 - 透明管状
                ctx.fillStyle = 'rgba(235,225,210,0.55)';
                ctx.strokeStyle = '#b89578';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.roundRect(cx - hw, top, coilWidth, coilHeight, 8);
                ctx.fill();
                ctx.stroke();

                // 线圈绕线 - 左右两侧锯齿
                const numTurns = 16;
                const turnSpacing = coilHeight / (numTurns + 1);
                ctx.strokeStyle = '#c49a6c';
                ctx.lineWidth = 2.2;
                ctx.lineCap = 'round';
                for (let i = 1; i <= numTurns; i++) {
                    const ty = top + i * turnSpacing;
                    // 左侧绕线
                    ctx.beginPath();
                    ctx.moveTo(cx - hw - 6, ty - turnSpacing * 0.35);
                    ctx.lineTo(cx - hw + 8, ty);
                    ctx.lineTo(cx - hw - 6, ty + turnSpacing * 0.35);
                    ctx.stroke();
                    // 右侧绕线
                    ctx.beginPath();
                    ctx.moveTo(cx + hw + 6, ty - turnSpacing * 0.35);
                    ctx.lineTo(cx + hw - 8, ty);
                    ctx.lineTo(cx + hw + 6, ty + turnSpacing * 0.35);
                    ctx.stroke();
                }

                // 线圈内部高亮
                ctx.fillStyle = 'rgba(255,252,245,0.4)';
                ctx.beginPath();
                ctx.roundRect(cx - hw + 3, top + 3, coilWidth - 6, coilHeight - 6, 5);
                ctx.fill();

                // 导线引出
                ctx.strokeStyle = '#8b6914';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(cx - hw - 8, bot);
                ctx.lineTo(cx - hw - 8, bot + 45);
                ctx.lineTo(cx + hw + 50, bot + 45);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(cx + hw + 8, bot);
                ctx.lineTo(cx + hw + 8, bot + 25);
                ctx.lineTo(cx + hw + 50, bot + 25);
                ctx.stroke();

                // 电流表
                const gx = cx + hw + 52;
                const gy = bot + 35;
                drawGalvanometer(gx, gy);

                ctx.restore();
                return { gx, gy };
            }

            function drawGalvanometer(gx, gy) {
                const radius = 22;
                // 表盘
                ctx.fillStyle = '#fefefe';
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(gx, gy, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 刻度
                ctx.strokeStyle = '#999';
                ctx.lineWidth = 1;
                for (let ang = -0.7; ang <= 0.7; ang += 0.175) {
                    const x1 = gx + Math.cos(Math.PI / 2 + ang) * (radius - 5);
                    const y1 = gy - Math.sin(Math.PI / 2 + ang) * (radius - 5);
                    const x2 = gx + Math.cos(Math.PI / 2 + ang) * (radius - 10);
                    const y2 = gy - Math.sin(Math.PI / 2 + ang) * (radius - 10);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }

                // 指针
                const fluxRate = getFluxChangeRate();
                const pointerAngle = Math.max(-0.65, Math.min(0.65, fluxRate * 1.8));
                ctx.strokeStyle = '#d43';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(gx, gy);
                const px = gx + Math.cos(Math.PI / 2 + pointerAngle) * (radius - 7);
                const py = gy - Math.sin(Math.PI / 2 + pointerAngle) * (radius - 7);
                ctx.lineTo(px, py);
                ctx.stroke();
                // 指针尖端
                ctx.fillStyle = '#d43';
                ctx.beginPath();
                ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // 中心点
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(gx, gy, 3, 0, Math.PI * 2);
                ctx.fill();

                // 标签
                ctx.fillStyle = '#555';
                ctx.font = '9px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('G', gx, gy + radius + 14);
            }

            function drawFieldLines(magCX, magCY, alpha = 1) {
                if (!showFieldLines) return;
                const hw = magnetWidth / 2;
                const hh = magnetHeight / 2;
                const top = magCY - hh;
                const bot = magCY + hh;

                ctx.save();
                ctx.globalAlpha = alpha * 0.65;
                ctx.strokeStyle = 'rgba(110,155,200,0.75)';
                ctx.lineWidth = 1.3;
                ctx.setLineDash([5, 4]);

                // 多组磁感线，从N极出发到S极
                const numLines = 7;
                for (let i = 0; i < numLines; i++) {
                    const t = i / (numLines - 1); // 0到1
                    const startX = magCX - hw * 0.7 + t * magnetWidth * 0.7;
                    const endX = magCX - hw * 0.7 + t * magnetWidth * 0.7;
                    const spread = 35 + t * 55; // 向外扩展程度

                    ctx.beginPath();
                    // 从N极出发
                    ctx.moveTo(startX, top);
                    // 左侧贝塞尔曲线
                    const cp1x = startX - spread;
                    const cp1y = top - 25;
                    const cp2x = endX - spread;
                    const cp2y = bot + 25;
                    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, bot);
                    ctx.stroke();

                    // 右侧对称
                    ctx.beginPath();
                    ctx.moveTo(startX, top);
                    const cp1xr = startX + spread;
                    const cp1yr = top - 25;
                    const cp2xr = endX + spread;
                    const cp2yr = bot + 25;
                    ctx.bezierCurveTo(cp1xr, cp1yr, cp2xr, cp2yr, endX, bot);
                    ctx.stroke();
                }

                // 螺线管内部磁感线（当磁铁靠近时）
                const viewOff = getEffectiveViewOffset();
                const coilCY = getCoilCenterY() + viewOff;
                const coilTop = coilCY - coilHeight / 2;
                const coilBot = coilCY + coilHeight / 2;
                const magTop = magCY - magnetHeight / 2;
                const magBot = magCY + magnetHeight / 2;

                if (magBot > coilTop && magTop < coilBot) {
                    // 磁铁与线圈有重叠，内部磁感线更密
                    ctx.strokeStyle = 'rgba(130,170,215,0.55)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([3, 5]);
                    const innerLines = 5;
                    for (let i = 0; i < innerLines; i++) {
                        const lx = magCX - magnetWidth * 0.35 + i * magnetWidth * 0.7 / (innerLines - 1);
                        const lyTop = Math.max(coilTop, magTop);
                        const lyBot = Math.min(coilBot, magBot);
                        if (lyBot > lyTop) {
                            ctx.beginPath();
                            ctx.moveTo(lx, lyTop);
                            ctx.lineTo(lx, lyBot);
                            ctx.stroke();
                            // 小箭头
                            const arrowY = (lyTop + lyBot) / 2;
                            ctx.fillStyle = 'rgba(130,170,215,0.7)';
                            ctx.beginPath();
                            ctx.moveTo(lx, arrowY + 5);
                            ctx.lineTo(lx - 5, arrowY - 2);
                            ctx.lineTo(lx + 5, arrowY - 2);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }

                ctx.setLineDash([]);
                ctx.restore();
            }

            function drawMotionArrow(cx, cy, direction, alpha = 1) {
                // 运动方向箭头
                const arrowLen = 28;
                const arrowY = cy + direction * arrowLen;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#e8875b';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx, arrowY);
                ctx.stroke();
                // 箭头尖端
                ctx.fillStyle = '#e8875b';
                ctx.beginPath();
                ctx.moveTo(cx, arrowY + direction * 10);
                ctx.lineTo(cx - 8, arrowY);
                ctx.lineTo(cx + 8, arrowY);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function drawCuttingIndicators(coilCX, coilCY, alpha = 1) {
                // 在磁铁参考系中，线圈切割磁感线的视觉标记
                if (referenceFrame !== 'magnet' || !showFieldLines) return;
                if (transitionProgress < 0.5) return;
                const a = (transitionProgress - 0.5) * 2 * alpha;
                if (a < 0.05) return;
                ctx.save();
                ctx.globalAlpha = a;
                const hw = coilWidth / 2;
                const hh = coilHeight / 2;
                const top = coilCY - hh;
                const bot = coilCY + hh;
                // 在线圈上下边缘显示切割火花
                const sparkPositions = [top, bot, top + coilHeight * 0.25, bot - coilHeight * 0.25];
                sparkPositions.forEach((sy, i) => {
                    const sx = coilCX + (i % 2 === 0 ? -hw - 2 : hw + 2);
                    ctx.fillStyle = 'rgba(255,200,50,0.9)';
                    ctx.beginPath();
                    ctx.arc(sx, sy, 3 + Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 小火花
                    for (let j = 0; j < 3; j++) {
                        const sparkX = sx + (Math.random() - 0.5) * 18;
                        const sparkY = sy + (Math.random() - 0.5) * 14;
                        ctx.fillStyle = 'rgba(255,180,30,0.7)';
                        ctx.beginPath();
                        ctx.arc(sparkX, sparkY, 1.2 + Math.random(), 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                ctx.restore();
            }

            function drawInducedFieldRings(coilCX, coilCY, alpha = 1) {
                // 感生电动势的涡旋电场可视化
                if (referenceFrame !== 'ground') return;
                if (transitionProgress < 0.5) return;
                const fluxRate = getFluxChangeRate();
                if (Math.abs(fluxRate) < 0.02) return;
                const a = (transitionProgress - 0.5) * 2 * alpha * Math.abs(fluxRate) * 3;
                if (a < 0.03) return;
                ctx.save();
                ctx.globalAlpha = Math.min(0.7, a);
                ctx.strokeStyle = 'rgba(200,140,60,0.7)';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 5]);
                const ringRadiusX = coilWidth / 2 + 16;
                const ringRadiusY = coilHeight / 2 + 16;
                ctx.beginPath();
                ctx.ellipse(coilCX, coilCY, ringRadiusX, ringRadiusY, 0, 0, Math.PI * 2);
                ctx.stroke();
                // 第二个环
                ctx.strokeStyle = 'rgba(200,140,60,0.45)';
                ctx.beginPath();
                ctx.ellipse(coilCX, coilCY, ringRadiusX + 10, ringRadiusY + 10, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                // 小箭头指示涡旋方向
                const arrowAngle = fluxRate > 0 ? -0.4 : 0.4;
                const ax = coilCX + Math.cos(arrowAngle) * ringRadiusX;
                const ay = coilCY + Math.sin(arrowAngle) * ringRadiusY;
                ctx.fillStyle = 'rgba(200,140,60,0.8)';
                ctx.beginPath();
                ctx.moveTo(ax + Math.cos(arrowAngle + 2.5) * 10, ay + Math.sin(arrowAngle + 2.5) * 10);
                ctx.lineTo(ax, ay);
                ctx.lineTo(ax + Math.cos(arrowAngle - 2.5) * 10, ay + Math.sin(arrowAngle - 2.5) * 10);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function drawCurrentDirection(coilCX, coilCY, alpha = 1) {
                const fluxRate = getFluxChangeRate();
                if (Math.abs(fluxRate) < 0.015) return;
                ctx.save();
                ctx.globalAlpha = Math.min(0.9, alpha * Math.abs(fluxRate) * 2.5);
                const hw = coilWidth / 2;
                const hh = coilHeight / 2;
                const top = coilCY - hh;
                const bot = coilCY + hh;
                // 电流方向箭头（线圈左侧向上或向下）
                const dir = fluxRate > 0 ? -1 : 1; // 楞次定律简化
                const arrowX = coilCX - hw - 16;
                const arrowY = coilCY;
                ctx.fillStyle = '#e8875b';
                ctx.strokeStyle = '#e8875b';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(arrowX, arrowY - dir * 20);
                ctx.lineTo(arrowX, arrowY + dir * 20);
                ctx.stroke();
                // 箭头
                ctx.beginPath();
                ctx.moveTo(arrowX, arrowY + dir * 25);
                ctx.lineTo(arrowX - 7, arrowY + dir * 16);
                ctx.lineTo(arrowX + 7, arrowY + dir * 16);
                ctx.closePath();
                ctx.fill();
                // 标签
                ctx.fillStyle = '#c96a3a';
                ctx.font = 'bold 11px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('感应电流', arrowX - 4, arrowY);
                ctx.restore();
            }

            function drawLabels(magCX, magCY, coilCX, coilCY, viewOff) {
                const fluxRate = getFluxChangeRate();
                const absFluxRate = Math.abs(fluxRate);

                // 线圈标签
                const coilLabelX = coilCX + coilWidth / 2 + 55;
                const coilLabelY = coilCY;
                ctx.fillStyle = '#5a4a3a';
                ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'left';
                const coilStatus = (referenceFrame === 'ground') ? '静止' : '运动';
                ctx.fillText(`线圈(${coilStatus})`, coilLabelX, coilLabelY - 6);
                ctx.fillStyle = '#7a6a5a';
                ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
                if (referenceFrame === 'ground') {
                    ctx.fillText('相对地面静止', coilLabelX, coilLabelY + 12);
                } else {
                    ctx.fillText('切割磁感线', coilLabelX, coilLabelY + 12);
                }

                // 磁铁标签
                const magLabelX = magCX + magnetWidth / 2 + 18;
                const magLabelY = magCY;
                ctx.fillStyle = '#4a3a2a';
                ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'left';
                const magStatus = (referenceFrame === 'ground') ? '运动' : '静止';
                ctx.fillText(`磁铁(${magStatus})`, magLabelX, magLabelY - 6);
                ctx.fillStyle = '#6a5a4a';
                ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
                if (referenceFrame === 'ground') {
                    ctx.fillText('相对地面运动', magLabelX, magLabelY + 12);
                } else {
                    ctx.fillText('相对磁铁静止', magLabelX, magLabelY + 12);
                }

                // 磁通量变化指示
                if (absFluxRate > 0.02) {
                    const fluxLabelX = coilCX;
                    const fluxLabelY = coilCY - coilHeight / 2 - 22;
                    ctx.fillStyle = '#c96a3a';
                    ctx.font = 'bold 12px "PingFang SC","Microsoft YaHei",sans-serif';
                    ctx.textAlign = 'center';
                    const fluxText = fluxRate > 0 ? '磁通量 ↑ 增大' : '磁通量 ↓ 减小';
                    ctx.fillText(fluxText, fluxLabelX, fluxLabelY);
                    ctx.fillText('(感应电流阻碍此变化)', fluxLabelX, fluxLabelY + 16);
                }
            }

            // --- 主渲染 ---
            function render() {
                ctx.clearRect(0, 0, W, H);
                const viewOff = getEffectiveViewOffset();
                const coilCY_eff = getCoilCenterY() + viewOff;
                const coilCX = W / 2;
                const magCY_eff = magnetY + viewOff;
                const magCX = W / 2;

                drawBackground(viewOff);

                // 先画磁感线（在磁铁和线圈下方）
                drawFieldLines(magCX, magCY_eff, 1);

                // 画线圈
                const galvPos = drawCoil(coilCX, coilCY_eff, 1);

                // 画磁铁
                drawMagnet(magCX, magCY_eff, 1);

                // 涡旋电场环（感生电动势）
                drawInducedFieldRings(coilCX, coilCY_eff, 1);

                // 切割标记（动生电动势）
                drawCuttingIndicators(coilCX, coilCY_eff, 1);

                // 电流方向
                drawCurrentDirection(coilCX, coilCY_eff, 1);

                // 运动箭头
                if (isPlaying || isDragging) {
                    const fluxRate = getFluxChangeRate();
                    if (Math.abs(fluxRate) > 0.01) {
                        if (referenceFrame === 'ground') {
                            drawMotionArrow(magCX, magCY_eff - magnetHeight / 2 - 15, playDirection, 0.8);
                        } else {
                            drawMotionArrow(coilCX, coilCY_eff - coilHeight / 2 - 15, -playDirection, 0.8);
                        }
                    }
                }

                // 标签
                drawLabels(magCX, magCY_eff, coilCX, coilCY_eff, viewOff);

                // 粒子
                const fluxRate = getFluxChangeRate();
                if (Math.abs(fluxRate) > 0.015) {
                    spawnParticles(fluxRate);
                }
                updateParticles();
                particles.forEach(p => {
                    ctx.fillStyle = `rgba(${p.color},${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    // 光晕
                    if (p.life > 0.5) {
                        ctx.fillStyle = `rgba(${p.color},${p.life * 0.35})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size + 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                // 参考系指示器
                const indicatorX = W - 90;
                const indicatorY = 25;
                ctx.fillStyle = referenceFrame === 'ground' ? '#e8f4fd' : '#fef3ed';
                ctx.strokeStyle = referenceFrame === 'ground' ? '#a0c4e8' : '#f0c090';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(indicatorX - 55, indicatorY - 16, 130, 32, 20);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = referenceFrame === 'ground' ? '#2d7fc1' : '#c96a3a';
                ctx.font = 'bold 12px "PingFang SC","Microsoft YaHei",sans-serif';
                ctx.textAlign = 'center';
                const refLabel = referenceFrame === 'ground' ? '🌍 地面参考系' : '🧲 磁铁参考系';
                ctx.fillText(refLabel, indicatorX + 10, indicatorY + 5);
            }

            // --- 动画循环 ---
            function update(dt) {
                const effectiveDt = Math.min(dt, 0.05); // 防止大帧跳跃
                const range = getMagnetRange();
                const baseSpeed = 85; // 像素/秒

                if (isPlaying && !isDragging) {
                    magnetY += playDirection * baseSpeed * speedMultiplier * effectiveDt;
                    // 边界检测
                    if (magnetY > range.bottom) {
                        magnetY = range.bottom;
                        playDirection = -1;
                    } else if (magnetY < range.top) {
                        magnetY = range.top;
                        playDirection = 1;
                    }
                }

                // 过渡动画
                if (transitionProgress < 1.0) {
                    transitionProgress += effectiveDt * 3.5;
                    if (transitionProgress >= 1.0) {
                        transitionProgress = 1.0;
                        prevFrame = referenceFrame;
                    }
                }

                // 更新UI信息
                updateInfoPanel();
            }

            function updateInfoPanel() {
                const fluxRate = getFluxChangeRate();
                const absFluxRate = Math.abs(fluxRate);
                const flux = getFluxThroughCoil();

                // 更新badge
                if (referenceFrame === 'ground') {
                    badgeEmfType.textContent = '🔬 感生电动势';
                    badgeEmfType.className = 'badge badge-inductive';
                } else {
                    badgeEmfType.textContent = '⚡ 动生电动势';
                    badgeEmfType.className = 'badge badge-motional';
                }

                // 更新信息卡片
                if (referenceFrame === 'ground') {
                    cardCoil.querySelector('.value').textContent = '静止';
                    cardCoil.querySelector('.sub').textContent = '相对地面静止';
                    cardMagnet.querySelector('.value').textContent = isPlaying ? (playDirection > 0 ? '运动 ⬇' : '运动 ⬆') :
                        '静止';
                    cardMagnet.querySelector('.sub').textContent = isPlaying ? '相对地面运动' : '悬停中';
                } else {
                    cardCoil.querySelector('.value').textContent = isPlaying ? (playDirection > 0 ? '运动 ⬆' : '运动 ⬇') :
                        '静止';
                    cardCoil.querySelector('.sub').textContent = '切割磁感线运动';
                    cardMagnet.querySelector('.value').textContent = '静止';
                    cardMagnet.querySelector('.sub').textContent = '磁场恒定不变';
                }

                if (absFluxRate > 0.015) {
                    fluxValue.textContent = fluxRate > 0 ? '增大 ↑' : '减小 ↓';
                } else {
                    fluxValue.textContent = '基本不变';
                }
                cardFlux.querySelector('.sub').textContent = absFluxRate > 0.015 ? '感应电流阻碍磁通变化' : '无显著感应电流';

                emfTypeValue.textContent = referenceFrame === 'ground' ? '感生电动势' : '动生电动势';
                cardEmf.querySelector('.sub').textContent = referenceFrame === 'ground' ? '磁场变化产生' : '导体切割磁感线产生';

                // 高亮相关卡片
                if (referenceFrame === 'ground') {
                    cardFlux.classList.add('highlight');
                } else {
                    cardFlux.classList.remove('highlight');
                }
            }

            function gameLoop(timestamp) {
                if (!gameLoop.lastTime) gameLoop.lastTime = timestamp;
                const dt = (timestamp - gameLoop.lastTime) / 1000;
                gameLoop.lastTime = timestamp;
                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }
            gameLoop.lastTime = 0;

            // --- 事件处理 ---
            function getCanvasPos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }

            function isOnMagnet(mx, my) {
                const viewOff = getEffectiveViewOffset();
                const magCX = W / 2;
                const magCY = magnetY + viewOff;
                const hw = magnetWidth / 2;
                const hh = magnetHeight / 2;
                return mx > magCX - hw - 6 && mx < magCX + hw + 6 &&
                    my > magCY - hh - 6 && my < magCY + hh + 6;
            }

            canvas.addEventListener('mousedown', (e) => {
                const pos = getCanvasPos(e);
                if (isOnMagnet(pos.x, pos.y)) {
                    isDragging = true;
                    dragStartY = pos.y;
                    dragStartMagnetY = magnetY;
                    wrapper.classList.add('dragging');
                    if (isPlaying) {
                        isPlaying = false;
                        updatePlayButton();
                    }
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const pos = getCanvasPos(e);
                    const deltaY = pos.y - dragStartY;
                    const range = getMagnetRange();
                    magnetY = Math.max(range.top, Math.min(range.bottom, dragStartMagnetY + deltaY));
                } else {
                    const pos = getCanvasPos(e);
                    const hovering = isOnMagnet(pos.x, pos.y);
                    if (hovering !== isHoveringMagnet) {
                        isHoveringMagnet = hovering;
                        if (hovering) {
                            wrapper.classList.add('magnet-hover');
                        } else {
                            wrapper.classList.remove('magnet-hover');
                        }
                    }
                }
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    wrapper.classList.remove('dragging');
                    // 检测是否有速度（简单模拟抛掷）
                    const range = getMagnetRange();
                    magnetY = Math.max(range.top, Math.min(range.bottom, magnetY));
                }
            });

            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const pos = getCanvasPos(touch);
                if (isOnMagnet(pos.x, pos.y)) {
                    isDragging = true;
                    dragStartY = pos.y;
                    dragStartMagnetY = magnetY;
                    wrapper.classList.add('dragging');
                    if (isPlaying) {
                        isPlaying = false;
                        updatePlayButton();
                    }
                    e.preventDefault();
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const touch = e.touches[0];
                    const pos = getCanvasPos(touch);
                    const deltaY = pos.y - dragStartY;
                    const range = getMagnetRange();
                    magnetY = Math.max(range.top, Math.min(range.bottom, dragStartMagnetY + deltaY));
                    e.preventDefault();
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                if (isDragging) {
                    isDragging = false;
                    wrapper.classList.remove('dragging');
                }
            });

            // --- 按钮事件 ---
            function updatePlayButton() {
                btnPlay.textContent = isPlaying ? '⏸' : '▶';
                btnPlay.classList.toggle('active', isPlaying);
            }

            btnPlay.addEventListener('click', () => {
                isPlaying = !isPlaying;
                updatePlayButton();
            });

            btnReverse.addEventListener('click', () => {
                playDirection *= -1;
                if (!isPlaying) {
                    isPlaying = true;
                    updatePlayButton();
                }
            });

            btnGroundFrame.addEventListener('click', () => {
                if (referenceFrame !== 'ground') {
                    prevFrame = referenceFrame;
                    referenceFrame = 'ground';
                    transitionProgress = 0;
                    btnGroundFrame.classList.add('active');
                    btnMagnetFrame.classList.remove('active');
                    updateInfoPanel();
                }
            });

            btnMagnetFrame.addEventListener('click', () => {
                if (referenceFrame !== 'magnet') {
                    prevFrame = referenceFrame;
                    referenceFrame = 'magnet';
                    transitionProgress = 0;
                    btnMagnetFrame.classList.add('active');
                    btnMagnetFrame.classList.add('accent');
                    btnGroundFrame.classList.remove('active');
                    updateInfoPanel();
                }
            });

            btnToggleFieldLines.addEventListener('click', () => {
                showFieldLines = !showFieldLines;
                btnToggleFieldLines.classList.toggle('active', !showFieldLines);
            });

            speedSlider.addEventListener('input', () => {
                speedMultiplier = parseFloat(speedSlider.value);
            });

            // --- 窗口调整 ---
            window.addEventListener('resize', () => {
                resizeCanvas();
                const range = getMagnetRange();
                magnetY = Math.max(range.top, Math.min(range.bottom, magnetY));
            });

            // --- 键盘控制 ---
            window.addEventListener('keydown', (e) => {
                switch (e.key.toLowerCase()) {
                    case ' ':
                        e.preventDefault();
                        isPlaying = !isPlaying;
                        updatePlayButton();
                        break;
                    case 'r':
                        referenceFrame = referenceFrame === 'ground' ? 'magnet' : 'ground';
                        prevFrame = referenceFrame === 'ground' ? 'magnet' : 'ground';
                        transitionProgress = 0;
                        if (referenceFrame === 'ground') {
                            btnGroundFrame.classList.add('active');
                            btnMagnetFrame.classList.remove('active');
                        } else {
                            btnMagnetFrame.classList.add('active');
                            btnMagnetFrame.classList.add('accent');
                            btnGroundFrame.classList.remove('active');
                        }
                        updateInfoPanel();
                        break;
                    case 'f':
                        showFieldLines = !showFieldLines;
                        btnToggleFieldLines.classList.toggle('active', !showFieldLines);
                        break;
                    case 'arrowup':
                        e.preventDefault();
                        playDirection = -1;
                        if (!isPlaying) { isPlaying = true;
                            updatePlayButton(); }
                        break;
                    case 'arrowdown':
                        e.preventDefault();
                        playDirection = 1;
                        if (!isPlaying) { isPlaying = true;
                            updatePlayButton(); }
                        break;
                }
            });

            // --- 初始化 ---
            init();
            updatePlayButton();
            updateInfoPanel();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
