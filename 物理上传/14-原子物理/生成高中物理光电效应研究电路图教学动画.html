    &lt;style&gt;
        :root {
            --primary: #3B82F6;
            --secondary: #1E293B;
            --accent: #F59E0B;
            --background: #0F172A;
            --foreground: #F8FAFC;
            --cathode: #94A3B8;
            --anode: #64748B;
            --photon: #FDE047;
            --electron: #60A5FA;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        #stage-container {
            background: #1e293b;
            border-radius: 1rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #controls {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #94A3B8;
        }

        input[type=&quot;range&quot;] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            outline: none;
        }

        input[type=&quot;range&quot;]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .meter-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: auto;
        }

        .meter {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            border: 1px solid #334155;
        }

        .meter-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: bold;
        }

        .meter-unit {
            font-size: 0.8rem;
            color: #64748B;
        }

        #circuit-svg {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 500px;
            transform: translateY(-20px);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        button {
            padding: 0.6rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        button.secondary {
            background: #475569;
        }

        .formula-box {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            border-left: 4px solid var(--primary);
        }
    &lt;/style&gt;

    &lt;script&gt;
        let voltage = 0;
        let intensity = 50;
        let frequency = 6.0;
        const h = 4.1357e-15;
        const W0 = 2.3;
        let isRunning = false;

        const rangeU = document.getElementById('range-u');
        const rangeI = document.getElementById('range-i');
        const rangeF = document.getElementById('range-f');
        const valU = document.getElementById('val-u');
        const valI = document.getElementById('val-i');
        const valF = document.getElementById('val-f');
        const displayU = document.getElementById('display-u');
        const displayA = document.getElementById('display-a');
        const svgDisplayU = document.getElementById('svg-display-u');
        const svgDisplayA = document.getElementById('svg-display-a');
        const sliderUI = document.getElementById('slider-ui');
        const dynamicWire = document.getElementById('dynamic-wire');
        const photonLayer = document.getElementById('photon-layer');
        const electronLayer = document.getElementById('electron-layer');

        function update() {
            voltage = parseFloat(rangeU.value);
            intensity = parseInt(rangeI.value);
            frequency = parseFloat(rangeF.value);

            valU.innerText = `${voltage.toFixed(1)} V`;
            valI.innerText = `${intensity}%`;
            valF.innerText = frequency.toFixed(1);
            displayU.innerText = voltage.toFixed(2);
            if (svgDisplayU) svgDisplayU.textContent = voltage.toFixed(2);

            const sliderX = (voltage + 10) * 10;
            sliderUI.setAttribute('transform', `translate(${sliderX}, 0)`);
            
            // 更新连接滑片 P 的导线 (起始点坐标随滑片移动)
            // 滑片 P 的基准 x 是 300，加上 sliderX 得到当前 x
            const currentPX = 300 + sliderX;
            dynamicWire.setAttribute('d', `M${currentPX} 350 V300 H550 V222 M550 178 V120 H485`);
            
            // 更新电压表右侧连接点 (电压表并联在滑片 P 和中心点 O 之间)
            const voltmeterWire = document.getElementById('voltmeter-wire-p');
            if (voltmeterWire) {
                voltmeterWire.setAttribute('d', `M322 250 H${currentPX} V300`);
            }

            const Ek = Math.max(0, h * frequency * 1e14 - W0);
            let current = 0;
            if (Ek &gt; 0 || intensity &gt; 0) {
                if (voltage &gt;= -Ek) {
                    const saturationCurrent = intensity * 0.5;
                    current = saturationCurrent * (1 - Math.exp(-(voltage + Ek + 0.5)));
                    if (current &lt; 0) current = 0;
                }
            }
            displayA.innerText = current.toFixed(2);
            if (svgDisplayA) svgDisplayA.textContent = current.toFixed(2);
        }

        function createPhoton() {
            if (!isRunning || intensity === 0) return;
            const photon = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
            photon.setAttribute(&quot;r&quot;, &quot;3&quot;);
            photon.setAttribute(&quot;fill&quot;, &quot;yellow&quot;);
            // 从左上方射入
            photon.setAttribute(&quot;cx&quot;, &quot;250&quot;);
            photon.setAttribute(&quot;cy&quot;, &quot;20&quot;);
            photonLayer.appendChild(photon);

            anime({
                targets: photon,
                cx: 315,
                cy: 120,
                duration: 800,
                easing: 'linear',
                complete: () =&gt; {
                    photon.remove();
                    tryEmitElectron();
                }
            });
        }

        function tryEmitElectron() {
            const Ek = h * frequency * 1e14 - W0;
            if (Ek &lt;= 0) return;

            const electron = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
            electron.setAttribute(&quot;r&quot;, &quot;2&quot;);
            electron.setAttribute(&quot;fill&quot;, &quot;#60A5FA&quot;);
            electron.setAttribute(&quot;cx&quot;, &quot;325&quot;);
            electron.setAttribute(&quot;cy&quot;, 100 + Math.random() * 40);
            electronLayer.appendChild(electron);

            const targetX = 475;
            const duration = 1000 / (1 + voltage * 0.1 + Ek * 0.5);

            anime({
                targets: electron,
                cx: targetX,
                duration: Math.max(200, duration),
                easing: voltage &gt;= 0 ? 'easeInQuad' : 'easeOutQuad',
                update: (anim) =&gt; {
                    if (voltage &lt; -Ek &amp;&amp; anim.progress &gt; 50) {
                        anim.pause();
                        anime({
                            targets: electron,
                            cx: 325,
                            duration: 500,
                            easing: 'easeInQuad',
                            complete: () =&gt; electron.remove()
                        });
                    }
                },
                complete: () =&gt; {
                    if (electron.parentNode) electron.remove();
                }
            });
        }

        function loop() {
            if (isRunning) {
                if (Math.random() &lt; intensity / 100) {
                    createPhoton();
                }
            }
            setTimeout(loop, 100);
        }

        function toggleExperiment() {
            isRunning = !isRunning;
            const btn = document.getElementById('btn-start');
            btn.innerText = isRunning ? &quot;暂停实验&quot; : &quot;继续实验&quot;;
            btn.classList.toggle('secondary', isRunning);
        }

        function resetExperiment() {
            rangeU.value = 0;
            rangeI.value = 50;
            rangeF.value = 6.0;
            isRunning = false;
            const btn = document.getElementById('btn-start');
            btn.innerText = &quot;开始实验&quot;;
            btn.classList.remove('secondary');
            photonLayer.innerHTML = '';
            electronLayer.innerHTML = '';
            update();
        }

        rangeU.addEventListener('input', update);
        rangeI.addEventListener('input', update);
        rangeF.addEventListener('input', update);

        update();
        loop();
    &lt;/script&gt;

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
