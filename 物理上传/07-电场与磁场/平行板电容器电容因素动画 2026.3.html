    &lt;script&gt;
        // 变量定义
        let sSlider, dSlider, eSlider;
        let sVal = 100, dVal = 100, eVal = 0;
        let capacitance = 1.0;
        let voltage = 1.0;
        
        // 物理常量模拟
        const Q = 100; // 电荷量常数
        const K = 2000; // 比例系数
        
        // 视觉参数
        let plateWidth = 20, plateHeight = 200;
        let wireColor;
        
        function setup() {
            const container = document.getElementById('canvas-container');
            const canvas = createCanvas(container.clientWidth, container.clientHeight);
            canvas.parent('canvas-container');
            
            // 初始化 DOM 元素引用
            sSlider = document.getElementById('slider-s');
            dSlider = document.getElementById('slider-d');
            eSlider = document.getElementById('slider-e');
            
            // 绑定事件监听
            sSlider.addEventListener('input', updatePhysics);
            dSlider.addEventListener('input', updatePhysics);
            eSlider.addEventListener('input', updatePhysics);
            
            // 响应窗口大小变化
            window.addEventListener('resize', () =&gt; {
                resizeCanvas(container.clientWidth, container.clientHeight);
            });
            
            wireColor = color(80, 80, 80);
            updatePhysics();
        }

        function updatePhysics() {
            // 获取滑块值
            sVal = parseInt(sSlider.value); // 20 - 100
            dVal = parseInt(dSlider.value); // 50 - 200
            eVal = parseInt(eSlider.value); // 0 - 100 (插入深度)
            
            // 更新显示文本
            document.getElementById('val-s').innerText = sVal + '%';
            document.getElementById('val-d').innerText = (dVal / 100).toFixed(1) + 'd₀';
            document.getElementById('val-e').innerText = eVal &gt; 0 ? '插入' : '空气';
            
            // 物理计算
            // C 正比于 介电常数 乘以 正对面积 除以 板间距离
            // 空气介电常数为1，电介质介电常数为3
            // 有效介电常数随插入深度变化
            // 简化模型：介质插入比例 p = eVal/100
            // 有效介电常数 = 1 * (1-p) + 3 * p = 1 + 2p
            let dielectricConstant = 1 + (eVal / 100) * 2; 
            
            // 相对电容 C/C0
            // C = k * 介电常数 * S / d
            // 基准: S=100, d=100, 介电常数=1 时 C0 = 1
            capacitance = (dielectricConstant * (sVal / 100)) / (dVal / 100);
            
            // 相对电压 U/U0 (Q不变, U 正比于 1/C)
            voltage = 1 / capacitance;
            
            // 更新数值显示
            document.getElementById('display-c').innerText = capacitance.toFixed(2);
            document.getElementById('display-u').innerText = voltage.toFixed(2);
        }

        function draw() {
            background(255);
            
            // 坐标中心化
            translate(width / 2, height / 2);
            
            // 绘制参数
            let centerX = -100; // 电容器中心X
            let centerY = 0;    // 电容器中心Y
            let gap = dVal * 1.5; // 视觉上的板间距放大系数
            let pHeight = 200;
            let pWidth = 15;
            let sOffset = (100 - sVal) / 100 * pHeight; // 正对面积造成的垂直偏移
            
            // 1. 绘制电容器
            drawCapacitor(centerX, centerY, gap, pWidth, pHeight, sOffset);
            
            // 2. 绘制静电计
            drawElectrometer(centerX + 250, centerY, voltage);
            
            // 3. 绘制导线
            drawWires(centerX, centerY, gap, pHeight, sOffset, centerX + 250);
        }

        function drawCapacitor(x, y, gap, w, h, sOffset) {
            push();
            noStroke();
            
            // 左极板 (固定不动，连接静电计外壳/接地)
            fill(148, 163, 184); // Slate-400
            // 模拟金属质感
            drawingContext.shadowColor = 'rgba(0,0,0,0.2)';
            drawingContext.shadowBlur = 10;
            rect(x - gap/2 - w, y - h/2, w, h, 4);
            
            // 极板上的电荷 (+)
            fill(239, 68, 68);
            textSize(16);
            text(&quot;+&quot;, x - gap/2 - w - 15, y - h/2 + 30);
            text(&quot;+&quot;, x - gap/2 - w - 15, y + h/2 - 30);
            text(&quot;+&quot;, x - gap/2 - w - 15, y);

            // 右极板 (可动: 左右d, 上下S)
            // 注意：sOffset 是正对面积减少量，所以右极板向上移动 sOffset
            fill(148, 163, 184);
            rect(x + gap/2, y - h/2 - sOffset, w, h, 4);
            
            // 极板上的电荷 (-)
            fill(59, 130, 246);
            text(&quot;-&quot;, x + gap/2 + w + 5, y - h/2 - sOffset + 30);
            text(&quot;-&quot;, x + gap/2 + w + 5, y + h/2 - sOffset - 30);
            text(&quot;-&quot;, x + gap/2 + w + 5, y - sOffset);

            // 绘制电介质
            if (eVal &gt; 0) {
                let dieW = gap - 4;
                let dieH = h + 40;
                let insertDepth = (eVal / 100) * dieH;
                
                fill(245, 158, 11, 150); // Amber-500 半透明
                noStroke();
                // 从上方插入
                // 介质位置：在两板之间。X中心不变。
                // Y位置：从上方落下。
                // 完全插入时，中心在 y
                // 完全拔出时，底部在 y - h/2 - 20
                let dieY = y - h/2 - 20 - dieH/2 + (eVal/100) * dieH;
                
                // 限制显示区域，只显示在极板中间的部分(可选，这里为了简单直接画)
                // 为了视觉效果，画一个正在插入的板
                rect(x - dieW/2, y - h/2 - sOffset - dieH + (eVal/100)*h, dieW, h);
            }
            
            // 绘制电场线 (示意)
            stroke(200, 200, 200);
            strokeWeight(1);
            drawingContext.setLineDash([5, 5]);
            // 只在正对区域绘制
            let overlapTop = max(y - h/2, y - h/2 - sOffset);
            let overlapBottom = min(y + h/2, y + h/2 - sOffset);
            
            if (overlapBottom &gt; overlapTop) {
                for(let i = overlapTop + 10; i &lt; overlapBottom; i+=20) {
                    line(x - gap/2, i, x + gap/2, i);
                }
            }
            drawingContext.setLineDash([]);
            pop();
        }

        function drawElectrometer(x, y, volt) {
            push();
            translate(x, y + 20);
            
            // 1. 底座 (三脚架)
            stroke(80);
            strokeWeight(4);
            line(0, 100, 0, 140); // 中柱
            strokeWeight(3);
            line(0, 140, -40, 170); // 左脚
            line(0, 140, 40, 170);  // 右脚
            line(0, 140, 0, 170);   // 后脚(视觉上重叠)
            
            // 2. 外壳 (圆形玻璃窗)
            fill(241, 245, 249, 200);
            stroke(100);
            strokeWeight(3);
            ellipse(0, 0, 160, 160);
            
            // 3. 刻度
            stroke(150);
            strokeWeight(1);
            for(let i = -45; i &lt;= 45; i+=15) {
                let rad = radians(i + 90);
                let r1 = 65;
                let r2 = 75;
                line(cos(rad)*r1, sin(rad)*r1, cos(rad)*r2, sin(rad)*r2);
            }

            // 4. 顶部金属球
            fill(150);
            noStroke();
            // 阴影效果
            drawingContext.shadowColor = 'rgba(0,0,0,0.3)';
            drawingContext.shadowBlur = 5;
            ellipse(0, -100, 40, 40);
            drawingContext.shadowBlur = 0;
            
            // 5. 内部结构
            // 竖直固定杆 (连接金属球)
            stroke(80);
            strokeWeight(4);
            line(0, -100, 0, 50);
            
            // 6. 指针 (随电压张开)
            // 限制最大偏转角度
            let maxAngle = 60;
            let angle = map(volt, 0.2, 5.0, 5, maxAngle, true);
            
            push();
            translate(0, -20); // 旋转中心在杆的中上部
            rotate(radians(angle));
            stroke(239, 68, 68); // Red
            strokeWeight(3);
            line(0, 0, 0, 60);
            fill(239, 68, 68);
            noStroke();
            ellipse(0, 60, 6, 6);
            pop();
            
            pop();
            
            // 标签
            fill(100);
            noStroke();
            textAlign(CENTER);
            text(&quot;静电计&quot;, x, y + 200);
        }

        function drawWires(cx, cy, gap, h, sOffset, ex) {
            push();
            stroke(80);
            strokeWeight(2);
            noFill();
            
            // 左极板 -&gt; 静电计外壳 (接地)
            // 从左极板背面引出
            let leftPlateX = cx - gap/2 - 15;
            beginShape();
            vertex(leftPlateX, cy);
            vertex(leftPlateX - 30, cy);
            vertex(leftPlateX - 30, cy + 180);
            vertex(ex - 80, cy + 180);
            vertex(ex - 80, cy + 20); // 连接到外壳侧面
            endShape();
            
            // 接地符号
            line(leftPlateX - 30, cy + 180, leftPlateX - 30, cy + 195);
            line(leftPlateX - 40, cy + 195, leftPlateX - 20, cy + 195);
            line(leftPlateX - 35, cy + 200, leftPlateX - 25, cy + 200);
            line(leftPlateX - 32, cy + 205, leftPlateX - 28, cy + 205);

            // 右极板 -&gt; 静电计顶部金属球
            // 从右极板背面引出
            let rightPlateX = cx + gap/2 + 15;
            let rightPlateY = cy - sOffset;
            
            // 贝塞尔曲线连接，模拟软导线
            let ballX = ex;
            let ballY = cy + 20 - 100; // 金属球位置 (cy + 20 是静电计中心Y偏移, -100 是球相对于中心的偏移)
            
            // 导线
            stroke(80);
            noFill();
            bezier(rightPlateX, rightPlateY, 
                   rightPlateX + 50, rightPlateY, 
                   ballX - 80, ballY - 50, 
                   ballX - 20, ballY);
                   
            // 连接点
            fill(0);
            ellipse(rightPlateX, rightPlateY, 4, 4);
            
            pop();
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
