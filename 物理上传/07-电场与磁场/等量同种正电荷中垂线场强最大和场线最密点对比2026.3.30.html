            &lt;input type=&quot;range&quot; id=&quot;slider-l&quot; min=&quot;150&quot; max=&quot;450&quot; value=&quot;240&quot; class=&quot;w-full mb-4&quot;&gt;

    &lt;script&gt;
        let l = 240;
        let is3D = false;
        let autoRotate = false;
        let showXOY = true;
        let showYOZ = true;
        let rotY = 0;
        let rotX = -0.2;
        let zoom = 1.0; // 连续缩放变量
        
        const K = 800000; 
        
        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight, WEBGL);
            canvas.parent('canvas-container');
            
            // UI 事件绑定
            document.getElementById('slider-l').addEventListener('input', (e) =&gt; {
                l = parseInt(e.target.value);
                updateUI();
            });
            
            document.getElementById('btn-view').addEventListener('click', () =&gt; {
                is3D = !is3D;
                if(!is3D) {
                    rotX = 0;
                    rotY = 0;
                    autoRotate = false;
                } else {
                    rotX = -0.4;
                    rotY = 0.5;
                }
            });

            document.getElementById('toggle-xoy').addEventListener('click', function() {
                showXOY = !showXOY;
                this.classList.toggle('btn-active');
                this.classList.toggle('btn-inactive');
                document.getElementById('legend-xoy').style.opacity = showXOY ? '1' : '0.3';
            });

            document.getElementById('toggle-yoz').addEventListener('click', function() {
                showYOZ = !showYOZ;
                this.classList.toggle('btn-active');
                this.classList.toggle('btn-inactive');
                document.getElementById('legend-yoz').style.opacity = showYOZ ? '1' : '0.3';
            });

            document.getElementById('btn-auto').addEventListener('click', () =&gt; {
                autoRotate = !autoRotate;
                if(autoRotate) is3D = true;
            });
            
            document.getElementById('btn-reset').addEventListener('click', () =&gt; {
                l = 240;
                document.getElementById('slider-l').value = 240;
                is3D = false;
                autoRotate = false;
                showXOY = true;
                showYOZ = true;
                rotX = 0;
                rotY = 0;
                zoom = 1.0;
                
                const btnXOY = document.getElementById('toggle-xoy');
                btnXOY.classList.add('btn-active');
                btnXOY.classList.remove('btn-inactive');
                const btnYOZ = document.getElementById('toggle-yoz');
                btnYOZ.classList.add('btn-active');
                btnYOZ.classList.remove('btn-inactive');
                
                updateUI();
            });

            // 隐藏/显示逻辑
            const titleCard = document.getElementById('title-card');
            const showTitleBtn = document.getElementById('show-title');
            document.getElementById('toggle-title').addEventListener('click', () =&gt; {
                titleCard.classList.add('panel-hidden');
                showTitleBtn.classList.remove('hidden');
            });
            showTitleBtn.addEventListener('click', () =&gt; {
                titleCard.classList.remove('panel-hidden');
                showTitleBtn.classList.add('hidden');
            });

            const infoCard = document.getElementById('info-card');
            const showInfoBtn = document.getElementById('show-info');
            document.getElementById('toggle-info').addEventListener('click', () =&gt; {
                infoCard.classList.add('panel-hidden');
                showInfoBtn.classList.remove('hidden');
            });
            showInfoBtn.addEventListener('click', () =&gt; {
                infoCard.classList.remove('panel-hidden');
                showInfoBtn.classList.add('hidden');
            });
            
            updateUI();
        }

        // 连续缩放处理
        function mouseWheel(event) {
            // 仅在3D模式或需要缩放时处理
            zoom -= event.delta * 0.001;
            zoom = constrain(zoom, 0.3, 3.0);
            // 返回 false 以防止页面滚动
            return false;
        }

        function updateUI() {
            const rA = (Math.sqrt(2) / 4) * l;
            const rB = (Math.sqrt(2) / 2) * l;
            
            document.getElementById('val-l').innerText = l.toFixed(0);
            document.getElementById('val-a').innerText = `y = ${rA.toFixed(1)}`;
            document.getElementById('val-b').innerText = `y = ${rB.toFixed(1)}`;
        }

        function draw() {
            background(15, 23, 42);
            
            if (is3D) {
                // orbitControl(1, 1, 0.1) 允许更平滑的控制，但我们使用自定义 zoom
                orbitControl(1, 1, 0); // 禁用 orbitControl 的内置缩放以使用自定义连续缩放
                if(autoRotate) rotY += 0.01;
                rotateX(rotX);
                rotateY(rotY);
            }
            
            // 应用连续缩放
            scale(zoom);
            
            drawAxes();
            drawPositiveCharges();
            drawFieldLines();
            drawKeyPoints();
            
            if (!is3D) {
                drawEFieldEnvelope();
            }
        }

        function drawAxes() {
            stroke(255, 255, 255, 40);
            strokeWeight(1);
            line(-width/2, 0, 0, width/2, 0, 0);
            line(0, -height/2, 0, 0, height/2, 0);
            if(is3D) {
                line(0, 0, -300, 0, 0, 300);
            }
        }

        function drawPositiveCharges() {
            const a = l / 2;
            noStroke();
            
            [ -a, a ].forEach(xPos =&gt; {
                push();
                translate(xPos, 0, 0);
                fill(239, 68, 68); 
                sphere(14);
                fill(239, 68, 68, 40);
                sphere(24);
                
                push();
                if(is3D) {
                    rotateY(-rotY);
                    rotateX(-rotX);
                }
                fill(255, 255, 0); 
                rectMode(CENTER);
                rect(0, 0, 14, 4);
                rect(0, 0, 4, 14);
                pop();
                
                pop();
            });
        }

        function drawFieldLines() {
            const a = l / 2;
            const numLines = 14;
            
            if (showXOY) {
                stroke(59, 130, 246, 180);
                strokeWeight(1.5);
                noFill();
                for (let i = 0; i &lt; numLines; i++) {
                    let angle = (TWO_PI / numLines) * i;
                    drawPath(-a, 0, 0, angle); 
                    drawPath(a, 0, 0, angle);  
                }
            }
            
            if (showYOZ &amp;&amp; is3D) {
                stroke(192, 132, 252, 150); 
                for (let i = 0; i &lt; numLines; i++) {
                    let angle = (TWO_PI / numLines) * i;
                    drawPath3D(angle);
                }
            }
        }

        function drawArrowHead(x, y, z, vx, vy, vz, col) {
            push();
            translate(x, y, z);
            
            let v = createVector(vx, vy, vz);
            let mag = v.mag();
            if (mag === 0) { pop(); return; }
            
            // Align the local X axis with the vector v
            let axis = createVector(1, 0, 0).cross(v);
            let angle = acos(createVector(1, 0, 0).dot(v) / mag);
            if (axis.mag() &gt; 0) {
                rotate(angle, axis);
            } else if (v.x &lt; 0) {
                rotateY(PI);
            }

            noStroke();
            fill(col);
            
            // Sharp 2D triangle (classic arrowhead style)
            beginShape();
            vertex(8, 0, 0);    // Tip
            vertex(-6, 5, 0);   // Base left
            vertex(-6, -5, 0);  // Base right
            endShape(CLOSE);
            
            // Cross-plane for 3D visibility
            beginShape();
            vertex(8, 0, 0);
            vertex(-6, 0, 5);
            vertex(-6, 0, -5);
            endShape(CLOSE);
            
            pop();
        }

        function drawPath(startX, startY, startZ, angle) {
            let px = startX + cos(angle) * 15;
            let py = startY + sin(angle) * 15;
            let pz = startZ;
            
            let arrowPos = null;
            
            beginShape();
            for (let s = 0; s &lt; 100; s++) {
                vertex(px, py, pz);
                let f = calcField(px, py, pz);
                let m = sqrt(f.x*f.x + f.y*f.y + f.z*f.z);
                
                // Store data for arrowhead at step 35
                if (s === 35) {
                    arrowPos = {x: px, y: py, z: pz, vx: f.x, vy: f.y, vz: f.z};
                }
                
                px += (f.x/m) * 10;
                py += (f.y/m) * 10;
                pz += (f.z/m) * 10;
                if (abs(px) &gt; 600 || abs(py) &gt; 600) break;
            }
            endShape();
            
            if (arrowPos) {
                drawArrowHead(arrowPos.x, arrowPos.y, arrowPos.z, arrowPos.vx, arrowPos.vy, arrowPos.vz, color(59, 130, 246));
            }
        }

        function drawPath3D(angle) {
            let px = 0;
            let py = sin(angle) * 10;
            let pz = cos(angle) * 10;
            
            let arrowPos = null;
            
            beginShape();
            for (let s = 0; s &lt; 60; s++) {
                vertex(px, py, pz);
                let f = calcField(px, py, pz);
                let m = sqrt(f.x*f.x + f.y*f.y + f.z*f.z);
                
                // Store data for arrowhead at step 25
                if (s === 25) {
                    arrowPos = {x: px, y: py, z: pz, vx: f.x, vy: f.y, vz: f.z};
                }
                
                px += (f.x/m) * 12;
                py += (f.y/m) * 12;
                pz += (f.z/m) * 12;
                if (abs(py) &gt; 500 || abs(pz) &gt; 500) break;
            }
            endShape();
            
            if (arrowPos) {
                drawArrowHead(arrowPos.x, arrowPos.y, arrowPos.z, arrowPos.vx, arrowPos.vy, arrowPos.vz, color(192, 132, 252));
            }
        }

        function calcField(x, y, z) {
            const a = l / 2;
            let dx1 = x + a, dy1 = y, dz1 = z;
            let d1_3 = Math.pow(dx1*dx1 + dy1*dy1 + dz1*dz1, 1.5);
            let dx2 = x - a, dy2 = y, dz2 = z;
            let d2_3 = Math.pow(dx2*dx2 + dy2*dy2 + dz2*dz2, 1.5);
            
            return {
                x: K * (dx1/d1_3 + dx2/d2_3),
                y: K * (dy1/d1_3 + dy2/d2_3),
                z: K * (dz1/d1_3 + dz2/d2_3)
            };
        }

        function drawKeyPoints() {
            const rA = (Math.sqrt(2) / 4) * l;
            const rB = (Math.sqrt(2) / 2) * l;
            
            noStroke();
            // A点 (场强最大) - 绿色
            fill(52, 211, 153); 
            [rA, -rA].forEach(y =&gt; {
                push(); 
                translate(0, y, 0); 
                sphere(10); 
                
                // 绘制文字标记 A
                if(is3D) {
                    rotateY(-rotY);
                    rotateX(-rotX);
                }
                fill(255);
                translate(20, 0, 0);
                // 简单的 A 字母模拟 (三条线)
                stroke(255);
                strokeWeight(2);
                line(-5, 5, 0, -10);
                line(5, 5, 0, -10);
                line(-3, 0, 3, 0);
                pop();
            });

            // B点 (电场线最靠近) - 橙色
            fill(251, 146, 60); 
            [rB, -rB].forEach(y =&gt; {
                push(); 
                translate(0, y, 0); 
                sphere(10); 
                
                if(is3D) {
                    rotateY(-rotY);
                    rotateX(-rotX);
                }
                fill(255);
                translate(20, 0, 0);
                // 简单的 B 字母模拟
                stroke(255);
                strokeWeight(2);
                noFill();
                line(-5, -10, -5, 10);
                arc(-5, -5, 10, 10, -HALF_PI, HALF_PI);
                arc(-5, 5, 10, 10, -HALF_PI, HALF_PI);
                pop();
            });
        }

        function drawEFieldEnvelope() {
            const a = l / 2;
            stroke(52, 211, 153, 100);
            strokeWeight(2);
            noFill();
            
            [1, -1].forEach(side =&gt; {
                beginShape();
                for (let y = -400; y &lt;= 400; y += 5) {
                    let r_sq = y*y + a*a;
                    let E = (2 * K * abs(y)) / Math.pow(r_sq, 1.5);
                    let offsetX = side * E * 0.04; 
                    vertex(offsetX, y, 0);
                }
                endShape();
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
