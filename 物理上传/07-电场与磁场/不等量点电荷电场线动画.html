<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 不等量点电荷电场线 (小黄箭头) - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.85);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid #3a506e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 35, 0.95);
            color: white;
            padding: 20px 35px;
            border-radius: 60px;
            backdrop-filter: blur(12px);
            border: 1px solid #4a5b7a;
            display: flex;
            gap: 50px;
            z-index: 20;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            font-size: 16px;
        }
        #controls label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #ccc;
        }
        #controls input {
            width: 260px;
            cursor: pointer;
            accent-color: #ffaa33;
            height: 8px;
            border-radius: 10px;
        }
        .value-badge {
            background: #2a3440;
            padding: 5px 18px;
            border-radius: 30px;
            font-weight: 600;
            margin-left: 10px;
            border: 1px solid #5f7a9a;
        }
        .q1-color { color: #ff8a8a; }
        .q2-color { color: #8ab2ff; }
        #hint {
            position: absolute;
            bottom: 110px;
            right: 25px;
            color: #ddd;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 15;
            backdrop-filter: blur(3px);
            border: 1px solid #556677;
        }
        @media (max-width: 750px) {
            #controls { flex-direction: column; gap: 20px; width: 90%; padding: 20px; border-radius: 30px; }
            #controls input { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="info">
        <span style="color:#ff8a8a;">⬤ 左侧 Q₁ <span style="font-size:20px;">+</span></span> ——  <span style="color:#8ab2ff;">⬤ 右侧 Q₂ <span style="font-size:20px;">−</span></span> | <span style="color:#ffaa00;">黄色小箭头</span>方向 | <span style="color:#66aaff;">蓝色电场线</span>
    </div>
    <div id="controls">
        <label>
            <span style="color:#ffb3b3;">Q₁ (左侧) <span id="q1-val" class="value-badge">+2.5</span></span>
            <input type="range" id="q1-slider" min="0.1" max="5" step="0.1" value="2.5">
        </label>
        <label>
            <span style="color:#b3d9ff;">Q₂ (右侧) <span id="q2-val" class="value-badge">-1.5</span></span>
            <input type="range" id="q2-slider" min="-5" max="-0.1" step="0.1" value="-1.5">
        </label>
    </div>
    <div id="hint">⚡ 正电荷红色<span style="color:red;"> + </span> | 负电荷蓝色<span style="color:blue;"> − </span> | 每条线一个黄色小箭头</div>

    <!-- 引入Three.js核心库和辅助库 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a18);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(9, 4, 13);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 0.5, 0);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 6, 5);
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466aa, 0.6);
        fillLight.position.set(-4, 3, 5);
        scene.add(fillLight);

        // 星空背景
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starPos[i] = (Math.random() - 0.5) * 200;
            starPos[i+1] = (Math.random() - 0.5) * 200;
            starPos[i+2] = (Math.random() - 0.5) * 200;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({color: 0xaaccff, size: 0.2, transparent: true, opacity: 0.7});
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // 辅助网格
        const gridHelper = new THREE.GridHelper(22, 20, 0x336699, 0x224466);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);

        // --- 电荷位置 ---
        const posQ1 = new THREE.Vector3(-3.5, 0, 0);
        const posQ2 = new THREE.Vector3(3.5, 0, 0);

        // 电量初始值
        let Q1 = 2.5;
        let Q2 = -1.5;

        // 组
        let fieldGroup = new THREE.Group();
        scene.add(fieldGroup);
        let chargesGroup = new THREE.Group();
        scene.add(chargesGroup);

        // --- 创建电荷球体（带 + / - 符号）---
        function createCharges() {
            while(chargesGroup.children.length) chargesGroup.remove(chargesGroup.children[0]);

            const radius = 0.8;

            // Q1 球体 (红色，带 + 号)
            const q1Mat = new THREE.MeshStandardMaterial({ 
                color: 0xff4444,
                emissive: 0x330000,
                roughness: 0.3,
                metalness: 0.1
            });
            const q1Sphere = new THREE.Mesh(new THREE.SphereGeometry(radius, 48, 24), q1Mat);
            q1Sphere.position.copy(posQ1);
            chargesGroup.add(q1Sphere);

            // 添加 + 号
            const plusDiv = document.createElement('div');
            plusDiv.textContent = '+';
            plusDiv.style.color = '#ffffff';
            plusDiv.style.fontSize = '48px';
            plusDiv.style.fontWeight = 'bold';
            plusDiv.style.textShadow = '2px 2px 4px rgba(0,0,0,0.8)';
            plusDiv.style.background = 'transparent';
            plusDiv.style.userSelect = 'none';
            const plusLabel = new CSS2DObject(plusDiv);
            plusLabel.position.set(posQ1.x, posQ1.y, posQ1.z + 0.1);
            chargesGroup.add(plusLabel);

            // Q2 球体 (蓝色，带 - 号)
            const q2Mat = new THREE.MeshStandardMaterial({ 
                color: 0x4444ff,
                emissive: 0x000033,
                roughness: 0.3,
                metalness: 0.1
            });
            const q2Sphere = new THREE.Mesh(new THREE.SphereGeometry(radius, 48, 24), q2Mat);
            q2Sphere.position.copy(posQ2);
            chargesGroup.add(q2Sphere);

            const minusDiv = document.createElement('div');
            minusDiv.textContent = '−';
            minusDiv.style.color = '#ffffff';
            minusDiv.style.fontSize = '48px';
            minusDiv.style.fontWeight = 'bold';
            minusDiv.style.textShadow = '2px 2px 4px rgba(0,0,0,0.8)';
            minusDiv.style.background = 'transparent';
            minusDiv.style.userSelect = 'none';
            const minusLabel = new CSS2DObject(minusDiv);
            minusLabel.position.set(posQ2.x, posQ2.y, posQ2.z + 0.1);
            chargesGroup.add(minusLabel);

            // 点光源光晕
            const light1 = new THREE.PointLight(0xff6666, 1.5, 6);
            light1.position.copy(posQ1);
            chargesGroup.add(light1);
            
            const light2 = new THREE.PointLight(0x6666ff, 1.5, 6);
            light2.position.copy(posQ2);
            chargesGroup.add(light2);

            // 数值标签 (放在球体下方)
            const q1ValDiv = document.createElement('div');
            q1ValDiv.textContent = `Q₁ = +${Q1.toFixed(1)}`;
            q1ValDiv.style.color = '#ffb3b3';
            q1ValDiv.style.fontSize = '18px';
            q1ValDiv.style.background = 'rgba(30,20,25,0.8)';
            q1ValDiv.style.padding = '4px 12px';
            q1ValDiv.style.borderRadius = '20px';
            q1ValDiv.style.border = '1px solid #ff8080';
            q1ValDiv.style.backdropFilter = 'blur(4px)';
            const q1ValLabel = new CSS2DObject(q1ValDiv);
            q1ValLabel.position.set(posQ1.x, posQ1.y - 1.2, posQ1.z);
            chargesGroup.add(q1ValLabel);

            const q2ValDiv = document.createElement('div');
            q2ValDiv.textContent = `Q₂ = ${Q2.toFixed(1)}`;
            q2ValDiv.style.color = '#b3d9ff';
            q2ValDiv.style.fontSize = '18px';
            q2ValDiv.style.background = 'rgba(20,25,40,0.8)';
            q2ValDiv.style.padding = '4px 12px';
            q2ValDiv.style.borderRadius = '20px';
            q2ValDiv.style.border = '1px solid #6699ff';
            q2ValDiv.style.backdropFilter = 'blur(4px)';
            const q2ValLabel = new CSS2DObject(q2ValDiv);
            q2ValLabel.position.set(posQ2.x, posQ2.y - 1.2, posQ2.z);
            chargesGroup.add(q2ValLabel);
        }

        // --- 电场线生成 (蓝色线条 + 每条线一个黄色小箭头) ---
        function generateFieldLines() {
            while(fieldGroup.children.length) fieldGroup.remove(fieldGroup.children[0]);

            if (Math.abs(Q1) < 0.01 || Math.abs(Q2) < 0.01) return;

            function electricField(p) {
                const r1 = new THREE.Vector3().subVectors(p, posQ1);
                const r2 = new THREE.Vector3().subVectors(p, posQ2);
                const len1 = Math.max(r1.length(), 0.3);
                const len2 = Math.max(r2.length(), 0.3);
                
                const e = new THREE.Vector3(0, 0, 0);
                e.add(r1.clone().multiplyScalar(Q1 / (len1 * len1 * len1)));
                e.add(r2.clone().multiplyScalar(Q2 / (len2 * len2 * len2)));
                return e;
            }

            // 种子方向 (稀疏分布)
            const seedDirections = [];
            const phiSteps = 8;
            const thetaSteps = 4;
            
            for (let i = 0; i < phiSteps; i++) {
                const phi = (i / phiSteps) * Math.PI * 2;
                for (let j = 1; j <= thetaSteps; j++) {
                    const theta = (j / (thetaSteps + 1)) * Math.PI;
                    const x = Math.sin(theta) * Math.cos(phi);
                    const y = Math.sin(theta) * Math.sin(phi);
                    const z = Math.cos(theta);
                    seedDirections.push(new THREE.Vector3(x, y, z));
                }
            }
            seedDirections.push(
                new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0), 
                new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
                new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)
            );
            
            const seedPoints = [];
            const startDist = 1.2;
            seedDirections.forEach(dir => {
                dir.normalize();
                seedPoints.push(posQ1.clone().add(dir.clone().multiplyScalar(startDist)));
            });

            const maxSteps = 140;
            const stepSize = 0.22;
            const minDistToQ2 = 0.9;
            const minDistToQ1 = 0.9;
            
            seedPoints.forEach((startPt) => {
                let points = [];
                let current = startPt.clone();
                points.push(current.clone());
                
                let steps = 0;
                let reachedNegative = false;
                
                while (steps < maxSteps && !reachedNegative) {
                    const e = electricField(current);
                    const eLen = e.length();
                    if (eLen < 1e-4) break;
                    
                    const dir = e.clone().divideScalar(eLen);
                    const next = current.clone().add(dir.multiplyScalar(stepSize));
                    
                    const distToQ2 = next.distanceTo(posQ2);
                    const distToQ1 = next.distanceTo(posQ1);
                    
                    if (distToQ2 < minDistToQ2) {
                        points.push(posQ2.clone());
                        reachedNegative = true;
                        break;
                    }
                    
                    if (distToQ1 < minDistToQ1 && steps > 10) break;
                    if (next.length() > 25) break;
                    
                    points.push(next.clone());
                    current.copy(next);
                    steps++;
                }
                
                if (points.length < 8) return;
                
                const curve = new THREE.CatmullRomCurve3(points);
                const curvePoints = curve.getPoints(80);
                
                // 蓝色电场线
                const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x66aaff, opacity: 0.7, transparent: true });
                const line = new THREE.Line(lineGeo, lineMat);
                fieldGroup.add(line);
                
                // 每条线一个黄色小箭头 (尺寸缩小)
                const t = 0.55;
                const arrowPos = curve.getPoint(t);
                const tangent = curve.getTangent(t).normalize();
                
                const arrowColor = 0xffaa00; // 黄色
                // 缩小箭头尺寸
                const arrowLength = 0.6;
                const arrowHeadLength = 0.25;
                const arrowHeadWidth = 0.15;
                
                const arrow = new THREE.ArrowHelper(tangent, arrowPos, arrowLength, arrowColor, arrowHeadLength, arrowHeadWidth);
                fieldGroup.add(arrow);
            });
        }

        function updateAll() {
            createCharges();
            generateFieldLines();
            
            document.getElementById('q1-val').innerText = '+' + Q1.toFixed(1);
            document.getElementById('q2-val').innerText = Q2.toFixed(1);
        }

        updateAll();

        // 滑块监听
        const q1Slider = document.getElementById('q1-slider');
        const q2Slider = document.getElementById('q2-slider');
        
        q1Slider.addEventListener('input', (e) => {
            Q1 = parseFloat(e.target.value);
            updateAll();
        });
        
        q2Slider.addEventListener('input', (e) => {
            Q2 = parseFloat(e.target.value);
            updateAll();
        });

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            stars.rotation.y += 0.00015;
            stars.rotation.x += 0.0001;
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
