    &lt;style&gt;
        :root {
            --primary-color: #00f2ff;
            --bg-color: #0a0f1d;
            --panel-bg: rgba(16, 24, 48, 0.85);
            --text-color: #e2e8f0;
            --accent-color: #7000ff;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部标题栏 */
        header {
            padding: 15px 25px;
            background: var(--panel-bg);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        h1 { 
            font-size: 1.4rem; 
            color: var(--primary-color); 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .version-tag { 
            font-size: 0.8rem; 
            background: rgba(0, 242, 255, 0.1); 
            color: var(--primary-color); 
            padding: 4px 12px; 
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        /* 主画布区域 */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        #optics-canvas {
            width: 100%;
            height: 100%;
        }

        /* 控制面板 */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 20px 35px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            display: flex;
            gap: 40px;
            align-items: center;
            z-index: 20;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { 
            font-size: 0.75rem; 
            font-weight: 600; 
            color: #94a3b8; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type=&quot;range&quot;] {
            width: 220px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .btn-toggle {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #0a0f1d;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s var(--spring);
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }
        .btn-toggle:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 255, 0.5);
        }

        /* 信息面板 */
        .info-panel {
            position: absolute;
            top: 100px;
            right: 30px;
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 20;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .info-item { 
            margin-bottom: 18px; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        .info-label { font-size: 0.8rem; color: #94a3b8; }
        .info-value { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace;
        }
        .rule-summary {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 242, 255, 0.05);
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            line-height: 1.6;
            border-left: 3px solid var(--primary-color);
        }

        /* 公式标注 */
        .formula-overlay {
            position: absolute;
            top: 100px;
            left: 30px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* 引导说明 */
        .guide-tip {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 242, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* 扫描线效果 */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.1);
            z-index: 5;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        /* 动画元素 */
        .capybara-obj {
            position: absolute;
            pointer-events: none;
            transform-origin: bottom center;
            transition: transform 0.1s linear;
        }
        /* CSS 绘制蜡烛 */
        .candle-body {
            width: 40%;
            height: 70%;
            background: linear-gradient(to right, #e2e8f0, #cbd5e1);
            border-radius: 2px;
            position: absolute;
            top: 0; /* 顶部对齐容器顶部 */
            left: 30%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .candle-wick {
            width: 2px;
            height: 15%;
            background: #333;
            position: absolute;
            top: -15%;
            left: 50%;
            transform: translateX(-50%);
        }
        .candle-flame {
            width: 16px;
            height: 24px;
            background: #ff9800;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -45%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle at 50% 80%, #fff 0%, #ffeb3b 20%, #ff9800 60%, #f44336 100%);
            box-shadow: 0 0 20px #ff9800;
            animation: flicker 0.1s infinite alternate;
            transform-origin: bottom center;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; }
        }
    &lt;/style&gt;

&lt;header&gt;
    &lt;h1&gt;凸透镜成像规律演示&lt;/h1&gt;
    &lt;div class=&quot;version-tag&quot;&gt;人教版八年级物理&lt;/div&gt;

&lt;main id=&quot;main-container&quot;&gt;
    &lt;div class=&quot;scanline&quot;&gt;&lt;/div&gt;

        1/u + 1/v = 1/f
    &lt;/div&gt;

    &lt;canvas id=&quot;optics-canvas&quot;&gt;&lt;/canvas&gt;

    &lt;!-- 物体：蜡烛 (CSS 绘制) --&gt;
    &lt;div id=&quot;object-capy&quot; class=&quot;capybara-obj&quot;&gt;
        &lt;div class=&quot;candle-body&quot;&gt;
            &lt;div class=&quot;candle-wick&quot;&gt;&lt;/div&gt;

        &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 像：蜡烛 (CSS 绘制) --&gt;
    &lt;div id=&quot;image-capy&quot; class=&quot;capybara-obj&quot;&gt;
        &lt;div class=&quot;candle-body&quot;&gt;
            &lt;div class=&quot;candle-wick&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;candle-flame&quot;&gt;&lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

            &lt;div class=&quot;info-label&quot;&gt;物距 (u)&lt;/div&gt;
            &lt;div class=&quot;info-value&quot;&gt;&lt;span id=&quot;val-u&quot;&gt;0&lt;/span&gt; cm&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;info-item&quot;&gt;
            &lt;div class=&quot;info-label&quot;&gt;像距 (v)&lt;/div&gt;
            &lt;div class=&quot;info-value&quot;&gt;&lt;span id=&quot;val-v&quot;&gt;0&lt;/span&gt; cm&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;info-item&quot;&gt;
            &lt;div class=&quot;info-label&quot;&gt;焦距 (f)&lt;/div&gt;
            &lt;div class=&quot;info-value&quot;&gt;&lt;span id=&quot;val-f&quot;&gt;100&lt;/span&gt; cm&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;control-group&quot;&gt;
            &lt;label&gt;调节物距 (u)&lt;/label&gt;
            &lt;input type=&quot;range&quot; id=&quot;u-slider&quot; min=&quot;10&quot; max=&quot;500&quot; value=&quot;250&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;control-group&quot;&gt;
            &lt;label&gt;焦距 (f)&lt;/label&gt;
            &lt;input type=&quot;range&quot; id=&quot;f-slider&quot; min=&quot;50&quot; max=&quot;150&quot; value=&quot;100&quot;&gt;
        &lt;/div&gt;
        &lt;button class=&quot;btn-toggle&quot; id=&quot;btn-reset&quot;&gt;重置实验&lt;/button&gt;

&lt;script&gt;
    const canvas = document.getElementById('optics-canvas');
    const ctx = canvas.getContext('2d');
    const uSlider = document.getElementById('u-slider');
    const fSlider = document.getElementById('f-slider');
    const objCapy = document.getElementById('object-capy');
    const imgCapy = document.getElementById('image-capy');
    const imgTag = document.getElementById('image-img');
    const ruleText = document.getElementById('rule-text');
    const formulaBox = document.getElementById('formula-box');

    // 物理参数 (单位：像素)
    let f = 100;
    let u = 250;
    let v = 0;
    let h = 60; // 物体高度

    // 画布坐标
    let centerX, centerY;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        uSlider.addEventListener('input', update);
        fSlider.addEventListener('input', update);
        document.getElementById('btn-reset').addEventListener('click', () =&gt; {
            uSlider.value = 250;
            fSlider.value = 100;
            update();
        });
        update();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
        update();
    }

    function update() {
        u = parseInt(uSlider.value);
        f = parseInt(fSlider.value);
        
        // 计算像距 v = (u * f) / (u - f)
        if (u === f) {
            v = Infinity;
        } else {
            v = (u * f) / (u - f);
        }

        // 计算放大倍率 M = -v / u
        let m = -v / u;

        draw();
        updateUI(m);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 画主光轴
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
        ctx.lineWidth = 1;
        ctx.moveTo(0, centerY);
        ctx.lineTo(canvas.width, centerY);
        ctx.stroke();

        // 2. 画凸透镜
        ctx.beginPath();
        ctx.strokeStyle = varColor('--primary-color');
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--primary-color');
        ctx.moveTo(centerX, centerY - 150);
        ctx.lineTo(centerX, centerY + 150);
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        // 透镜两端的箭头
        drawArrow(centerX, centerY - 150, centerX, centerY - 160);
        drawArrow(centerX, centerY + 150, centerX, centerY + 160);

        // 3. 标注焦点 F 和 2F
        drawPoint(centerX - f, centerY, 'F');
        drawPoint(centerX + f, centerY, 'F');
        drawPoint(centerX - 2 * f, centerY, '2F');
        drawPoint(centerX + 2 * f, centerY, '2F');

        // 4. 更新物体位置 (蜡烛底座放在主光轴上)
        const objX = centerX - u;
        objCapy.style.left = `${objX - h/2}px`;
        objCapy.style.top = `${centerY - h}px`; // 容器顶部在主光轴上方 h 处，底座刚好在主光轴上
        objCapy.style.width = `${h}px`;
        objCapy.style.height = `${h}px`;

        // 5. 更新像的位置和大小
        if (u &gt; f) {
            // 实像
            const imgX = centerX + v;
            const imgH = Math.abs(h * (v / u));
            imgCapy.style.display = 'block';
            imgCapy.style.left = `${imgX - imgH/2}px`;
            imgCapy.style.top = `${centerY}px`; // 倒立，容器顶部在主光轴上，向下延伸
            imgCapy.style.width = `${imgH}px`;
            imgCapy.style.height = `${imgH}px`;
            imgCapy.style.transform = 'scaleY(-1)';
            imgCapy.style.opacity = '0.8';
            
            // 画光路 (从火焰顶部发出)
            // 火焰顶部相对于容器顶部的偏移约为 -0.45 * h
            const flameY = centerY - h - (0.45 * h);
            const imgFlameY = centerY + imgH + (0.45 * imgH);
            drawRays(objX, flameY, centerX, centerY, imgX, imgFlameY);
        } else if (u &lt; f) {
            // 虚像
            const imgX = centerX - Math.abs(v);
            const imgH = Math.abs(h * (v / u));
            imgCapy.style.display = 'block';
            imgCapy.style.left = `${imgX - imgH/2}px`;
            imgCapy.style.top = `${centerY - imgH}px`; // 正立，底座在主光轴上
            imgCapy.style.width = `${imgH}px`;
            imgCapy.style.height = `${imgH}px`;
            imgCapy.style.transform = 'scaleY(1)';
            imgCapy.style.opacity = '0.4';

            // 画虚像光路 (从火焰顶部发出)
            const flameY = centerY - h - (0.45 * h);
            const imgFlameY = centerY - imgH - (0.45 * imgH);
            drawVirtualRays(objX, flameY, centerX, centerY, imgX, imgFlameY);
        } else {
            // 不成像
            imgCapy.style.display = 'none';
            const flameY = centerY - h - (0.45 * h);
            drawParallelRays(objX, flameY);
        }
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawPoint(x, y, label) {
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.5)';
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(label, x - 8, y + 25);
    }

    function drawArrow(x1, y1, x2, y2) {
        const headlen = 10;
        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
        ctx.stroke();
    }

    function drawRays(ox, oy, cx, cy, ix, iy) {
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        
        // 平行于主光轴的光线
        // 入射光 (从物体顶部发出)
        ctx.strokeStyle = '#f59e0b';
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(centerX, oy);
        ctx.stroke();
        drawRayLabel(ox + (centerX - ox)/2, oy - 10, &quot;入射光线&quot;);
        drawArrowHead(ox + (centerX - ox)/2, oy, 0); // 传播方向

        // 折射光
        ctx.strokeStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(centerX, oy);
        ctx.lineTo(ix, iy);
        ctx.stroke();
        drawRayLabel(centerX + (ix - centerX)/2, oy + (iy - oy)/2 - 10, &quot;折射光线&quot;);
        drawArrowHead(centerX + (ix - centerX)/2, oy + (iy - oy)/2, Math.atan2(iy - oy, ix - centerX));

        // 过光心的光线 (从物体顶部发出)
        ctx.strokeStyle = '#10b981';
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ix, iy);
        ctx.stroke();
        drawArrowHead(ox + (ix - ox)/2, oy + (iy - oy)/2, Math.atan2(iy - oy, ix - ox));
    }

    function drawVirtualRays(ox, oy, cx, cy, ix, iy) {
        ctx.lineWidth = 2;
        
        // 入射光
        ctx.strokeStyle = '#f59e0b';
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(centerX, oy);
        ctx.stroke();
        drawRayLabel(ox + (centerX - ox)/2, oy - 10, &quot;入射光线&quot;);
        drawArrowHead(ox + (centerX - ox)/2, oy, 0);

        // 折射光（向右散开）
        const endX = centerX + 300;
        const endY = oy + (oy - iy) * (300 / (centerX - ix));
        ctx.strokeStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(centerX, oy);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        drawRayLabel(centerX + 100, oy + (endY - oy)/3 - 10, &quot;折射光线&quot;);
        drawArrowHead(centerX + 150, oy + (endY - oy) * (150 / (endX - centerX)), Math.atan2(endY - oy, endX - centerX));
        
        // 虚像延长线
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(centerX, oy);
        ctx.lineTo(ix, iy);
        ctx.stroke();

        // 过光心光
        ctx.strokeStyle = '#10b981';
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        const vEndX = centerX + 300;
        const vEndY = centerY + (centerY - iy) * (300 / (centerX - ix));
        ctx.lineTo(vEndX, vEndY);
        ctx.stroke();
        drawArrowHead(centerX + 150, centerY + (vEndY - centerY) * (150 / (vEndX - centerX)), Math.atan2(vEndY - centerY, vEndX - centerX));

        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(ix, iy);
        ctx.stroke();
    }

    function drawArrowHead(x, y, angle) {
        const size = 8;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(-size, -size/1.5);
        ctx.lineTo(0, 0);
        ctx.lineTo(-size, size/1.5);
        ctx.stroke();
        ctx.restore();
    }

    function drawRayLabel(x, y, text) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.font = '12px Arial';
        ctx.fillText(text, x, y);
    }

    function drawParallelRays(ox, oy) {
        ctx.strokeStyle = '#f59e0b';
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(centerX, oy);
        ctx.lineTo(centerX + 300, oy + 300);
        ctx.stroke();

        ctx.strokeStyle = '#10b981';
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(centerX + 300, centerY + 300);
        ctx.stroke();
    }

    function updateUI(m) {
        document.getElementById('val-u').textContent = u;
        document.getElementById('val-f').textContent = f;
        
        if (u === f) {
            document.getElementById('val-v').textContent = '&infin;';
            ruleText.textContent = &quot;u = f：不成像，光线平行射出。&quot;;
            formulaBox.style.color = &quot;#ef4444&quot;;
        } else {
            document.getElementById('val-v').textContent = Math.abs(Math.round(v));
            formulaBox.style.color = &quot;inherit&quot;;
            
            let summary = &quot;&quot;;
            if (u &gt; 2 * f) {
                summary = &quot;u &gt; 2f：倒立、缩小的实像。应用：照相机。&quot;;
            } else if (u === 2 * f) {
                summary = &quot;u = 2f：倒立、等大的实像。大小分界点。&quot;;
            } else if (u &gt; f &amp;&amp; u &lt; 2 * f) {
                summary = &quot;f &lt; u &lt; 2f：倒立、放大的实像。应用：投影仪。&quot;;
            } else if (u &lt; f) {
                summary = &quot;u &lt; f：正立、放大的虚像。应用：放大镜。&quot;;
            }
            ruleText.textContent = summary;
        }

        // 自动标注公式关键点
        if (u === 2*f) {
            formulaBox.innerHTML = &quot;u = 2f, v = 2f &lt;br&gt; &lt;strong&gt;等大实像&lt;/strong&gt;&quot;;
        } else if (u === f) {
            formulaBox.innerHTML = &quot;u = f &lt;br&gt; &lt;strong&gt;不成像点&lt;/strong&gt;&quot;;
        } else {
            formulaBox.innerHTML = &quot;1/u + 1/v = 1/f&quot;;
        }
    }

    init();
&lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
