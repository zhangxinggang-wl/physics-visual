<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简谐运动 - 水平弹簧振子模型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
            position: relative;
        }
        
        h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .author {
            position: absolute;
            right: 0;
            bottom: 5px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            height: 650px;
        }
        
        .simulation-panel {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }
        
        .graphs-panel {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }
        
        .controls-panel {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #3498db;
            padding-bottom: 5px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .canvas-container {
            flex-grow: 1;
            position: relative;
            background: #f8fafc;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e1e8ed;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .control-label {
            width: 120px;
            font-size: 0.9rem;
            color: #2c3e50;
        }
        
        .value-display {
            width: 80px;
            text-align: center;
            background: #ecf0f1;
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: bold;
            color: #3498db;
            font-size: 0.85rem;
            margin-left: 10px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #dfe6e9;
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-start {
            background: #2ecc71;
            color: white;
        }
        
        .btn-pause {
            background: #f39c12;
            color: white;
        }
        
        .btn-reset {
            background: #e74c3c;
            color: white;
        }
        
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .graphs-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 15px;
        }
        
        .graph-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .graph-header {
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e1e8ed;
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95rem;
        }
        
        .graph-content {
            flex-grow: 1;
            position: relative;
            background: #f8fafc;
        }
        
        .graph-canvas {
            width: 100%;
            height: 100%;
        }
        
        .data-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .data-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid #3498db;
        }
        
        .data-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 3px;
        }
        
        .data-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .data-unit {
            font-size: 0.8rem;
            color: #95a5a6;
            margin-left: 2px;
        }
        
        .controls-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .initial-position-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
        
        .initial-position-label {
            width: 140px;
            font-size: 0.9rem;
            color: #2c3e50;
            font-weight: bold;
        }
        
        .initial-position-options {
            display: flex;
            gap: 15px;
            flex: 1;
        }
        
        .position-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .position-radio {
            margin-right: 8px;
        }
        
        .position-label {
            font-size: 0.9rem;
            color: #2c3e50;
        }
        
        .position-option input:checked + .position-label {
            color: #3498db;
            font-weight: bold;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
                height: auto;
            }
            
            .simulation-panel {
                height: 400px;
            }
            
            .graphs-panel {
                height: 600px;
            }
            
            .controls-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .data-display {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .main-content {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>简谐运动 - 水平弹簧振子模型</h1>
            <div class="author">制作：耿春辉</div>
        </header>
        
        <div class="main-content">
            <div class="simulation-panel">
                <h2>弹簧振子模型</h2>
                <div class="canvas-container">
                    <canvas id="springCanvas"></canvas>
                </div>
                <div class="data-display">
                    <div class="data-item">
                        <div class="data-label">位移 (x)</div>
                        <div class="data-value" id="displacement">0.00</div>
                        <span class="data-unit">m</span>
                    </div>
                    <div class="data-item">
                        <div class="data-label">速度 (v)</div>
                        <div class="data-value" id="velocity">0.00</div>
                        <span class="data-unit">m/s</span>
                    </div>
                    <div class="data-item">
                        <div class="data-label">加速度 (a)</div>
                        <div class="data-value" id="acceleration">0.00</div>
                        <span class="data-unit">m/s²</span>
                    </div>
                    <div class="data-item">
                        <div class="data-label">周期 (T)</div>
                        <div class="data-value" id="period">0.00</div>
                        <span class="data-unit">s</span>
                    </div>
                </div>
            </div>
            
            <div class="graphs-panel">
                <h2>运动图像</h2>
                <div class="graphs-container">
                    <div class="graph-item">
                        <div class="graph-header">位移-时间 (x-t)</div>
                        <div class="graph-content">
                            <canvas id="xtGraph" class="graph-canvas"></canvas>
                        </div>
                    </div>
                    <div class="graph-item">
                        <div class="graph-header">速度-时间 (v-t)</div>
                        <div class="graph-content">
                            <canvas id="vtGraph" class="graph-canvas"></canvas>
                        </div>
                    </div>
                    <div class="graph-item">
                        <div class="graph-header">加速度-时间 (a-t)</div>
                        <div class="graph-content">
                            <canvas id="atGraph" class="graph-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls-panel">
            <h2>系统控制</h2>
            <div class="button-group">
                <button class="btn-start" id="startBtn">开始运动</button>
                <button class="btn-pause" id="pauseBtn">暂停运动</button>
                <button class="btn-reset" id="resetBtn">重置系统</button>
            </div>
            
            <div class="initial-position-group">
                <div class="initial-position-label">初始位置：</div>
                <div class="initial-position-options">
                    <label class="position-option">
                        <input type="radio" name="initialPosition" value="max" class="position-radio" checked>
                        <span class="position-label">最大位置处 (x = A)</span>
                    </label>
                    <label class="position-option">
                        <input type="radio" name="initialPosition" value="equilibrium" class="position-radio">
                        <span class="position-label">平衡位置处 (x = 0)</span>
                    </label>
                </div>
            </div>
            
            <h2>参数控制</h2>
            <div class="controls-row">
                <div class="control-group">
                    <div class="control-label">质量 (m)</div>
                    <input type="range" id="massSlider" min="0.5" max="3.0" step="0.1" value="1.0">
                    <span class="value-display" id="massValue">1.0 kg</span>
                </div>
                
                <div class="control-group">
                    <div class="control-label">劲度系数 (k)</div>
                    <input type="range" id="springConstantSlider" min="5" max="30" step="1" value="10">
                    <span class="value-display" id="springConstantValue">10.0 N/m</span>
                </div>
                
                <div class="control-group">
                    <div class="control-label">振幅 (A)</div>
                    <input type="range" id="amplitudeSlider" min="0.5" max="4.0" step="0.1" value="2.0">
                    <span class="value-display" id="amplitudeValue">2.0 m</span>
                </div>
                
                <div class="control-group">
                    <div class="control-label">时间缩放</div>
                    <input type="range" id="timeScaleSlider" min="0.2" max="3.0" step="0.2" value="1.0">
                    <span class="value-display" id="timeScaleValue">1.0x</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const springCanvas = document.getElementById('springCanvas');
        const springCtx = springCanvas.getContext('2d');
        
        // 获取图表Canvas元素
        const xtCanvas = document.getElementById('xtGraph');
        const vtCanvas = document.getElementById('vtGraph');
        const atCanvas = document.getElementById('atGraph');
        const xtCtx = xtCanvas.getContext('2d');
        const vtCtx = vtCanvas.getContext('2d');
        const atCtx = atCanvas.getContext('2d');
        
        // 获取控制元素
        const massSlider = document.getElementById('massSlider');
        const springConstantSlider = document.getElementById('springConstantSlider');
        const amplitudeSlider = document.getElementById('amplitudeSlider');
        const timeScaleSlider = document.getElementById('timeScaleSlider');
        const initialPositionRadios = document.querySelectorAll('input[name="initialPosition"]');
        
        // 获取值显示元素
        const massValue = document.getElementById('massValue');
        const springConstantValue = document.getElementById('springConstantValue');
        const amplitudeValue = document.getElementById('amplitudeValue');
        const timeScaleValue = document.getElementById('timeScaleValue');
        
        // 获取数据显示元素
        const displacementElement = document.getElementById('displacement');
        const velocityElement = document.getElementById('velocity');
        const accelerationElement = document.getElementById('acceleration');
        const periodElement = document.getElementById('period');
        
        // 获取按钮元素
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // 设置Canvas尺寸
        function resizeCanvases() {
            const springContainer = springCanvas.parentElement;
            springCanvas.width = springContainer.clientWidth;
            springCanvas.height = springContainer.clientHeight;
            
            const xtContainer = xtCanvas.parentElement;
            const vtContainer = vtCanvas.parentElement;
            const atContainer = atCanvas.parentElement;
            
            xtCanvas.width = xtContainer.clientWidth;
            xtCanvas.height = xtContainer.clientHeight;
            vtCanvas.width = vtContainer.clientWidth;
            vtCanvas.height = vtContainer.clientHeight;
            atCanvas.width = atContainer.clientWidth;
            atCanvas.height = atContainer.clientHeight;
        }
        
        // 初始调整Canvas大小
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);
        
        // 弹簧振子参数
        let params = {
            mass: parseFloat(massSlider.value), // 质量 (kg)
            springConstant: parseFloat(springConstantSlider.value), // 弹簧劲度系数 (N/m)
            amplitude: parseFloat(amplitudeSlider.value), // 振幅 (m)
            timeScale: parseFloat(timeScaleSlider.value), // 时间缩放
            initialPosition: 'max', // 初始位置：'max' 或 'equilibrium'
            isRunning: true,
            time: 0,
            x: parseFloat(amplitudeSlider.value), // 初始位移 (从最大振幅开始)
            v: 0, // 初始速度
            a: 0  // 初始加速度
        };
        
        // 更新显示值
        function updateDisplays() {
            // 更新滑块值显示
            massValue.textContent = params.mass.toFixed(1) + " kg";
            springConstantValue.textContent = params.springConstant.toFixed(1) + " N/m";
            amplitudeValue.textContent = params.amplitude.toFixed(1) + " m";
            timeScaleValue.textContent = params.timeScale.toFixed(1) + "x";
            
            // 计算周期
            const omega = Math.sqrt(params.springConstant / params.mass);
            const period = 2 * Math.PI / omega;
            periodElement.textContent = period.toFixed(2);
        }
        
        // 初始化显示
        updateDisplays();
        
        // 滑块事件监听
        massSlider.addEventListener('input', function() {
            params.mass = parseFloat(this.value);
            updateDisplays();
        });
        
        springConstantSlider.addEventListener('input', function() {
            params.springConstant = parseFloat(this.value);
            updateDisplays();
        });
        
        amplitudeSlider.addEventListener('input', function() {
            params.amplitude = parseFloat(this.value);
            // 如果振子当前在最大振幅处，更新当前位置
            if (Math.abs(params.x - params.amplitude) < 0.1) {
                params.x = params.amplitude;
            }
            updateDisplays();
        });
        
        timeScaleSlider.addEventListener('input', function() {
            params.timeScale = parseFloat(this.value);
            updateDisplays();
        });
        
        // 初始位置选择事件监听
        initialPositionRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) {
                    params.initialPosition = this.value;
                    // 重置系统以应用新的初始位置
                    resetSystem();
                }
            });
        });
        
        // 按钮事件监听
        startBtn.addEventListener('click', function() {
            params.isRunning = true;
        });
        
        pauseBtn.addEventListener('click', function() {
            params.isRunning = false;
        });
        
        resetBtn.addEventListener('click', function() {
            resetSystem();
        });
        
        // 重置系统
        function resetSystem() {
            params.isRunning = false;
            params.time = 0;
            
            // 根据初始位置设置初始状态
            if (params.initialPosition === 'max') {
                // 从最大位置开始：x = A, v = 0, a = -Aω²
                params.x = params.amplitude;
                params.v = 0;
            } else {
                // 从平衡位置开始：x = 0, v = Aω, a = 0
                params.x = 0;
                const omega = Math.sqrt(params.springConstant / params.mass);
                params.v = params.amplitude * omega;
            }
            params.a = 0;
            
            // 重置图表数据
            resetChartData();
        }
        
        // 绘制弹簧振子模型
        function drawSpringMassSystem() {
            const width = springCanvas.width;
            const height = springCanvas.height;
            
            // 清除画布
            springCtx.clearRect(0, 0, width, height);
            
            // 绘制背景
            springCtx.fillStyle = '#f8fafc';
            springCtx.fillRect(0, 0, width, height);
            
            // 计算振子位置
            const groundY = height * 0.8;
            const wallX = width * 0.1;
            const equilibriumX = width * 0.4;
            const scale = 40; // 像素/米
            const ballX = equilibriumX + params.x * scale;
            const ballY = groundY - 15; // 小球接触地面
            
            // 绘制地面
            springCtx.fillStyle = '#95a5a6';
            springCtx.fillRect(0, groundY, width, height - groundY);
            
            // 绘制地面纹理
            springCtx.strokeStyle = '#7f8c8d';
            springCtx.lineWidth = 1;
            for (let i = 0; i < width; i += 20) {
                springCtx.beginPath();
                springCtx.moveTo(i, groundY);
                springCtx.lineTo(i + 10, groundY + 5);
                springCtx.stroke();
            }
            
            // 绘制墙面
            springCtx.fillStyle = '#7f8c8d';
            springCtx.fillRect(wallX - 10, groundY - 120, 20, 120);
            
            // 绘制弹簧
            const springStartX = wallX;
            const springEndX = ballX;
            const springCoils = 10;
            
            springCtx.strokeStyle = '#3498db';
            springCtx.lineWidth = 3;
            springCtx.beginPath();
            springCtx.moveTo(springStartX, ballY);
            
            // 绘制弹簧线圈
            const springLength = springEndX - springStartX;
            const coilLength = springLength / springCoils;
            const coilHeight = 10;
            
            for (let i = 0; i < springCoils; i++) {
                const x1 = springStartX + i * coilLength;
                const x2 = springStartX + (i + 0.5) * coilLength;
                const x3 = springStartX + (i + 1) * coilLength;
                
                springCtx.lineTo(x2, ballY - coilHeight);
                springCtx.lineTo(x3, ballY);
            }
            
            springCtx.stroke();
            
            // 绘制小球（与地面接触）
            const ballRadius = 20;
            springCtx.fillStyle = '#e74c3c';
            springCtx.beginPath();
            springCtx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            springCtx.fill();
            
            // 绘制小球阴影
            springCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            springCtx.beginPath();
            springCtx.arc(ballX, ballY + 3, ballRadius, 0, Math.PI * 2);
            springCtx.fill();
            
            // 绘制小球上的质量标签
            springCtx.fillStyle = 'white';
            springCtx.font = 'bold 12px Arial';
            springCtx.textAlign = 'center';
            springCtx.textBaseline = 'middle';
            springCtx.fillText('m', ballX, ballY);
            
            // 绘制平衡位置标记
            springCtx.strokeStyle = '#2ecc71';
            springCtx.lineWidth = 2;
            springCtx.setLineDash([5, 5]);
            springCtx.beginPath();
            springCtx.moveTo(equilibriumX, groundY - 100);
            springCtx.lineTo(equilibriumX, groundY);
            springCtx.stroke();
            springCtx.setLineDash([]);
            
            // 绘制平衡位置标签
            springCtx.fillStyle = '#2ecc71';
            springCtx.font = '12px Arial';
            springCtx.fillText('平衡位置', equilibriumX, groundY - 110);
            
            // 绘制位移指示线
            if (Math.abs(params.x) > 0.01) {
                springCtx.strokeStyle = params.x > 0 ? '#e74c3c' : '#3498db';
                springCtx.lineWidth = 2;
                springCtx.setLineDash([5, 5]);
                springCtx.beginPath();
                springCtx.moveTo(equilibriumX, groundY - 80);
                springCtx.lineTo(ballX, groundY - 80);
                springCtx.stroke();
                springCtx.setLineDash([]);
                
                // 绘制位移箭头
                springCtx.fillStyle = params.x > 0 ? '#e74c3c' : '#3498db';
                springCtx.beginPath();
                if (params.x > 0) {
                    // 向右箭头
                    springCtx.moveTo(ballX, groundY - 80);
                    springCtx.lineTo(ballX - 6, groundY - 76);
                    springCtx.lineTo(ballX - 6, groundY - 84);
                } else {
                    // 向左箭头
                    springCtx.moveTo(ballX, groundY - 80);
                    springCtx.lineTo(ballX + 6, groundY - 76);
                    springCtx.lineTo(ballX + 6, groundY - 84);
                }
                springCtx.closePath();
                springCtx.fill();
                
                // 位移标签
                springCtx.fillStyle = params.x > 0 ? '#e74c3c' : '#3498db';
                springCtx.font = 'bold 12px Arial';
                springCtx.fillText(`x = ${params.x.toFixed(2)} m`, 
                                  (equilibriumX + ballX) / 2, groundY - 95);
            }
        }
        
        // 计算简谐运动
        function calculateSHM(deltaTime) {
            if (!params.isRunning) return;
            
            // 更新时间
            params.time += deltaTime * params.timeScale;
            
            // 计算角频率
            const omega = Math.sqrt(params.springConstant / params.mass);
            
            // 简谐运动方程 - 根据初始位置选择不同的相位
            if (params.initialPosition === 'max') {
                // 从最大位置开始：x = A * cos(ωt)
                params.x = params.amplitude * Math.cos(omega * params.time);
                params.v = -params.amplitude * omega * Math.sin(omega * params.time);
                params.a = -params.amplitude * omega * omega * Math.cos(omega * params.time);
            } else {
                // 从平衡位置开始：x = A * sin(ωt)
                params.x = params.amplitude * Math.sin(omega * params.time);
                params.v = params.amplitude * omega * Math.cos(omega * params.time);
                params.a = -params.amplitude * omega * omega * Math.sin(omega * params.time);
            }
            
            // 更新数据显示
            displacementElement.textContent = params.x.toFixed(2);
            velocityElement.textContent = params.v.toFixed(2);
            accelerationElement.textContent = params.a.toFixed(2);
            
            // 更新图表数据
            updateChartData(params.time, params.x, params.v, params.a);
        }
        
        // 图表数据
        let timeData = [];
        let displacementData = [];
        let velocityData = [];
        let accelerationData = [];
        const maxDataPoints = 5000; // 5000个数据点
        const maxDisplayTime = 10; // 最大显示时间10秒
        
        // 绘制x-t图
        function drawXtGraph() {
            const width = xtCanvas.width;
            const height = xtCanvas.height;
            
            // 清除画布
            xtCtx.clearRect(0, 0, width, height);
            
            // 绘制背景
            xtCtx.fillStyle = '#f8f9fa';
            xtCtx.fillRect(0, 0, width, height);
            
            // 绘制坐标轴
            const axisMargin = 60;
            const graphWidth = width - axisMargin - 20;
            const graphHeight = height - axisMargin - 20;
            
            // x轴
            xtCtx.strokeStyle = '#2c3e50';
            xtCtx.lineWidth = 2;
            xtCtx.beginPath();
            xtCtx.moveTo(axisMargin, height / 2);
            xtCtx.lineTo(width - 20, height / 2);
            xtCtx.stroke();
            
            // x轴箭头
            xtCtx.beginPath();
            xtCtx.moveTo(width - 25, height / 2 - 5);
            xtCtx.lineTo(width - 20, height / 2);
            xtCtx.lineTo(width - 25, height / 2 + 5);
            xtCtx.fillStyle = '#2c3e50';
            xtCtx.fill();
            
            // y轴
            xtCtx.beginPath();
            xtCtx.moveTo(axisMargin, 20);
            xtCtx.lineTo(axisMargin, height - 20);
            xtCtx.stroke();
            
            // y轴箭头
            xtCtx.beginPath();
            xtCtx.moveTo(axisMargin - 5, 25);
            xtCtx.lineTo(axisMargin, 20);
            xtCtx.lineTo(axisMargin + 5, 25);
            xtCtx.fill();
            
            // 坐标轴标签
            xtCtx.fillStyle = '#2c3e50';
            xtCtx.font = '12px Arial';
            xtCtx.textAlign = 'center';
            xtCtx.fillText('时间 t (s)', width / 2, height - 10);
            
            xtCtx.save();
            xtCtx.translate(15, height / 2);
            xtCtx.rotate(-Math.PI / 2);
            xtCtx.fillText('位移 x (m)', 0, 0);
            xtCtx.restore();
            
            // 绘制刻度（只保留y轴刻度线，去除x轴的竖线网格）
            xtCtx.fillStyle = '#7f8c8d';
            xtCtx.font = '9px Arial';
            xtCtx.textAlign = 'center';
            
            // x轴刻度标签（只显示标签，不画竖线）
            for (let i = 0; i <= 10; i++) {
                const x = axisMargin + (i / 10) * graphWidth;
                const timeValue = i / 10 * maxDisplayTime; // 0到10秒范围
                
                // 只画x轴刻度短线
                xtCtx.beginPath();
                xtCtx.moveTo(x, height / 2);
                xtCtx.lineTo(x, height / 2 + 5);
                xtCtx.strokeStyle = '#2c3e50';
                xtCtx.stroke();
                
                // 刻度标签
                xtCtx.fillText(timeValue.toFixed(1), x, height / 2 + 18);
            }
            
            // y轴刻度线（保留纵轴刻度线）
            for (let i = -2; i <= 2; i++) {
                const y = height / 2 - (i / 2) * (graphHeight / 2);
                const dispValue = i * params.amplitude / 2;
                
                // 保留y轴刻度线
                xtCtx.beginPath();
                xtCtx.moveTo(axisMargin, y);
                xtCtx.lineTo(axisMargin - 5, y);
                xtCtx.strokeStyle = '#2c3e50';
                xtCtx.stroke();
                
                // 刻度标签
                xtCtx.textAlign = 'right';
                xtCtx.fillText(dispValue.toFixed(1), axisMargin - 8, y + 3);
                xtCtx.textAlign = 'center';
            }
            
            // 如果没有数据，返回
            if (timeData.length < 2) return;
            
            // 绘制x-t曲线（连续显示）
            xtCtx.strokeStyle = '#3498db';
            xtCtx.lineWidth = 2;
            xtCtx.beginPath();
            
            let startIndex = 0;
            // 找到时间小于当前显示范围起点的第一个点
            const startTime = Math.max(0, params.time - maxDisplayTime);
            for (let i = 0; i < timeData.length; i++) {
                if (timeData[i] >= startTime) {
                    startIndex = i;
                    break;
                }
            }
            
            // 绘制连续曲线
            for (let i = startIndex; i < timeData.length; i++) {
                const t = timeData[i];
                const x = axisMargin + ((t - startTime) / maxDisplayTime) * graphWidth;
                const y = height / 2 - (displacementData[i] / params.amplitude) * (graphHeight / 2);
                
                if (i === startIndex) {
                    xtCtx.moveTo(x, y);
                } else {
                    xtCtx.lineTo(x, y);
                }
            }
            
            xtCtx.stroke();
            
            // 绘制当前点
            if (timeData.length > 0) {
                const lastTime = timeData[timeData.length - 1];
                const lastDisplacement = displacementData[displacementData.length - 1];
                const x = axisMargin + ((lastTime - startTime) / maxDisplayTime) * graphWidth;
                const y = height / 2 - (lastDisplacement / params.amplitude) * (graphHeight / 2);
                
                xtCtx.fillStyle = '#e74c3c';
                xtCtx.beginPath();
                xtCtx.arc(x, y, 3, 0, Math.PI * 2);
                xtCtx.fill();
            }
        }
        
        // 绘制v-t图
        function drawVtGraph() {

            // 绘制刻度（只保留y轴刻度线，去除x轴的竖线网格）
            vtCtx.fillStyle = '#7f8c8d';
            vtCtx.font = '9px Arial';
            vtCtx.textAlign = 'center';
            
            // x轴刻度标签（只显示标签，不画竖线）
            for (let i = 0; i <= 10; i++) {
                const x = axisMargin + (i / 10) * graphWidth;
                const timeValue = i / 10 * maxDisplayTime; // 0到10秒范围
                
                // 只画x轴刻度短线
                vtCtx.beginPath();
                vtCtx.moveTo(x, height / 2);
                vtCtx.lineTo(x, height / 2 + 5);
                vtCtx.strokeStyle = '#2c3e50';
                vtCtx.stroke();
                
                // 刻度标签
                vtCtx.fillText(timeValue.toFixed(1), x, height / 2 + 18);
            }
            
            // 计算最大速度
            const omega = Math.sqrt(params.springConstant / params.mass);
            const maxVelocity = params.amplitude * omega;
            
            // y轴刻度线（保留纵轴刻度线）
            for (let i = -2; i <= 2; i++) {
                const y = height / 2 - (i / 2) * (graphHeight / 2);
                const velocityValue = i * maxVelocity / 2;
                
                // 保留y轴刻度线
                vtCtx.beginPath();
                vtCtx.moveTo(axisMargin, y);
                vtCtx.lineTo(axisMargin - 5, y);
                vtCtx.strokeStyle = '#2c3e50';
                vtCtx.stroke();
                
                // 刻度标签
                vtCtx.textAlign = 'right';
                vtCtx.fillText(velocityValue.toFixed(1), axisMargin - 8, y + 3);
                vtCtx.textAlign = 'center';
            }
            
            // 如果没有数据，返回
            if (timeData.length < 2) return;
            
            // 绘制v-t曲线（连续显示）
            vtCtx.strokeStyle = '#2ecc71';
            vtCtx.lineWidth = 2;
            vtCtx.beginPath();
            
            let startIndex = 0;
            // 找到时间小于当前显示范围起点的第一个点
            const startTime = Math.max(0, params.time - maxDisplayTime);
            for (let i = 0; i < timeData.length; i++) {
                if (timeData[i] >= startTime) {
                    startIndex = i;
                    break;
                }
            }
            
            // 绘制连续曲线
            for (let i = startIndex; i < timeData.length; i++) {
                const t = timeData[i];
                const x = axisMargin + ((t - startTime) / maxDisplayTime) * graphWidth;
                const y = height / 2 - (velocityData[i] / maxVelocity) * (graphHeight / 2);
                
                if (i === startIndex) {
                    vtCtx.moveTo(x, y);
                } else {
                    vtCtx.lineTo(x, y);
                }
            }
            
            vtCtx.stroke();
            
            // 绘制当前点
            if (timeData.length > 0) {
                const lastTime = timeData[timeData.length - 1];
                const lastVelocity = velocityData[velocityData.length - 1];
                const x = axisMargin + ((lastTime - startTime) / maxDisplayTime) * graphWidth;
                const y = height / 2 - (lastVelocity / maxVelocity) * (graphHeight / 2);
                
                vtCtx.fillStyle = '#e74c3c';
                vtCtx.beginPath();
                vtCtx.arc(x, y, 3, 0, Math.PI * 2);
                vtCtx.fill();
            }
        }
        
        // 绘制a-t图
        function drawAtGraph() {
            const width = atCanvas.width;
            const height = atCanvas.height;
            
            // 清除画布
            atCtx.clearRect(0, 0, width, height);
            
            // 绘制背景
            atCtx.fillStyle = '#f8f9fa';
            atCtx.fillRect(0, 0, width, height);
            
            // 绘制坐标轴
            const axisMargin = 60;
            const graphWidth = width - axisMargin - 20;

            atCtx.strokeStyle = '#2c3e50';

            atCtx.save();
            atCtx.translate(15, height / 2);
            atCtx.rotate(-Math.PI / 2);
            atCtx.fillText('加速度 a (m/s²)', 0, 0);

            // 绘制刻度（只保留y轴刻度线，去除x轴的竖线网格）
            atCtx.fillStyle = '#7f8c8d';

            for (let i = 0; i <= 10; i++) {

                const timeValue = i / 10 * maxDisplayTime; // 0到10秒范围
                
                // 只画x轴刻度短线
                atCtx.beginPath();
                atCtx.moveTo(x, height / 2);
                atCtx.lineTo(x, height / 2 + 5);

                atCtx.fillText(timeValue.toFixed(1), x, height / 2 + 18);
            }
            
            // 计算最大加速度
            const omega = Math.sqrt(params.springConstant / params.mass);
            const maxAcceleration = params.amplitude * omega * omega;
            
            // y轴刻度线（保留纵轴刻度线）
            for (let i = -2; i <= 2; i++) {
                const y = height / 2 - (i / 2) * (graphHeight / 2);

                // 保留y轴刻度线
                atCtx.beginPath();
                atCtx.moveTo(axisMargin, y);

                // 刻度标签
                atCtx.textAlign = 'right';
                atCtx.fillText(accelerationValue.toFixed(1), axisMargin - 8, y + 3);
                atCtx.textAlign = 'center';
            }
            
            // 如果没有数据，返回
            if (timeData.length < 2) return;
            
            // 绘制a-t曲线（连续显示）
            atCtx.strokeStyle = '#e74c3c';
            atCtx.lineWidth = 2;
            atCtx.beginPath();

                const y = height / 2 - (accelerationData[i] / maxAcceleration) * (graphHeight / 2);
                
                if (i === startIndex) {
                    atCtx.moveTo(x, y);
                } else {
                    atCtx.lineTo(x, y);
                }
            }
            
            atCtx.stroke();
            
            // 绘制当前点
            if (timeData.length > 0) {
                const lastTime = timeData[timeData.length - 1];
                const lastAcceleration = accelerationData[accelerationData.length - 1];
                const x = axisMargin + ((lastTime - startTime) / maxDisplayTime) * graphWidth;
                const y = height / 2 - (lastAcceleration / maxAcceleration) * (graphHeight / 2);
                
                atCtx.fillStyle = '#3498db';
                atCtx.beginPath();
                atCtx.arc(x, y, 3, 0, Math.PI * 2);
                atCtx.fill();
            }
        }
        
        // 更新图表数据
        function updateChartData(time, x, v, a) {
            // 添加新数据点
            timeData.push(time);
            displacementData.push(x);
            velocityData.push(v);
            accelerationData.push(a);
            
            // 限制数据点数量
            if (timeData.length > maxDataPoints) {
                timeData.shift();
                displacementData.shift();
                velocityData.shift();
                accelerationData.shift();
            }
            
            // 更新图表
            drawXtGraph();
            drawVtGraph();
            drawAtGraph();
        }
        
        // 重置图表数据
        function resetChartData() {
            timeData = [];
            displacementData = [];
            velocityData = [];
            accelerationData = [];
            
            // 更新图表
            drawXtGraph();
            drawVtGraph();
            drawAtGraph();
            
            // 更新数据显示
            displacementElement.textContent = params.x.toFixed(2);
            velocityElement.textContent = params.v.toFixed(2);
            accelerationElement.textContent = params.a.toFixed(2);
        }
        
        // 动画循环
        let lastTime = 0;
        function animate(currentTime) {
            // 计算时间增量（秒）
            const deltaTime = lastTime ? (currentTime - lastTime) / 1000 : 0;
            lastTime = currentTime;
            
            // 计算物理
            calculateSHM(deltaTime);
            
            // 绘制
            drawSpringMassSystem();
            
            // 继续动画循环
            requestAnimationFrame(animate);
        }
        
        // 初始化图表并开始动画
        drawXtGraph();
        drawVtGraph();
        drawAtGraph();
        animate(0);
    </script>
