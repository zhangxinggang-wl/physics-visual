                    &lt;p&gt;双星靠彼此的万有引力提供向心力，且角速度相同。&lt;/p&gt;
                    &lt;div class=&quot;math-formula my-2&quot;&gt;
                        $$ G\frac{M_1 M_2}{L^2} = M_1 \omega^2 r_1 = M_2 \omega^2 r_2 $$
                    &lt;/div&gt;
                &lt;/div&gt;
                
                &lt;div class=&quot;bg-white/5 p-4 rounded-lg&quot;&gt;
                    &lt;p class=&quot;mb-2 font-bold text-white&quot;&gt;2. 轨道半径关系&lt;/p&gt;
                    &lt;p&gt;由上式可得：$$ M_1 r_1 = M_2 r_2 $$&lt;/p&gt;
                    &lt;p&gt;结合 $$ r_1 + r_2 = L $$，解得：&lt;/p&gt;
                    &lt;div class=&quot;math-formula my-2&quot;&gt;
                        $$ r_1 = \frac{M_2}{M_1+M_2}L, \quad r_2 = \frac{M_1}{M_1+M_2}L $$
                    &lt;/div&gt;
                    &lt;p class=&quot;text-xs text-accent mt-2&quot;&gt;结论：质量越大的星，旋转半径越小。&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 音频资源 --&gt;
    &lt;audio id=&quot;bgAudio&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/987fe9p9RzLJydn54BSkjf.mp3&quot;&gt;&lt;/audio&gt;

    &lt;script type=&quot;module&quot;&gt;
        // 物理常量模拟 (为了视觉效果进行了缩放)
        const G = 1.5; // 模拟引力常数
        
        // 状态变量
        let isPaused = false;
        let time = 0;
        let stars = [];
        let trails = [[], []];
        const MAX_TRAIL = 100;

        // DOM 元素
        const ui = {
            m1: document.getElementById('slider-m1'),
            m2: document.getElementById('slider-m2'),
            l: document.getElementById('slider-l'),
            valM1: document.getElementById('val-m1'),
            valM2: document.getElementById('val-m2'),
            valL: document.getElementById('val-l'),
            playBtn: document.getElementById('playBtn'),
            resetBtn: document.getElementById('resetBtn'),
            voiceBtn: document.getElementById('voiceBtn'),
            audio: document.getElementById('bgAudio'),
            errorToast: document.getElementById('errorToast'),
            data: {
                period: document.getElementById('data-period'),
                omega: document.getElementById('data-omega'),
                v1: document.getElementById('data-v1'),
                v2: document.getElementById('data-v2'),
                a1: document.getElementById('data-a1'),
                a2: document.getElementById('data-a2')
            }
        };

        // P5.js 实例模式
        new p5((p) =&gt; {
            let canvas;
            let centerX, centerY;
            
            p.setup = () =&gt; {
                const container = document.getElementById('canvas-container');
                canvas = p.createCanvas(container.clientWidth, container.clientHeight);
                canvas.parent('canvas-container');
                p.frameRate(60);
                p.textFont('Inter');
                
                // 窗口大小改变监听
                window.addEventListener('resize', () =&gt; {
                    p.resizeCanvas(container.clientWidth, container.clientHeight);
                });

                updatePhysics();
            };

            p.draw = () =&gt; {
                p.clear(); // 清除画布，背景由CSS控制
                
                centerX = p.width / 2;
                centerY = p.height / 2;

                // 绘制质心
                p.noStroke();
                p.fill(255, 100);
                p.circle(centerX, centerY, 4);
                p.fill(255);
                p.textSize(12);
                p.textAlign(p.CENTER);
                p.text('O (质心)', centerX, centerY + 15);

                if (!isPaused) {
                    updatePhysics();
                    time += 0.02 * Math.sqrt(getOmega()); // 动态时间步长
                }

                drawSystem();
                updateDataPanel();
            };

            function getParams() {
                return {
                    m1: parseFloat(ui.m1.value),
                    m2: parseFloat(ui.m2.value),
                    L: parseFloat(ui.l.value) * 60 // 缩放距离以便显示
                };
            }

            function getOmega() {
                const { m1, m2, L } = getParams();
                // &omega; = sqrt(G(M1+M2)/L^3)
                return Math.sqrt(G * (m1 + m2) / Math.pow(L/50, 3)); // 调整比例系数
            }

            function updatePhysics() {
                const { m1, m2, L } = getParams();
                const r1 = (m2 / (m1 + m2)) * L;
                const r2 = (m1 / (m1 + m2)) * L;
                const omega = getOmega();

                // 计算位置
                const x1 = centerX + r1 * Math.cos(time);
                const y1 = centerY + r1 * Math.sin(time);
                const x2 = centerX - r2 * Math.cos(time);
                const y2 = centerY - r2 * Math.sin(time);

                stars = [
                    { x: x1, y: y1, r: r1, m: m1, color: '#FF6B6B', label: 'M₁' },
                    { x: x2, y: y2, r: r2, m: m2, color: '#4ECDC4', label: 'M₂' }
                ];

                // 更新轨迹
                if (!isPaused) {
                    if (p.frameCount % 3 === 0) {
                        trails[0].push({x: x1, y: y1});
                        trails[1].push({x: x2, y: y2});
                        if (trails[0].length &gt; MAX_TRAIL) trails[0].shift();
                        if (trails[1].length &gt; MAX_TRAIL) trails[1].shift();
                    }
                }
            }

            function drawSystem() {
                // 绘制连线
                p.stroke(255, 50);
                p.strokeWeight(1);
                p.line(stars[0].x, stars[0].y, stars[1].x, stars[1].y);

                // 绘制轨迹
                trails.forEach((trail, index) =&gt; {
                    p.noFill();
                    p.stroke(stars[index].color);
                    p.strokeWeight(2);
                    p.beginShape();
                    trail.forEach((pos, i) =&gt; {
                        const alpha = p.map(i, 0, trail.length, 0, 255);
                        p.vertex(pos.x, pos.y);
                    });
                    p.endShape();
                });

                // 绘制恒星
                stars.forEach((star, index) =&gt; {
                    // 光晕
                    p.noStroke();
                    p.fill(star.color);
                    p.drawingContext.shadowBlur = 20;
                    p.drawingContext.shadowColor = star.color;
                    
                    // 星体大小随质量变化
                    const size = 15 + star.m * 5;
                    p.circle(star.x, star.y, size);
                    p.drawingContext.shadowBlur = 0;

                    // 标签
                    p.fill(255);
                    p.noStroke();
                    p.textSize(14);
                    p.textAlign(p.CENTER);
                    p.text(star.label, star.x, star.y - size/2 - 10);

                    // 力矢量 (指向质心)
                    drawArrow(star.x, star.y, centerX, centerY, star.color);
                });
            }

            function drawArrow(x1, y1, x2, y2, color) {
                const angle = Math.atan2(y2 - y1, x2 - x1);
                const dist = p.dist(x1, y1, x2, y2);
                const len = Math.min(dist - 20, 60); // 限制箭头长度
                
                p.push();
                p.translate(x1, y1);
                p.rotate(angle);
                p.stroke(color);
                p.strokeWeight(2);
                p.line(0, 0, len, 0);
                p.fill(color);
                p.noStroke();
                p.triangle(len, 0, len - 6, -3, len - 6, 3);
                
                // 标注 F
                p.fill(255);
                p.textSize(10);
                p.text('F', len/2, -5);
                p.pop();
            }
        });

        // UI 逻辑
        function updateDataPanel() {
            const { m1, m2, L } = { 
                m1: parseFloat(ui.m1.value), 
                m2: parseFloat(ui.m2.value), 
                L: parseFloat(ui.l.value)
            };
            
            // 物理计算 (显示用)
            const r1 = (m2 / (m1 + m2)) * L;
            const r2 = (m1 / (m1 + m2)) * L;
            // 假设 G=1 进行定性显示
            const omega = Math.sqrt((m1 + m2) / Math.pow(L, 3));
            const T = 2 * Math.PI / omega;
            const v1 = omega * r1;
            const v2 = omega * r2;
            const a1 = omega * omega * r1;
            const a2 = omega * omega * r2;

            ui.valM1.textContent = `${m1.toFixed(1)} &times;10&sup3;⁰ kg`;
            ui.valM2.textContent = `${m2.toFixed(1)} &times;10&sup3;⁰ kg`;
            ui.valL.textContent = `${L.toFixed(1)} AU`;

            ui.data.period.textContent = `${T.toFixed(2)} yr`;
            ui.data.omega.textContent = `${omega.toFixed(2)} rad/yr`;
            ui.data.v1.textContent = `${v1.toFixed(2)} AU/yr`;
            ui.data.v2.textContent = `${v2.toFixed(2)} AU/yr`;
            ui.data.a1.textContent = `${a1.toFixed(2)}`;
            ui.data.a2.textContent = `${a2.toFixed(2)}`;

            // 碰撞检测提示
            if (L &lt; 2.5 &amp;&amp; (m1 + m2) &gt; 8) {
                ui.errorToast.classList.remove('hidden');
                ui.errorToast.classList.remove('opacity-0');
            } else {
                ui.errorToast.classList.add('opacity-0');
                setTimeout(() =&gt; ui.errorToast.classList.add('hidden'), 300);
            }
        }

        // 事件监听
        [ui.m1, ui.m2, ui.l].forEach(el =&gt; {
            el.addEventListener('input', () =&gt; {
                trails = [[], []]; // 参数改变时重置轨迹
                updateDataPanel();
            });
        });

        ui.playBtn.addEventListener('click', () =&gt; {
            isPaused = !isPaused;
            ui.playBtn.innerHTML = isPaused ? 
                `&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-8 w-8&quot; fill=&quot;none&quot; viewBox=&quot;0 0 24 24&quot; stroke=&quot;currentColor&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z&quot; /&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M21 12a9 9 0 11-18 0 9 9 0 0118 0z&quot; /&gt;&lt;/svg&gt;` :
                `&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; class=&quot;h-8 w-8&quot; fill=&quot;none&quot; viewBox=&quot;0 0 24 24&quot; stroke=&quot;currentColor&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z&quot; /&gt;&lt;/svg&gt;`;
        });

        ui.resetBtn.addEventListener('click', () =&gt; {
            ui.m1.value = 2.0;
            ui.m2.value = 1.0;
            ui.l.value = 5.0;
            trails = [[], []];
            time = 0;
            updateDataPanel();
        });

        ui.voiceBtn.addEventListener('click', () =&gt; {
            if (ui.audio.paused) {
                ui.audio.play();
                ui.voiceBtn.classList.add('text-accent');
            } else {
                ui.audio.pause();
                ui.voiceBtn.classList.remove('text-accent');
            }
        });

        // 初始化数据面板
        updateDataPanel();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

      event.stopPropagation()

        console.log('trackHtmlClick', chatId)

          url: '/click/HtmlPage/start',

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
