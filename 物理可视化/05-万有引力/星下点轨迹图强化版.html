<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星下点轨迹教学系统 | 强化赤道线版</title>
    <style>
        * {
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #030507);
            color: #ccf7ff;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            padding: 20px 0;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            backdrop-filter: blur(2px);
        }

        .mission-header {
            width: 100%;
            max-width: 1100px;
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border: 1px solid rgba(0, 255, 200, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00ffcc, #3a86ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0,255,200,0.3);
        }

        .telemetry {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #000000aa;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border-left: 3px solid #0ff;
            letter-spacing: 0.5px;
        }

        .globe-container {
            background: #000000;
            border-radius: 24px;
            padding: 8px;
            background: linear-gradient(145deg, #10161f, #03070e);
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,200,0.2);
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(0,255,200,0.2);
            cursor: crosshair;
        }

        .control-panel {
            background: rgba(12, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 18px 28px;
            width: fit-content;
            max-width: 1100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 28px;
            border: 1px solid #2a3a4a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .ctrl-group {
            background: #0e1622;
            border-radius: 28px;
            padding: 12px 20px;
            min-width: 160px;
            transition: all 0.2s;
            border-bottom: 2px solid #2c5f6e;
        }

        .ctrl-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #bbfffc;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 180px;
            background: #1f2a36;
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px cyan;
            border: none;
        }

        .value-indicator {
            background: #000000aa;
            padding: 2px 8px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-left: 10px;
            color: #0ff;
        }

        button {
            background: #1e2a36;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: #0ff;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px black;
            margin: 0 4px;
        }

        button:hover {
            background: #2f4558;
            color: white;
            box-shadow: 0 0 8px cyan;
            transform: scale(1.02);
        }

        .info-note {
            font-size: 0.7rem;
            color: #6c8d9c;
            text-align: center;
            margin-top: 8px;
            max-width: 800px;
        }

        .badge {
            background: #00aacc20;
            border-radius: 24px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="mission-header">
        <div class="title">🛰️ 星下点轨迹 · 赤道线强化教学系统</div>
        <div class="telemetry" id="statsPanel">⏱️ TIME: 0.0 s | 🌍 n = 12 | 📐 i = 45° | ⚡ 1.0x</div>
    </div>

    <div class="globe-container">
        <canvas id="worldCanvas" width="1000" height="500"></canvas>
    </div>

    <div class="control-panel">
        <div class="ctrl-group">
            <label>🌀 周期比 n = T_自转 / T_轨道</label>
            <input type="range" id="nRatio" min="1" max="24" step="1" value="12">
            <span id="nValue" class="value-indicator">12</span>
            <div class="badge">整数→重复轨迹</div>
        </div>

        <div class="ctrl-group">
            <label>📐 轨道倾角 i (0~90°)</label>
            <input type="range" id="inclinationSlider" min="0" max="90" step="1" value="45">
            <span id="incValue" class="value-indicator">45°</span>
        </div>

        <div class="ctrl-group">
            <label>⚡ 仿真速率</label>
            <input type="range" id="speedSlider" min="0.3" max="3.5" step="0.05" value="1.0">
            <span id="speedValue" class="value-indicator">1.0x</span>
        </div>

        <div class="ctrl-group" style="display: flex; gap: 12px; align-items: center;">
            <button id="playPauseBtn">⏸️ 暂停</button>
            <button id="clearTrailBtn">🗑️ 清除轨迹</button>
            <button id="resetBtn">🔄 重置演示</button>
        </div>
    </div>
    <div class="info-note">
        💡 星下点轨迹 = 卫星位置在地球表面的投影 | 周期比 n 越大轨迹越密集 | 倾角决定纬度范围 | 
        🧠 当 n 为整数时，轨迹每隔 n 圈重复 | 连线自动避开经度跳变 | ✨ <strong style="color:#ff8888">赤道线双重高亮</strong> (红色+发光白线)
    </div>
</div>

<script>
    (function(){
        // ---------- 获取元素 ----------
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 1000, H = 500;
        canvas.width = W;
        canvas.height = H;
        
        // 地球背景图片 (高分辨率等距圆柱投影地图)
        const earthImage = new Image();
        earthImage.crossOrigin = "Anonymous";
        earthImage.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Earth_map_fixed.png/1024px-Earth_map_fixed.png";
        let earthReady = false;
        earthImage.onload = () => { earthReady = true; };
        earthImage.onerror = () => { console.warn("地球背景图加载失败，使用纯色+网格背景"); };
        
        // ---------- 仿真核心 ----------
        let simTime = 0;
        const orbitalPeriodMs = 5000;
        let n = 12;
        let inclinationDeg = 45;
        let speedFactor = 1.0;
        let isPlaying = true;
        
        let trailPoints = [];
        const MAX_TRAIL = 2800;
        
        // UI 元素绑定
        const nSlider = document.getElementById('nRatio');
        const nSpan = document.getElementById('nValue');
        const incSlider = document.getElementById('inclinationSlider');
        const incSpan = document.getElementById('incValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedSpan = document.getElementById('speedValue');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const clearTrailBtn = document.getElementById('clearTrailBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statsPanel = document.getElementById('statsPanel');
        
        // 经纬度转换
        function lonLatToCanvas(lon, lat) {
            let x = (lon + 180) / 360 * W;
            let y = (90 - lat) / 180 * H;
            x = Math.min(W, Math.max(0, x));
            y = Math.min(H, Math.max(0, y));
            return { x, y };
        }
        
        function normalizeLon(angleDeg) {
            let lon = angleDeg % 360;
            if (lon > 180) lon -= 360;
            if (lon < -180) lon += 360;
            return lon;
        }
        
        function computeSubpoint(timeMs, orbitPeriod, ratioN, inclination) {
            let thetaRad = (timeMs / orbitPeriod) * Math.PI * 2;
            let thetaDeg = thetaRad * 180 / Math.PI;
            let earthRotationDeg = thetaDeg / ratioN;
            let lat = inclination * Math.sin(thetaRad);
            lat = Math.min(90, Math.max(-90, lat));
            let inertialLon = thetaDeg;
            let lon = inertialLon - earthRotationDeg;
            lon = normalizeLon(lon);
            return { lat, lon };
        }
        
        // 绘制经纬网格 (强化赤道线：原有红线 + 新增一条半透发光白线)
        function drawGrid() {
            ctx.save();
            ctx.shadowBlur = 0;
            
            // 1. 经线
            ctx.strokeStyle = "rgba(150, 220, 255, 0.45)";
            ctx.lineWidth = 0.8;
            ctx.fillStyle = "#aafff0";
            ctx.font = "10px 'Segoe UI'";
            for (let lon = -180; lon <= 180; lon += 30) {
                const start = lonLatToCanvas(lon, -89);
                const end = lonLatToCanvas(lon, 89);
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
                if (Math.abs(lon) % 90 === 0 || lon === 0) {
                    const labelPos = lonLatToCanvas(lon, -5);
                    ctx.fillStyle = "#8bcbff";
                    ctx.fillText(lon + "°", labelPos.x - 12, labelPos.y - 3);
                }
            }
            
            // 2. 纬线 (常规)
            for (let lat = -75; lat <= 75; lat += 30) {
                const left = lonLatToCanvas(-180, lat);
                const right = lonLatToCanvas(180, lat);
                ctx.beginPath();
                ctx.moveTo(left.x, left.y);
                ctx.lineTo(right.x, right.y);
                if (lat === 0) {
                    // 赤道线由后续特殊绘制，此处跳过常规绘制避免重复样式混乱
                    continue;
                } else {
                    ctx.strokeStyle = "rgba(100, 200, 220, 0.5)";
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
                const mark = lonLatToCanvas(165, lat);
                ctx.fillStyle = "#7fc9ff";
                ctx.fillText(Math.abs(lat) + (lat>0?"°N":"°S"), mark.x-20, mark.y-2);
            }
            
            // ========== 赤道线强化：两条线叠加 ==========
            // 赤道两端点
            const equatorLeft = lonLatToCanvas(-180, 0);
            const equatorRight = lonLatToCanvas(180, 0);
            
            // 第一条赤道线 (原有风格: 亮红，较粗)
            ctx.beginPath();
            ctx.moveTo(equatorLeft.x, equatorLeft.y);
            ctx.lineTo(equatorRight.x, equatorRight.y);
            ctx.strokeStyle = "#ff6688";
            ctx.lineWidth = 2.8;
            ctx.shadowBlur = 4;
            ctx.shadowColor = "#ff3366";
            ctx.stroke();
            
            // 第二条赤道线 (新增“一天赤道线”效果: 半透明白色光晕，更粗，营造发光感)
            ctx.beginPath();
            ctx.moveTo(equatorLeft.x, equatorLeft.y);
            ctx.lineTo(equatorRight.x, equatorRight.y);
            ctx.strokeStyle = "rgba(255, 220, 180, 0.75)";
            ctx.lineWidth = 5;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ffaa88";
            ctx.stroke();
            
            // 恢复阴影并添加文字标注 (赤道标识加大)
            ctx.shadowBlur = 0;
            const equatorLabelPos = lonLatToCanvas(0, 3);
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillStyle = "#ffbb99";
            ctx.shadowBlur = 2;
            ctx.fillText("🌐 赤道 (Equator)", equatorLabelPos.x - 55, equatorLabelPos.y + 8);
            ctx.fillStyle = "#ff8888";
            ctx.font = "bold 12px monospace";
            ctx.fillText("0°", equatorLabelPos.x + 25, equatorLabelPos.y + 6);
            
            // 回归线 (保留教学)
            ctx.beginPath();
            const tropicLat = 23.5;
            const leftT = lonLatToCanvas(-180, tropicLat);
            const rightT = lonLatToCanvas(180, tropicLat);
            ctx.strokeStyle = "#ffaa66";
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 6]);
            ctx.moveTo(leftT.x, leftT.y);
            ctx.lineTo(rightT.x, rightT.y);
            ctx.stroke();
            const leftTS = lonLatToCanvas(-180, -tropicLat);
            const rightTS = lonLatToCanvas(180, -tropicLat);
            ctx.moveTo(leftTS.x, leftTS.y);
            ctx.lineTo(rightTS.x, rightTS.y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#ffbc80";
            ctx.fillText("回归线", leftT.x+5, leftT.y-3);
            ctx.fillText("回归线", leftTS.x+5, leftTS.y+10);
            ctx.restore();
        }
        
        // 绘制地球背景
        function drawEarthBackground() {
            if (earthReady && earthImage.complete && earthImage.naturalWidth > 0) {
                ctx.drawImage(earthImage, 0, 0, W, H);
            } else {
                ctx.fillStyle = "#0a1a2f";
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = "#2d6a4f";
                ctx.font = "12px monospace";
                ctx.fillText("🌍 地球影像加载中...", W/2-100, H/2);
            }
        }
        
        // 渲染全部
        function render() {
            if (!ctx) return;
            drawEarthBackground();
            drawGrid();
            
            // 绘制历史轨迹
            if (trailPoints.length > 1) {
                ctx.beginPath();
                ctx.lineWidth = 2.2;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowBlur = 3;
                ctx.shadowColor = "#00ccaa";
                for (let i = 1; i < trailPoints.length; i++) {
                    const prev = trailPoints[i-1];
                    const curr = trailPoints[i];
                    let lonDelta = Math.abs(curr.lon - prev.lon);
                    if (lonDelta < 180) {
                        ctx.beginPath();
                        ctx.moveTo(prev.x, prev.y);
                        ctx.lineTo(curr.x, curr.y);
                        ctx.strokeStyle = `rgba(0, 230, 210, 0.85)`;
                        ctx.stroke();
                    }
                }
                ctx.shadowBlur = 0;
            }
            
            // 轨迹点微光
            if(trailPoints.length > 0) {
                for(let i=0; i<trailPoints.length; i+=4) {
                    let pt = trailPoints[i];
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 1.2, 0, Math.PI*2);
                    ctx.fillStyle = "#80ffe5";
                    ctx.fill();
                }
            }
            
            // 当前卫星
            const { lat, lon } = computeSubpoint(simTime, orbitalPeriodMs, n, inclinationDeg);
            const { x: satX, y: satY } = lonLatToCanvas(lon, lat);
            
            ctx.shadowBlur = 14;
            ctx.shadowColor = "#0ff";
            ctx.beginPath();
            ctx.arc(satX, satY, 9, 0, Math.PI*2);
            ctx.fillStyle = "#ffffffcc";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(satX, satY, 5, 0, Math.PI*2);
            ctx.fillStyle = "#00ffff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(satX, satY, 2.5, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(satX, satY, 12, 0, Math.PI*2);
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.beginPath();
            ctx.moveTo(satX-12, satY);
            ctx.lineTo(satX-5, satY);
            ctx.moveTo(satX+5, satY);
            ctx.lineTo(satX+12, satY);
            ctx.moveTo(satX, satY-12);
            ctx.lineTo(satX, satY-5);
            ctx.moveTo(satX, satY+5);
            ctx.lineTo(satX, satY+12);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 1.8;
            ctx.stroke();
            
            ctx.font = "bold 12px 'JetBrains Mono'";
            ctx.fillStyle = "#e0fffa";
            ctx.fillText(`🛸 星下点  ${lat.toFixed(1)}° ${lat>=0?'N':'S'} , ${Math.abs(lon).toFixed(1)}° ${lon>=0?'E':'W'}`, satX+12, satY-6);
            
            let timeSec = (simTime / 1000).toFixed(1);
            statsPanel.innerHTML = `⏱️ TIME: ${timeSec}s | 🌍 n = ${n} | 📐 i = ${inclinationDeg}° | ⚡ ${speedFactor.toFixed(2)}x  | 🛰️ 轨迹点数:${trailPoints.length}`;
        }
        
        function updateTrail() {
            const { lat, lon } = computeSubpoint(simTime, orbitalPeriodMs, n, inclinationDeg);
            const { x, y } = lonLatToCanvas(lon, lat);
            if (trailPoints.length > 0) {
                const last = trailPoints[trailPoints.length - 1];
                const distPixel = Math.hypot(last.x - x, last.y - y);
                if (distPixel < 0.8 && Math.abs(last.lon - lon) < 0.05) return;
            }
            trailPoints.push({ x, y, lon, lat, simTime: simTime });
            if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
        }
        
        function fullReset() {
            simTime = 0;
            trailPoints = [];
            n = parseInt(nSlider.value);
            inclinationDeg = parseInt(incSlider.value);
            speedFactor = parseFloat(speedSlider.value);
            nSpan.innerText = n;
            incSpan.innerText = inclinationDeg + "°";
            speedSpan.innerText = speedFactor.toFixed(2) + "x";
            if (!isPlaying) {
                isPlaying = true;
                playPauseBtn.innerHTML = "⏸️ 暂停";
            }
            updateTrail();
        }
        
        function clearTrailOnly() {
            trailPoints = [];
        }
        
        function onParameterChange() {
            n = parseInt(nSlider.value);
            inclinationDeg = parseInt(incSlider.value);
            nSpan.innerText = n;
            incSpan.innerText = inclinationDeg + "°";
            simTime = 0;
            trailPoints = [];
            updateTrail();
        }
        
        function onSpeedChange() {
            speedFactor = parseFloat(speedSlider.value);
            speedSpan.innerText = speedFactor.toFixed(2) + "x";
        }
        
        let lastFrameTime = 0;
        function animate(currentTimeMs) {
            requestAnimationFrame(animate);
            if (!lastFrameTime) {
                lastFrameTime = performance.now();
                return;
            }
            let now = performance.now();
            let delta = Math.min(100, now - lastFrameTime);
            if (delta > 0 && isPlaying) {
                simTime += delta * speedFactor;
            }
            lastFrameTime = now;
            updateTrail();
            render();
        }
        
        // 事件绑定
        nSlider.addEventListener('input', onParameterChange);
        incSlider.addEventListener('input', onParameterChange);
        speedSlider.addEventListener('input', onSpeedChange);
        resetBtn.addEventListener('click', fullReset);
        clearTrailBtn.addEventListener('click', clearTrailOnly);
        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playPauseBtn.innerHTML = isPlaying ? "⏸️ 暂停" : "▶️ 启动";
        });
        
        function syncSlidersToState() {
            nSlider.value = n;
            incSlider.value = inclinationDeg;
            speedSlider.value = speedFactor;
            nSpan.innerText = n;
            incSpan.innerText = inclinationDeg + "°";
            speedSpan.innerText = speedFactor.toFixed(2)+"x";
        }
        
        function init() {
            fullReset();
            syncSlidersToState();
            lastFrameTime = performance.now();
            requestAnimationFrame(animate);
        }
        
        init();
    })();
</script>
</body>
</html>
