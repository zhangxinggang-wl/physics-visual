<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小球在漏斗中的匀速圆周运动</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        h1 {
            color: #4dabf7;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-align: center;
        }
        
        .title-footer {
            text-align: right;
            color: #a5d8ff;
            font-size: 1rem;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .simulation-container {
            flex: 1;
            min-width: 300px;
            height: 500px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        .simulation-container canvas {
            display: block;
        }
        
        .controls {
            flex: 0 0 300px;
            background: rgba(30, 30, 60, 0.7);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
        
        .control-group {
            margin-bottom: 25px;
        }
        
        h2 {
            color: #74c0fc;
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-bottom: 2px solid #339af0;
            padding-bottom: 8px;
        }
        
        h3 {
            color: #a5d8ff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .slider-container {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #d0ebff;
        }
        
        input[type="range"] {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: rgba(100, 100, 150, 0.5);
            border-radius: 5px;
            outline: none;
            margin-bottom: 10px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #339af0;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #1c7ed6;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .control-button {
            flex: 1;
            padding: 12px;
            background: #339af0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .control-button:hover {
            background: #1c7ed6;
            transform: translateY(-2px);
        }
        
        .control-button:active {
            transform: translateY(0);
        }
        
        .control-button.pause {
            background: #ff6b6b;
        }
        
        .control-button.pause:hover {
            background: #fa5252;
        }
        
        .control-button.play {
            background: #51cf66;
        }
        
        .control-button.play:hover {
            background: #40c057;
        }
        
        .value-display {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4dabf7;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            
            .controls {
                width: 100%;
            }
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4dabf7;
            font-size: 1.2rem;
        }
        
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 1.2rem;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>小球在漏斗中的匀速圆周运动</h1>
            <div class="title-footer">制作：张兴刚燕赵名师工作室 耿春辉</div>
        </header>
        
        <div class="content">
            <div class="simulation-container" id="simulation">
                <div class="loading" id="loading">加载3D场景中...</div>
            </div>
            
            <div class="controls">
                <h2>控制面板</h2>
                
                <div class="button-group">
                    <button id="pauseBtn" class="control-button pause">暂停转动</button>
                    <button id="playBtn" class="control-button play">开始转动</button>
                </div>
                
                <div class="control-group">
                    <h3>漏斗参数</h3>
                    
                    <div class="slider-container">
                        <label for="funnelRadius">漏斗底圆半径: <span id="radiusValue">10.0</span> cm</label>
                        <input type="range" id="funnelRadius" min="5" max="20" step="0.5" value="10">
                    </div>
                    
                    <div class="slider-container">
                        <label for="funnelHeight">漏斗高度: <span id="heightValue">15.0</span> cm</label>
                        <input type="range" id="funnelHeight" min="10" max="25" step="0.5" value="15">
                    </div>
                </div>
                
                <div class="control-group">
                    <h3>小球参数</h3>
                    
                    <div class="slider-container">
                        <label for="ballSpeed">小球线速度: <span id="speedValue">8.0</span> cm/s</label>
                        <input type="range" id="ballSpeed" min="2" max="20" step="0.5" value="8">
                    </div>
                    
                    <div class="slider-container">
                        <label for="ballRadius">小球半径: <span id="ballRadiusValue">1.5</span> cm</label>
                        <input type="range" id="ballRadius" min="0.5" max="3" step="0.1" value="1.5">
                    </div>
                </div>
                
                <div class="control-group">
                    <h3>视角控制</h3>
                    
                    <div class="slider-container">
                        <label for="cameraAngle">视角角度: <span id="cameraAngleValue">45</span>°</label>
                        <input type="range" id="cameraAngle" min="0" max="360" step="1" value="45">
                    </div>
                    
                    <div class="value-display" id="rotationInfo">
                        旋转半径: <span id="currentRadius">6.0</span> cm<br>
                        角速度: <span id="angularSpeed">1.33</span> rad/s<br>
                        状态: <span id="motionState">转动中</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let funnel, ball, path;
        let funnelRadius = 10.0, funnelHeight = 15.0;
        let ballSpeed = 8.0, ballRadius = 1.5;
        let currentAngle = 0;
        let currentBallHeight = 5.0;
        let rotationRadius = 6.0;
        let isInitialized = false;
        let isPlaying = true;
        
        // 初始化Three.js场景
        function init() {
            try {
                // 检查Three.js是否加载成功
                if (typeof THREE === 'undefined') {
                    throw new Error("Three.js库未加载成功");
                }
                
                // 创建场景
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a1a);
                
                // 创建相机
                const container = document.getElementById('simulation');
                if (!container) {
                    throw new Error("容器元素不存在");
                }
                
                camera = new THREE.PerspectiveCamera(
                    60, 
                    container.clientWidth / container.clientHeight, 
                    0.1, 
                    1000
                );
                camera.position.set(25, 15, 25);
                
                // 创建渲染器
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true 
                });
                
                if (!renderer) {
                    throw new Error("无法创建WebGL渲染器");
                }
                
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.shadowMap.enabled = true;
                container.appendChild(renderer.domElement);
                
                // 添加轨道控制
                try {
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.05;
                    controls.minDistance = 10;
                    controls.maxDistance = 50;
                } catch (e) {
                    console.warn("轨道控制初始化失败:", e);
                }
                
                // 添加光源
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(20, 30, 10);
                scene.add(directionalLight);
                
                // 创建漏斗
                createFunnel();
                
                // 创建小球
                createBall();
                
                // 创建运动轨迹
                createPath();
                
                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                
                // 标记初始化完成
                isInitialized = true;
                
                // 窗口大小调整事件
                window.addEventListener('resize', onWindowResize);
                
                // 初始化控制面板事件
                initControls();
                
                // 更新物理参数显示
                updatePhysicsInfo();
                
                // 开始动画
                animate();
                
                console.log("3D场景初始化成功");
                
            } catch (error) {
                console.error("初始化3D场景时出错:", error);
                const loadingElement = document.getElementById('loading');
                if (loadingElement) {
                    loadingElement.innerHTML = `
                        <div class="error-message">
                            <p>加载3D场景失败</p>
                            <p>错误信息: ${error.message}</p>
                            <p>请检查:</p>
                            <ul style="text-align: left; margin-top: 10px;">
                                <li>浏览器是否支持WebGL</li>
                                <li>网络连接是否正常</li>
                                <li>尝试刷新页面</li>
                            </ul>
                        </div>
                    `;
                }
            }
        }
        
        // 创建漏斗
        function createFunnel() {
            // 清除旧漏斗
            if (funnel) {
                scene.remove(funnel);
            }
            
            const group = new THREE.Group();
            
            // 圆锥部分（漏斗壁）
            const coneGeometry = new THREE.ConeGeometry(
                funnelRadius, 
                funnelHeight, 
                32, 
                1, 
                false, 
                0, 
                Math.PI * 2
            );
            
            // 旋转圆锥使其尖端向下
            coneGeometry.rotateX(Math.PI);
            
            // 创建漏斗材质
            const funnelMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x3a86ff, 
                transparent: true, 
                opacity: 0.4,
                side: THREE.DoubleSide
            });
            
            const cone = new THREE.Mesh(coneGeometry, funnelMaterial);
            cone.position.y = funnelHeight / 2;
            group.add(cone);
            
            // 添加漏斗边框
            const edges = new THREE.EdgesGeometry(coneGeometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1e88e5 }));
            line.position.y = funnelHeight / 2;
            group.add(line);
            
            // 添加漏斗底部圆形边框
            const circleGeometry = new THREE.RingGeometry(funnelRadius - 0.1, funnelRadius, 32);
            const circleMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x1e88e5, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7
            });
            const circle = new THREE.Mesh(circleGeometry, circleMaterial);
            circle.rotation.x = Math.PI / 2;
            circle.position.y = 0.1;
            group.add(circle);
            
            // 添加漏斗中心垂直线
            const verticalLineGeometry = new THREE.CylinderGeometry(0.05, 0.05, funnelHeight);
            const verticalLineMaterial = new THREE.MeshBasicMaterial({ color: 0xff6b6b });
            const verticalLine = new THREE.Mesh(verticalLineGeometry, verticalLineMaterial);
            verticalLine.position.y = funnelHeight / 2;
            group.add(verticalLine);
            
            scene.add(group);
            funnel = group;
        }
        
        // 创建小球
        function createBall() {
            // 清除旧小球
            if (ball) {
                scene.remove(ball);
            }
            
            const geometry = new THREE.SphereGeometry(ballRadius, 16, 16);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0xff6b6b,
                shininess: 100
            });
            ball = new THREE.Mesh(geometry, material);
            
            // 计算小球在漏斗内壁的正确位置
            updateBallPosition();
            
            scene.add(ball);
        }
        
        // 创建运动轨迹
        function createPath() {
            if (path) {
                scene.remove(path);
            }
            
            const segments = 32;
            const points = [];
            
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                points.push(
                    new THREE.Vector3(
                        Math.cos(angle) * rotationRadius,
                        0,
                        Math.sin(angle) * rotationRadius
                    )
                );
            }
            
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: 0x51cf66,
                transparent: true,
                opacity: 0.7
            });
            
            path = new THREE.Line(geometry, material);
            path.position.y = currentBallHeight;
            scene.add(path);
        }
        
        // 更新小球位置 - 确保小球在漏斗内侧壁
        function updateBallPosition() {
            // 计算漏斗壁角度
            const funnelAngle = Math.atan(funnelHeight / funnelRadius);
            
            // 计算小球旋转半径（基于速度和物理公式）
            // F = m*v²/r = mg*tanθ
            // v²/r = g*tanθ
            // r = v²/(g*tanθ)
            const g = 9.8; // 重力加速度 cm/s²
            rotationRadius = (ballSpeed * ballSpeed) / (g * Math.tan(funnelAngle));
            
            // 限制旋转半径
            rotationRadius = Math.min(rotationRadius, funnelRadius * 0.9 - ballRadius); // 留出小球半径的空间
            rotationRadius = Math.max(rotationRadius, ballRadius * 1.5); // 最小半径不能小于小球半径
            
            // 计算小球在漏斗内壁的高度
            // 漏斗形状：y = H - (H/R) * r
            // 其中 r 是水平半径，y 是高度
            const r = rotationRadius;
            currentBallHeight = funnelHeight - (funnelHeight / funnelRadius) * r;
            
            // 确保高度合理
            currentBallHeight = Math.max(currentBallHeight, ballRadius + 0.5); // 不低于小球半径
            currentBallHeight = Math.min(currentBallHeight, funnelHeight - ballRadius - 0.5); // 不高于漏斗顶部
            
            // 计算小球在漏斗内壁的实际位置
            // 漏斗内壁的方程式：y = H - (H/R) * sqrt(x² + z²)
            // 对于给定的旋转半径 r，高度为 currentBallHeight
            const x = Math.cos(currentAngle) * r;
            const z = Math.sin(currentAngle) * r;
            
            if (ball) {
                // 将小球放置在漏斗内表面
                ball.position.set(x, currentBallHeight, z);
                
                // 调整小球使其贴合漏斗内壁
                // 计算漏斗内壁在该点的法线方向
                const slope = funnelHeight / funnelRadius; // 漏斗斜率
                const distanceFromCenter = Math.sqrt(x*x + z*z);
                
                if (distanceFromCenter > 0.001) {
                    // 法线方向：指向外侧和上方
                    const normalX = x / distanceFromCenter;
                    const normalZ = z / distanceFromCenter;
                    const normalY = slope; // 漏斗壁的斜率
                    
                    // 归一化法线向量
                    const normalLength = Math.sqrt(normalX*normalX + normalY*normalY + normalZ*normalZ);
                    const normX = normalX / normalLength;
                    const normY = normalY / normalLength;
                    const normZ = normalZ / normalLength;
                    
                    // 将小球沿法线方向移动，使其表面接触漏斗内壁
                    const offsetX = normX * ballRadius;
                    const offsetY = normY * ballRadius;
                    const offsetZ = normZ * ballRadius;
                    
                    // 调整小球位置，使其在漏斗内侧
                    ball.position.x -= offsetX;
                    ball.position.y -= offsetY;
                    ball.position.z -= offsetZ;
                }
            }
            
            // 更新轨迹圆位置
            if (path) {
                path.position.y = currentBallHeight;
                createPath();
            }
            
            // 更新物理参数显示
            updatePhysicsInfo();
        }
        
        // 更新物理参数显示
        function updatePhysicsInfo() {
            const currentRadiusElem = document.getElementById('currentRadius');
            const angularSpeedElem = document.getElementById('angularSpeed');
            const motionStateElem = document.getElementById('motionState');
            
            if (currentRadiusElem) {
                currentRadiusElem.textContent = rotationRadius.toFixed(2);
            }
            
            if (angularSpeedElem) {
                const angularSpeed = ballSpeed / Math.max(rotationRadius, 0.1);
                angularSpeedElem.textContent = angularSpeed.toFixed(2);
            }
            
            if (motionStateElem) {
                motionStateElem.textContent = isPlaying ? "转动中" : "已暂停";
            }
        }
        
        // 初始化控制面板事件
        function initControls() {
            // 控制按钮
            const pauseBtn = document.getElementById('pauseBtn');
            const playBtn = document.getElementById('playBtn');
            
            if (pauseBtn) {
                pauseBtn.addEventListener('click', function() {
                    isPlaying = false;
                    updatePhysicsInfo();
                });
            }
            
            if (playBtn) {
                playBtn.addEventListener('click', function() {
                    isPlaying = true;
                    updatePhysicsInfo();
                });
            }
            
            // 漏斗底圆半径控制
            const funnelRadiusSlider = document.getElementById('funnelRadius');
            const radiusValue = document.getElementById('radiusValue');
            
            if (funnelRadiusSlider && radiusValue) {
                funnelRadiusSlider.addEventListener('input', function() {
                    funnelRadius = parseFloat(this.value);
                    radiusValue.textContent = funnelRadius.toFixed(1);
                    
                    // 重新创建漏斗
                    createFunnel();
                    
                    // 更新小球位置
                    updateBallPosition();
                });
            }
            
            // 漏斗高度控制
            const funnelHeightSlider = document.getElementById('funnelHeight');
            const heightValue = document.getElementById('heightValue');
            
            if (funnelHeightSlider && heightValue) {
                funnelHeightSlider.addEventListener('input', function() {
                    funnelHeight = parseFloat(this.value);
                    heightValue.textContent = funnelHeight.toFixed(1);
                    
                    // 重新创建漏斗
                    createFunnel();
                    
                    // 更新小球位置
                    updateBallPosition();
                });
            }
            
            // 小球速度控制
            const ballSpeedSlider = document.getElementById('ballSpeed');
            const speedValue = document.getElementById('speedValue');
            
            if (ballSpeedSlider && speedValue) {
                ballSpeedSlider.addEventListener('input', function() {
                    ballSpeed = parseFloat(this.value);
                    speedValue.textContent = ballSpeed.toFixed(1);
                    
                    // 更新小球位置
                    updateBallPosition();
                });
            }
            
            // 小球半径控制
            const ballRadiusSlider = document.getElementById('ballRadius');
            const ballRadiusValue = document.getElementById('ballRadiusValue');
            
            if (ballRadiusSlider && ballRadiusValue) {
                ballRadiusSlider.addEventListener('input', function() {
                    ballRadius = parseFloat(this.value);
                    ballRadiusValue.textContent = ballRadius.toFixed(1);
                    
                    // 重新创建小球
                    createBall();
                });
            }
            
            // 相机角度控制
            const cameraAngleSlider = document.getElementById('cameraAngle');
            const cameraAngleValue = document.getElementById('cameraAngleValue');
            
            if (cameraAngleSlider && cameraAngleValue) {
                cameraAngleSlider.addEventListener('input', function() {
                    const angle = parseFloat(this.value);
                    cameraAngleValue.textContent = angle;
                    
                    // 更新相机位置
                    const radius = 30;
                    const rad = angle * Math.PI / 180;
                    camera.position.x = radius * Math.cos(rad);
                    camera.position.z = radius * Math.sin(rad);
                    camera.lookAt(0, funnelHeight/2, 0);
                });
            }
        }
        
        // 动画循环
        function animate() {
            if (!isInitialized) return;
            
            requestAnimationFrame(animate);
            
            // 如果正在播放，更新小球角度
            if (isPlaying) {
                const angularSpeed = ballSpeed / Math.max(rotationRadius, 0.1);
                currentAngle += angularSpeed * 0.01;
            }
            
            // 更新小球位置
            updateBallPosition();
            
            // 更新轨道控制
            if (controls) {
                controls.update();
            }
            
            // 渲染场景
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // 窗口大小调整处理
        function onWindowResize() {
            if (!isInitialized) return;
            
            const container = document.getElementById('simulation');
            if (!container) return;
            
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            // 延迟初始化，确保所有资源加载完成
            setTimeout(init, 100);
        });
    </script>
</body>
</html>
