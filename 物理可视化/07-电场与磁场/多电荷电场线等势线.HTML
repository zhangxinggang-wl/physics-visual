<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多点电荷高对比度模拟器 - 增强控制版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            cursor: crosshair;
        }
        .panel {
            backdrop-filter: blur(16px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        input[type="range"] {
            accent-color: #6366f1;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: #818cf8;
            border-radius: 50%;
            cursor: pointer;
        }
        /* 自定义滚动条 */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- 顶部控制栏 -->
    <div class="panel p-4 border-b flex flex-wrap gap-4 items-center justify-between z-10 shadow-2xl">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black tracking-tighter text-white">
                PHYSICS<span class="text-indigo-500">VIS</span>
            </h1>
            <div class="flex items-center gap-3">
                <label class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">电荷数量</label>
                <input type="range" id="chargeCount" min="1" max="6" value="2" class="w-32">
                <span id="countDisplay" class="font-mono text-indigo-400 font-bold w-4 text-center">2</span>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button id="resetBtn" class="px-4 py-1.5 bg-white/10 hover:bg-white/20 rounded-lg text-[10px] font-bold transition uppercase tracking-widest border border-white/5">重置位置</button>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-indigo-500/10 rounded-lg border border-indigo-500/30">
                <input type="checkbox" id="showFieldLines" checked>
                <label for="showFieldLines" class="text-[10px] uppercase font-bold cursor-pointer select-none">电场线</label>
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/10 rounded-lg border border-emerald-500/30">
                <input type="checkbox" id="showPotential" checked>
                <label for="showPotential" class="text-[10px] uppercase font-bold cursor-pointer select-none text-emerald-400">等势线</label>
            </div>
        </div>
    </div>

    <!-- 主画布 -->
    <div class="relative flex-grow overflow-hidden bg-black">
        <canvas id="canvas"></canvas>
        
        <!-- 侧边参数调节 -->
        <div id="chargeEditor" class="absolute right-4 top-4 panel p-5 rounded-2xl w-72 shadow-2xl hidden lg:block">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400">电荷独立控制</h3>
                <span class="text-[9px] text-slate-500">Q = 极性 × 电量</span>
            </div>
            <div id="chargeControls" class="space-y-4 max-h-[65vh] overflow-y-auto pr-2 custom-scroll">
                <!-- 动态生成控件 -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const chargeCountInput = document.getElementById('chargeCount');
        const countDisplay = document.getElementById('countDisplay');
        const chargeControls = document.getElementById('chargeControls');
        const showFieldLinesInput = document.getElementById('showFieldLines');
        const showPotentialInput = document.getElementById('showPotential');
        const resetBtn = document.getElementById('resetBtn');

        let width, height;
        let charges = [];
        let draggingCharge = null;

        const K = 12000; 
        const FIELD_LINE_STEP = 5;
        const POTENTIAL_LEVELS = [-150, -100, -70, -50, -35, -20, -10, -5, 5, 10, 20, 35, 50, 70, 100, 150];

        class Charge {
            constructor(id, x, y, polarity, magnitude) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.polarity = polarity; // 1 or -1
                this.magnitude = magnitude; // 0 to 3
                this.radius = 16;
            }

            get q() {
                return this.polarity * this.magnitude;
            }

            draw() {
                if (this.magnitude === 0) {
                    // 绘制空位
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.setLineDash([2, 2]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    return;
                }

                const color = this.polarity > 0 ? '#ff3e3e' : '#3b82f6';
                
                // 动态半径：根据电量大小微调视觉大小
                const displayRadius = this.radius * (0.8 + this.magnitude * 0.2);

                ctx.shadowBlur = 20 * (this.magnitude / 3 + 0.5);
                ctx.shadowColor = color;

                ctx.beginPath();
                ctx.arc(this.x, this.y, displayRadius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = `bold ${14 + this.magnitude * 2}px Inter, system-ui`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.polarity > 0 ? '+' : '-', this.x, this.y);
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createCharges(count) {
            charges = [];
            chargeControls.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const x = width * (0.3 + Math.random() * 0.4);
                const y = height * (0.3 + Math.random() * 0.4);
                const pol = (i % 2 === 0) ? 1 : -1;
                const mag = 1.0;
                charges.push(new Charge(i, x, y, pol, mag));
                addChargeControl(i, pol, mag);
            }
        }

        function addChargeControl(id, pol, mag) {
            const div = document.createElement('div');
            div.className = 'bg-white/5 p-4 rounded-xl border border-white/5 space-y-3';
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">电荷 #${id + 1}</span>
                    <div class="flex bg-black/40 p-0.5 rounded-lg border border-white/10">
                        <button onclick="updatePolarity(${id}, 1)" id="pol-pos-${id}" class="px-2 py-0.5 rounded-md text-[9px] font-bold transition ${pol > 0 ? 'bg-red-500 text-white' : 'text-slate-500 hover:text-white'}">正极 (+)</button>
                        <button onclick="updatePolarity(${id}, -1)" id="pol-neg-${id}" class="px-2 py-0.5 rounded-md text-[9px] font-bold transition ${pol < 0 ? 'bg-blue-500 text-white' : 'text-slate-500 hover:text-white'}">负极 (-)</button>
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] uppercase font-bold">
                        <span class="text-slate-500">电量强度</span>
                        <span id="mag-val-${id}" class="text-indigo-400">${mag.toFixed(1)}</span>
                    </div>
                    <input type="range" min="0" max="3" step="0.1" value="${mag}" 
                        class="w-full" oninput="updateMagnitude(${id}, this.value)">
                </div>
            `;
            chargeControls.appendChild(div);
        }

        window.updatePolarity = (id, pol) => {
            charges[id].polarity = pol;
            // 更新按钮样式
            const posBtn = document.getElementById(`pol-pos-${id}`);
            const negBtn = document.getElementById(`pol-neg-${id}`);
            if (pol > 0) {
                posBtn.className = "px-2 py-0.5 rounded-md text-[9px] font-bold transition bg-red-500 text-white";
                negBtn.className = "px-2 py-0.5 rounded-md text-[9px] font-bold transition text-slate-500 hover:text-white";
            } else {
                posBtn.className = "px-2 py-0.5 rounded-md text-[9px] font-bold transition text-slate-500 hover:text-white";
                negBtn.className = "px-2 py-0.5 rounded-md text-[9px] font-bold transition bg-blue-500 text-white";
            }
        };

        window.updateMagnitude = (id, mag) => {
            const val = parseFloat(mag);
            charges[id].magnitude = val;
            document.getElementById(`mag-val-${id}`).innerText = val.toFixed(1);
        };

        function getPotential(x, y) {
            let v = 0;
            for (let c of charges) {
                const q = c.q;
                if (q === 0) continue;
                const r = Math.sqrt((x - c.x)**2 + (y - c.y)**2);
                if (r > 5) v += (K * q) / r;
            }
            return v;
        }

        function getField(x, y) {
            let ex = 0, ey = 0;
            for (let c of charges) {
                const q = c.q;
                if (q === 0) continue;
                const dx = x - c.x;
                const dy = y - c.y;
                const r2 = dx*dx + dy*dy;
                const r = Math.sqrt(r2);
                if (r < 5) continue;
                const f = (K * q) / r2;
                ex += f * (dx / r);
                ey += f * (dy / r);
            }
            return { x: ex, y: ey, mag: Math.sqrt(ex*ex + ey*ey) };
        }

        function drawEquipotentials() {
            if (!showPotentialInput.checked) return;
            const step = 8; 
            ctx.lineWidth = 1;
            for (let x = 0; x < width; x += step) {
                for (let y = 0; y < height; y += step) {
                    const v1 = getPotential(x, y);
                    const v2 = getPotential(x + step, y);
                    const v3 = getPotential(x, y + step);
                    for (let targetV of POTENTIAL_LEVELS) {
                        const crossX = (targetV >= v1 && targetV <= v2) || (targetV <= v1 && targetV >= v2);
                        const crossY = (targetV >= v1 && targetV <= v3) || (targetV <= v1 && targetV >= v3);
                        if (crossX || crossY) {
                            ctx.beginPath();
                            const alpha = Math.min(Math.abs(targetV) / 60 + 0.15, 0.7);
                            ctx.strokeStyle = targetV > 0 ? `rgba(248, 113, 113, ${alpha})` : `rgba(96, 165, 250, ${alpha})`;
                            if (crossX) {
                                const t = (targetV - v1) / (v2 - v1);
                                ctx.moveTo(x + t * step, y);
                                ctx.lineTo(x + t * step, y + 2);
                            } else {
                                const t = (targetV - v1) / (v3 - v1);
                                ctx.moveTo(x, y + t * step);
                                ctx.lineTo(x + 2, y + t * step);
                            }
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function drawFieldLines() {
            if (!showFieldLinesInput.checked) return;
            ctx.lineWidth = 1.0;
            for (let c of charges) {
                const q = c.q;
                if (Math.abs(q) < 0.1) continue;
                const numLines = Math.floor(Math.abs(q) * 12 + 6);
                const dir = q > 0 ? 1 : -1;
                for (let i = 0; i < numLines; i++) {
                    const angle = (i / numLines) * Math.PI * 2;
                    let curX = c.x + Math.cos(angle) * 18;
                    let curY = c.y + Math.sin(angle) * 18;
                    ctx.beginPath();
                    ctx.moveTo(curX, curY);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                    for (let step = 0; step < 300; step++) {
                        const field = getField(curX, curY);
                        if (field.mag < 0.1) break;
                        curX += (field.x / field.mag) * FIELD_LINE_STEP * dir;
                        curY += (field.y / field.mag) * FIELD_LINE_STEP * dir;
                        ctx.lineTo(curX, curY);
                        if (curX < -50 || curX > width + 50 || curY < -50 || curY > height + 50) break;
                        let hit = false;
                        for (let other of charges) {
                            if (other === c && step < 5) continue;
                            const d2 = (curX - other.x)**2 + (curY - other.y)**2;
                            if (d2 < 144) { hit = true; break; }
                        }
                        if (hit) break;
                    }
                    ctx.stroke();
                }
            }
        }

        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            drawEquipotentials();
            drawFieldLines();
            for (let c of charges) {
                c.draw();
            }
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            for (let c of charges) {
                if (Math.sqrt((mx - c.x)**2 + (my - c.y)**2) < c.radius * 2) {
                    draggingCharge = c;
                    break;
                }
            }
        });

        window.addEventListener('mousemove', e => {
            if (draggingCharge) {
                const rect = canvas.getBoundingClientRect();
                draggingCharge.x = e.clientX - rect.left;
                draggingCharge.y = e.clientY - rect.top;
            }
        });

        window.addEventListener('mouseup', () => draggingCharge = null);
        chargeCountInput.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            countDisplay.innerText = val;
            createCharges(val);
        });
        resetBtn.addEventListener('click', () => createCharges(parseInt(chargeCountInput.value)));
        window.addEventListener('resize', resize);

        resize();
        createCharges(2);
        animate();
    </script>
</body>
</html>
