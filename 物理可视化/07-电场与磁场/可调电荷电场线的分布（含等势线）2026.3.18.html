                &lt;!-- 动态生成电荷控制卡片 --&gt;
            &lt;/div&gt;

            &lt;div class=&quot;p-4 bg-gray-50 border-t border-gray-200 text-xs text-gray-500&quot;&gt;

    &lt;script&gt;
        // 全局状态
        const state = {
            charges: [], // 存储电荷对象 {x, y, q(电量), type(1正/-1负)}
            count: 2,
            showField: true,
            showPotential: true
        };

        // p5.js 实例
        let p5Instance = null;

        // 初始化逻辑
        const sketch = (p) =&gt; {
            let draggingCharge = null;

            p.setup = () =&gt; {
                const container = document.getElementById('canvas-wrapper');
                const canvas = p.createCanvas(container.clientWidth, container.clientHeight);
                canvas.parent('canvas-wrapper');
                p.smooth();
                
                // 初始化默认电荷位置
                resetCharges(state.count);
            };

            p.windowResized = () =&gt; {
                const container = document.getElementById('canvas-wrapper');
                p.resizeCanvas(container.clientWidth, container.clientHeight);
            };

            p.draw = () =&gt; {
                p.background(255);
                
                if (state.showPotential) {
                    drawEquipotentialLines();
                }
                if (state.showField) {
                    drawFieldLines();
                }
                drawCharges();
            };

            function drawEquipotentialLines() {
                p.stroke(16, 185, 129, 120); // 绿色虚线
                p.strokeWeight(1.5);
                p.noFill();
                p.drawingContext.setLineDash([5, 5]);

                const stepSize = 2;
                const maxSteps = 4000;
                
                // 使用空间网格去重，替代基于电势值的去重
                // 这样可以完美解决&ldquo;同电势但空间不连通&rdquo;导致的漏画和不对称问题
                const gridSize = 20; // 控制等势线的最小间距
                let grid = new Map();
                
                function markPath(path) {
                    for (let pt of path) {
                        let gx = Math.floor(pt.x / gridSize);
                        let gy = Math.floor(pt.y / gridSize);
                        grid.set(`${gx},${gy}`, true);
                    }
                }
                
                function isTooClose(x, y) {
                    let gx = Math.floor(x / gridSize);
                    let gy = Math.floor(y / gridSize);
                    // 检查自身及周围 8 个格子，确保有足够的间距
                    for(let i=-1; i&lt;=1; i++) {
                        for(let j=-1; j&lt;=1; j++) {
                            if (grid.get(`${gx+i},${gy+j}`)) return true;
                        }
                    }
                    return false;
                }

                // 收集候选起始点 (密集覆盖每个电荷周围)
                let startPoints = [];
                state.charges.forEach(c =&gt; {
                    // 8个方向辐射
                    for (let angle = 0; angle &lt; p.TWO_PI; angle += p.QUARTER_PI) {
                        // 半径从近到远，步长略小于 gridSize 确保不漏空隙
                        for (let r = 25; r &lt; 600; r += 12) {
                            startPoints.push({
                                x: c.x + r * p.cos(angle),
                                y: c.y + r * p.sin(angle)
                            });
                        }
                    }
                });

                // 沿等势线积分
                function integrateEquipotential(startX, startY, dir) {
                    let path = [];
                    let cx = startX, cy = startY;
                    path.push({x: cx, y: cy});
                    let closed = false;

                    for (let step = 0; step &lt; maxSteps; step++) {
                        let Ex = 0, Ey = 0;
                        let hitCharge = false;

                        for (let other of state.charges) {
                            let dx = cx - other.x;
                            let dy = cy - other.y;
                            let r2 = dx*dx + dy*dy;
                            let dist = Math.sqrt(r2);
                            if (dist &lt; 20) { hitCharge = true; break; }
                            let E_mag = 5000 * (other.q * other.type) / (r2 * dist);
                            Ex += E_mag * dx;
                            Ey += E_mag * dy;
                        }

                        if (hitCharge) break;

                        let E_len = Math.sqrt(Ex*Ex + Ey*Ey);
                        if (E_len &lt; 0.01) break;

                        // 等势线方向垂直于电场 (-Ey, Ex)
                        let Tx = (-Ey / E_len) * dir;
                        let Ty = (Ex / E_len) * dir;

                        cx += Tx * stepSize;
                        cy += Ty * stepSize;

                        path.push({x: cx, y: cy});

                        // 闭合检测
                        if (step &gt; 20 &amp;&amp; p.dist(cx, cy, startX, startY) &lt; stepSize * 1.5) {
                            closed = true;
                            break;
                        }

                        // 边界检测
                        if (cx &lt; -200 || cx &gt; p.width + 200 || cy &lt; -200 || cy &gt; p.height + 200) break;
                    }
                    return { path, closed };
                }

                for (let pt of startPoints) {
                    // 如果该起始点附近已经画过等势线，则跳过
                    if (isTooClose(pt.x, pt.y)) continue;

                    // 双向积分以处理不闭合的等势线
                    let res1 = integrateEquipotential(pt.x, pt.y, 1);
                    let res2 = { path: [], closed: false };
                    if (!res1.closed) {
                        res2 = integrateEquipotential(pt.x, pt.y, -1);
                    }

                    // 组合完整路径
                    let fullPath = [];
                    if (!res1.closed) {
                        for (let i = res2.path.length - 1; i &gt;= 0; i--) fullPath.push(res2.path[i]);
                    }
                    for (let p_pt of res1.path) fullPath.push(p_pt);

                    if (fullPath.length &gt; 10) {
                        // 将新画的线标记到网格中，防止后续线条重叠
                        markPath(fullPath);
                        
                        p.beginShape();
                        for (let p_pt of fullPath) p.vertex(p_pt.x, p_pt.y);
                        if (res1.closed) p.endShape(p.CLOSE);
                        else p.endShape();
                    }
                }
                
                p.drawingContext.setLineDash([]); // 恢复实线
            }

            p.mousePressed = () =&gt; {
                // 检测是否点击了电荷
                for (let i = 0; i &lt; state.charges.length; i++) {
                    const c = state.charges[i];
                    const d = p.dist(p.mouseX, p.mouseY, c.x, c.y);
                    if (d &lt; 20) {
                        draggingCharge = c;
                        break;
                    }
                }
            };

            p.mouseDragged = () =&gt; {
                if (draggingCharge) {
                    draggingCharge.x = p.constrain(p.mouseX, 20, p.width - 20);
                    draggingCharge.y = p.constrain(p.mouseY, 20, p.height - 20);
                }
            };

            p.mouseReleased = () =&gt; {
                draggingCharge = null;
            };

            // 核心算法：绘制电场线
            function drawFieldLines() {
                p.stroke(80, 80, 80, 100); // 降低透明度，使重叠部分柔和
                p.strokeWeight(1.5);
                p.noFill();

                const stepSize = 2; // 减小步长，提高积分精度，使线条更平滑
                const maxSteps = 3000; // 增加步数以补偿小步长
                const linesPerChargeUnit = 12; // 增加到12条，每30度一条，保证对称性且更饱满

                // 预计算：检查是否全为同种电荷，并计算几何中心
                let isAllSameType = state.charges.length &gt; 1;
                let firstType = state.charges.length &gt; 0 ? state.charges[0].type : 0;
                let centerX = 0, centerY = 0;
                
                if (isAllSameType) {
                    for (let c of state.charges) {
                        if (c.type !== firstType) {
                            isAllSameType = false;
                            break;
                        }
                        centerX += c.x;
                        centerY += c.y;
                    }
                    centerX /= state.charges.length;
                    centerY /= state.charges.length;
                }

                state.charges.forEach(c =&gt; {
                    if (c.q === 0) return;

                    // 正电荷：沿 E 方向 (1)；负电荷：沿 -E 方向 (-1)
                    let traceDir = c.type &gt; 0 ? 1 : -1;
                    
                    let lineCount = Math.floor(Math.abs(c.q) * linesPerChargeUnit);
                    let angleStep = p.TWO_PI / lineCount;
                    let startRadius = 25; // 增加起始半径，避免浮点误差导致起始点被误判为碰撞
                    
                    // 恢复对齐：取消负电荷的偏移，确保正负电荷都能画出水平方向（0度和180度）的线条
                    // 虽然这会导致连线中间部分重叠，但能保证外侧水平线的存在，且重叠符合强场区的视觉特征
                    let angleOffset = 0;

                    for (let i = 0; i &lt; lineCount; i++) {
                        let angle = i * angleStep + angleOffset;
                        
                        // 特殊处理：如果是同种电荷，去掉连线方向的电场线
                        let skipLine = false;
                        
                        // 1. 检查是否指向其他同种电荷
                        for (let other of state.charges) {
                            if (c === other) continue;
                            if (c.type === other.type) { // 同种电荷
                                let dx = other.x - c.x;
                                let dy = other.y - c.y;
                                let targetAngle = Math.atan2(dy, dx);
                                
                                let diff = angle - targetAngle;
                                while (diff &lt;= -Math.PI) diff += 2*Math.PI;
                                while (diff &gt; Math.PI) diff -= 2*Math.PI;
                                
                                if (Math.abs(diff) &lt; 0.1) {
                                    skipLine = true;
                                    break;
                                }
                            }
                        }
                        
                        // 2. 检查是否指向几何中心（仅当全为同种电荷且数量&gt;2时，如正三角形中心）
                        if (!skipLine &amp;&amp; isAllSameType &amp;&amp; state.charges.length &gt; 2) {
                            let dx = centerX - c.x;
                            let dy = centerY - c.y;
                            let targetAngle = Math.atan2(dy, dx);
                            
                            let diff = angle - targetAngle;
                            while (diff &lt;= -Math.PI) diff += 2*Math.PI;
                            while (diff &gt; Math.PI) diff -= 2*Math.PI;
                            
                            if (Math.abs(diff) &lt; 0.1) {
                                skipLine = true;
                            }
                        }

                        if (skipLine) continue;

                        let x = c.x + startRadius * p.cos(angle);
                        let y = c.y + startRadius * p.sin(angle);
                        
                        let path = [];
                        path.push({x, y});

                        let cx = x;
                        let cy = y;
                        
                        for (let step = 0; step &lt; maxSteps; step++) {
                            let Ex = 0, Ey = 0;
                            let tooClose = false;

                            for (let other of state.charges) {
                                let dx = cx - other.x;
                                let dy = cy - other.y;
                                let r2 = dx*dx + dy*dy;
                                let r = Math.sqrt(r2);

                                if (r &lt; 20) {
                                    tooClose = true;
                                    break;
                                }

                                let k = 5000; 
                                let E_mag = k * (other.q * other.type) / (r2 * r);
                                Ex += E_mag * dx;
                                Ey += E_mag * dy;
                            }

                            if (tooClose) break;

                            let E_len = Math.sqrt(Ex*Ex + Ey*Ey);
                            if (E_len &lt; 0.01) break;

                            cx += (Ex / E_len) * stepSize * traceDir;
                            cy += (Ey / E_len) * stepSize * traceDir;

                            if (cx &lt; -50 || cx &gt; p.width + 50 || cy &lt; -50 || cy &gt; p.height + 50) break;

                            path.push({x: cx, y: cy});
                        }

                        // 绘制线条
                        p.beginShape();
                        for (let pt of path) {
                            p.vertex(pt.x, pt.y);
                        }
                        p.endShape();

                        // 绘制箭头
                        if (path.length &gt; 40) {
                            // 在线条中间画箭头
                            let arrowIndex = Math.floor(path.length / 2);
                            if (arrowIndex &lt; path.length - 1) {
                                let p1 = path[arrowIndex];
                                let p2 = path[arrowIndex + 1];
                                drawArrow(p1, p2, traceDir);
                            }
                        }
                    }
                });
            }

            // 绘制箭头辅助函数
            function drawArrow(p1, p2, traceDir) {
                let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                // 如果是逆向追踪（从负电荷出发），绘制的线条方向是反的，所以箭头要反过来指向&ldquo;顺流&rdquo;方向
                // traceDir = 1 (正电荷发出) -&gt; 箭头同向
                // traceDir = -1 (负电荷发出) -&gt; 箭头反向
                if (traceDir === -1) angle += Math.PI;
                
                p.push();
                p.translate(p1.x, p1.y);
                p.rotate(angle);
                p.fill(80, 80, 80, 150);
                p.noStroke();
                p.triangle(-4, -3, 4, 0, -4, 3);
                p.pop();
            }

            function drawCharges() {
                p.noStroke();
                p.textAlign(p.CENTER, p.CENTER);
                p.textSize(16);
                p.textStyle(p.BOLD);

                state.charges.forEach((c, index) =&gt; {
                    // 阴影
                    p.fill(0, 0, 0, 20);
                    p.ellipse(c.x + 2, c.y + 2, 40, 40);

                    // 电荷本体
                    if (c.type &gt; 0) {
                        p.fill(239, 68, 68); // Red for positive
                    } else {
                        p.fill(59, 130, 246); // Blue for negative
                    }
                    p.ellipse(c.x, c.y, 40, 40);

                    // 符号
                    p.fill(255);
                    p.text(c.type &gt; 0 ? '+' : '-', c.x, c.y);
                    
                    // 编号（可选，为了对应右侧控制）
                    p.fill(100);
                    p.textSize(10);
                    p.noStroke();
                    // p.text(index + 1, c.x + 25, c.y + 25);
                });
            }

            // 暴露给外部的重置函数
            p.resetChargesInternal = (count) =&gt; {
                state.charges = [];
                const centerX = p.width / 2;
                const centerY = p.height / 2;
                const spacing = 150;

                for (let i = 0; i &lt; count; i++) {
                    // 简单的排列逻辑：在中心周围分布
                    let x = centerX + (i - (count-1)/2) * spacing;
                    let y = centerY;
                    
                    // 默认配置：交替电性，电量1
                    let type = (i % 2 === 0) ? 1 : -1;
                    state.charges.push({ 
                        x: x, 
                        y: y, 
                        q: 1, 
                        type: type 
                    });
                }
                updateControlPanel();
            };
        };

        // 启动 p5
        new p5(sketch);

        // 辅助函数：重置电荷（通过调用 p5 实例的方法或直接修改 state 如果 p5 还没准备好）
        function resetCharges(count) {
            const container = document.getElementById('canvas-wrapper');
            // 获取当前画布尺寸，如果未加载则使用默认值
            const width = container ? container.clientWidth : 800;
            const height = container ? container.clientHeight : 600;
            const centerX = width / 2;
            const centerY = height / 2;
            
            state.charges = [];
            // 动态计算半径，基于屏幕较小边的一半的0.6倍，保证在屏幕内
            const radius = Math.min(width, height) * 0.3;

            if (count === 1) {
                // 1个电荷：居中
                state.charges.push({ x: centerX, y: centerY, q: 1, type: 1 });
            } else if (count === 2) {
                // 2个电荷：左右对称，模拟教材常见偶极子布局
                // 距离适中，方便观察中间的电场线
                const dist = Math.min(width, height) * 0.25;
                state.charges.push({ x: centerX - dist, y: centerY, q: 1, type: 1 });
                state.charges.push({ x: centerX + dist, y: centerY, q: 1, type: -1 });
            } else {
                // 3-6个电荷：正多边形分布
                for (let i = 0; i &lt; count; i++) {
                    // 从正上方开始 (-PI/2)
                    let angle = -Math.PI / 2 + (i * 2 * Math.PI / count);
                    let x = centerX + radius * Math.cos(angle);
                    let y = centerY + radius * Math.sin(angle);
                    
                    // 默认交替电性，创造更有趣的场
                    let type = (i % 2 === 0) ? 1 : -1;
                    state.charges.push({ x, y, q: 1, type });
                }
            }
            updateControlPanel();
        }

        // 更新右侧控制面板
        function updateControlPanel() {
            const list = document.getElementById('charges-list');
            list.innerHTML = '';

            state.charges.forEach((charge, index) =&gt; {
                const item = document.createElement('div');
                item.className = 'bg-gray-50 rounded-lg p-4 border border-gray-200';
                item.innerHTML = `
                    &lt;div class=&quot;flex justify-between items-center mb-3&quot;&gt;
                        &lt;span class=&quot;font-bold text-gray-700&quot;&gt;电荷 ${index + 1}&lt;/span&gt;
                        &lt;div class=&quot;flex bg-white rounded-md shadow-sm border border-gray-200 overflow-hidden&quot;&gt;
                            &lt;button onclick=&quot;updateChargeType(${index}, 1)&quot; 
                                class=&quot;px-3 py-1 text-sm ${charge.type &gt; 0 ? 'bg-red-500 text-white' : 'text-gray-600 hover:bg-gray-50'}&quot;&gt;
                                + 正
                            &lt;/button&gt;
                            &lt;div class=&quot;w-px bg-gray-200&quot;&gt;&lt;/div&gt;
                            &lt;button onclick=&quot;updateChargeType(${index}, -1)&quot; 
                                class=&quot;px-3 py-1 text-sm ${charge.type &lt; 0 ? 'bg-blue-500 text-white' : 'text-gray-600 hover:bg-gray-50'}&quot;&gt;
                                - 负
                            &lt;/button&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;div&gt;
                        &lt;div class=&quot;flex justify-between text-xs text-gray-500 mb-1&quot;&gt;
                            &lt;span&gt;电量大小&lt;/span&gt;
                            &lt;span id=&quot;q-val-${index}&quot;&gt;${charge.q}&lt;/span&gt;
                        &lt;/div&gt;
                        &lt;input type=&quot;range&quot; min=&quot;1&quot; max=&quot;5&quot; step=&quot;1&quot; value=&quot;${charge.q}&quot; 
                            oninput=&quot;updateChargeQ(${index}, this.value)&quot;
                            class=&quot;w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer slider-thumb&quot;&gt;
                    &lt;/div&gt;
                `;
                list.appendChild(item);
            });
        }

        // UI 事件处理函数
        window.updateChargeType = (index, type) =&gt; {
            if (state.charges[index]) {
                state.charges[index].type = type;
                updateControlPanel(); // 刷新按钮状态
            }
        };

        window.updateChargeQ = (index, val) =&gt; {
            if (state.charges[index]) {
                state.charges[index].q = parseInt(val);
                document.getElementById(`q-val-${index}`).innerText = val;
            }
        };

        // 监听显示控制
        document.getElementById('toggle-field').addEventListener('change', (e) =&gt; {
            state.showField = e.target.checked;
        });
        document.getElementById('toggle-potential').addEventListener('change', (e) =&gt; {
            state.showPotential = e.target.checked;
        });

        // 监听数量滑块
        const countSlider = document.getElementById('charge-count-slider');
        const countDisplay = document.getElementById('charge-count-display');
        
        countSlider.addEventListener('input', (e) =&gt; {
            const val = parseInt(e.target.value);
            countDisplay.innerText = val;
            state.count = val;
            resetCharges(val);
        });

        // 初始化
        // 注意：p5 setup 会覆盖这里的初始 reset，但为了 UI 先显示出来，先执行一次
        // 实际 p5 加载稍慢，所以 p5.setup 里的 reset 才是最终生效的
        // 这里仅为了初始化 UI 结构
        // resetCharges(2);

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
