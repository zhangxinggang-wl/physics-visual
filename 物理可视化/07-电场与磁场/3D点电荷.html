<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 多点电荷电场模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 300px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 100;
        }
        .charge-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        input[type="range"] { width: 100%; accent-color: #6366f1; }
        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="ui-panel" id="ui">
        <h1 class="text-lg font-bold mb-4 border-b border-white/20 pb-2 text-indigo-400">3D 电场实验室</h1>
        
        <div class="mb-6">
            <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">电荷总数</label>
            <input type="range" id="chargeCount" min="1" max="6" value="2">
            <div class="flex justify-between text-xs mt-1 text-indigo-300">
                <span>1</span><span id="countVal">2</span><span>6</span>
            </div>
        </div>

        <div id="controlsContainer">
            <!-- 动态生成电荷控制 -->
        </div>

        <button onclick="resetCamera()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 rounded font-bold text-xs uppercase transition mt-4">重置视角</button>
    </div>

    <div class="hint uppercase tracking-widest">鼠标左键旋转 | 鼠标右键平移 | 滚轮缩放</div>

    <script>
        let scene, camera, renderer, container;
        let charges = [];
        let fieldLines = [];
        let particles = [];
        const K = 200; // 3D 常数
        
        // 初始化 Three.js
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(200, 150, 200);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(100, 200, 100);
            scene.add(pointLight);

            // 辅助网格
            const grid = new THREE.GridHelper(400, 20, 0x333333, 0x111111);
            scene.add(grid);

            window.addEventListener('resize', onWindowResize, false);
            setupControls();
            createInitialCharges(2);
            animate();
        }

        function createInitialCharges(count) {
            // 清理旧电荷
            charges.forEach(c => scene.remove(c.mesh));
            charges = [];
            const container = document.getElementById('controlsContainer');
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const polarity = (i % 2 === 0) ? 1 : -1;
                const magnitude = 1.0;
                
                // 创建 3D 球体
                const geo = new THREE.SphereGeometry(6, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: polarity > 0 ? 0xff4444 : 0x4444ff,
                    emissive: polarity > 0 ? 0x330000 : 0x000033,
                    shininess: 100
                });
                const mesh = new THREE.Mesh(geo, mat);
                
                // 随机位置
                mesh.position.set(
                    (Math.random() - 0.5) * 150,
                    (Math.random() * 80) + 10,
                    (Math.random() - 0.5) * 150
                );
                
                const chargeObj = { 
                    id: i, 
                    mesh: mesh, 
                    polarity: polarity, 
                    magnitude: magnitude 
                };
                charges.push(chargeObj);
                scene.add(mesh);
                
                addUIControl(i, polarity, magnitude);
            }
            updateFieldLines();
        }

        function addUIControl(id, pol, mag) {
            const div = document.createElement('div');
            div.className = 'charge-item';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-gray-400">电荷 #${id+1}</span>
                    <button onclick="togglePol(${id})" id="polBtn-${id}" class="px-2 py-0.5 rounded text-[9px] font-bold ${pol > 0 ? 'bg-red-600' : 'bg-blue-600'}">
                        ${pol > 0 ? '正 (+)' : '负 (-)'}
                    </button>
                </div>
                <input type="range" min="0" max="5" step="0.1" value="${mag}" oninput="updateMag(${id}, this.value)">
                <div class="text-[9px] text-right text-gray-500 mt-1">强度: <span id="magDisplay-${id}">${mag}</span></div>
            `;
            document.getElementById('controlsContainer').appendChild(div);
        }

        window.togglePol = (id) => {
            charges[id].polarity *= -1;
            const btn = document.getElementById(`polBtn-${id}`);
            const isPos = charges[id].polarity > 0;
            btn.innerText = isPos ? '正 (+)' : '负 (-)';
            btn.className = `px-2 py-0.5 rounded text-[9px] font-bold ${isPos ? 'bg-red-600' : 'bg-blue-600'}`;
            charges[id].mesh.material.color.setHex(isPos ? 0xff4444 : 0x4444ff);
            updateFieldLines();
        };

        window.updateMag = (id, val) => {
            charges[id].magnitude = parseFloat(val);
            document.getElementById(`magDisplay-${id}`).innerText = val;
            const scale = 0.5 + (val / 5);
            charges[id].mesh.scale.set(scale, scale, scale);
            updateFieldLines();
        };

        // 计算 3D 某点的场强向量
        function getFieldAt(pos) {
            let field = new THREE.Vector3(0, 0, 0);
            charges.forEach(c => {
                const q = c.polarity * c.magnitude;
                if (q === 0) return;
                const delta = new THREE.Vector3().copy(pos).sub(c.mesh.position);
                const rSq = delta.lengthSq();
                const r = Math.sqrt(rSq);
                if (r < 5) return;
                const f = (K * q) / rSq;
                field.add(delta.normalize().multiplyScalar(f));
            });
            return field;
        }

        // 更新电场线（使用点/粒子模拟流动）
        function updateFieldLines() {
            // 清理旧线
            particles.forEach(p => scene.remove(p));
            particles = [];

            charges.forEach(c => {
                if (c.magnitude === 0 || c.polarity < 0) return; // 从正电荷出发

                const numLines = Math.floor(c.magnitude * 10 + 5);
                for (let i = 0; i < numLines; i++) {
                    // 在球面上均匀分布起始点
                    const phi = Math.acos(-1 + (2 * i) / numLines);
                    const theta = Math.sqrt(numLines * Math.PI) * phi;
                    
                    const startPos = new THREE.Vector3(
                        Math.sin(phi) * Math.cos(theta),
                        Math.sin(phi) * Math.sin(theta),
                        Math.cos(phi)
                    ).multiplyScalar(8).add(c.mesh.position);

                    createTrajectory(startPos);
                }
            });
        }

        function createTrajectory(start) {
            const points = [];
            let curr = start.clone();
            for (let i = 0; i < 60; i++) {
                points.push(curr.clone());
                const f = getFieldAt(curr);
                if (f.length() < 0.1) break;
                curr.add(f.normalize().multiplyScalar(6));
                
                let hit = false;
                charges.forEach(other => {
                    if (curr.distanceTo(other.mesh.position) < 8) hit = true;
                });
                if (hit) break;
            }

            if (points.length > 1) {
                const curve = new THREE.CatmullRomCurve3(points);
                const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
                const mat = new THREE.LineBasicMaterial({ 
                    color: 0x6366f1, 
                    transparent: true, 
                    opacity: 0.4 
                });
                const line = new THREE.Line(geo, mat);
                particles.push(line);
                scene.add(line);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setupControls() {
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            document.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.offsetX - previousMousePosition.x,
                        y: e.offsetY - previousMousePosition.y
                    };

                    const deltaRotationQuaternion = new THREE.Quaternion()
                        .setFromEuler(new THREE.Euler(
                            deltaMove.y * (Math.PI / 180) * 0.5,
                            deltaMove.x * (Math.PI / 180) * 0.5,
                            0,
                            'XYZ'
                        ));

                    camera.position.applyQuaternion(deltaRotationQuaternion);
                    camera.lookAt(0, 0, 0);
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            document.addEventListener('wheel', (e) => {
                const zoomSpeed = 0.1;
                const direction = e.deltaY > 0 ? 1 : -1;
                const factor = 1 + direction * zoomSpeed;
                camera.position.multiplyScalar(factor);
            });
            
            document.getElementById('chargeCount').oninput = (e) => {
                const val = parseInt(e.target.value);
                document.getElementById('countVal').innerText = val;
                createInitialCharges(val);
            };
        }

        window.resetCamera = () => {
            camera.position.set(200, 150, 200);
            camera.lookAt(0, 0, 0);
        };

        function animate() {
            requestAnimationFrame(animate);
            
            // 电荷轻微浮动效果
            const time = Date.now() * 0.001;
            charges.forEach((c, i) => {
                c.mesh.position.y += Math.sin(time + i) * 0.1;
            });

            renderer.render(scene, camera);
        }

        window.onload = init;

    </script>
</body>
</html>
