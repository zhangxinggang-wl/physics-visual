        // 物理参数
        let kQ1 = 10;  // 电荷1电量（包含静电力常量k）

        const charge1Pos = [-3, 0];  // 电荷1位置 (x, y)
        const charge2Pos = [3, 0];   // 电荷2位置
        const minDistance = 0.5;     // 最小距离（避免除以零）
        const coordinateRange = 10;  // 坐标范围
        
        // 图表样式参数
        let chartStyle = {
            particleDensity: 64,
            particleSize: 3,
            particleSpeed: 10,
            particleTrail: 30,
            gridPrecision: 0.3,
            wireframeOpacity: 0.1
        };
        
        // 初始视角参数
        const defaultViewControl = {

            beta: 45,

        let currentViewControl = { ...defaultViewControl };

        });

        });

        potentialChart.on('georoam', function(params) {
            if (params.mode === 'rotate' || params.mode === 'scale') {
                const option = potentialChart.getOption();
                if (option.grid3D && option.grid3D[0] && option.grid3D[0].viewControl) {
                    currentViewControl = { ...option.grid3D[0].viewControl };
                }
            }
        });
        
        // 电势计算函数
        function calculatePotential(x, y) {
            const r1 = Math.hypot(x - charge1Pos[0], y - charge1Pos[1]);
            const r2 = Math.hypot(x - charge2Pos[0], y - charge2Pos[1]);
            const safeR1 = Math.max(r1, minDistance);
            const safeR2 = Math.max(r2, minDistance);
            const potential = (kQ1 / safeR1) + (kQ2 / safeR2);
            return Math.max(Math.min(potential, 30), -30);
        }
        
        // 场强计算函数（返回x和y方向的分量）
        function calculateField(x, y) {
            // 计算电荷1产生的场强分量
            const dx1 = x - charge1Pos[0];
            const dy1 = y - charge1Pos[1];
            const r1 = Math.hypot(dx1, dy1);
            const safeR1 = Math.max(r1, minDistance);
            const r1Cube = safeR1 * safeR1 * safeR1; // r^3用于场强计算
            const E1x = kQ1 * dx1 / r1Cube;
            const E1y = kQ1 * dy1 / r1Cube;
            
            // 计算电荷2产生的场强分量
            const dx2 = x - charge2Pos[0];
            const dy2 = y - charge2Pos[1];
            const r2 = Math.hypot(dx2, dy2);
            const safeR2 = Math.max(r2, minDistance);
            const r2Cube = safeR2 * safeR2 * safeR2;
            const E2x = kQ2 * dx2 / r2Cube;
            const E2y = kQ2 * dy2 / r2Cube;
            
            // 场强叠加
            const Ex = E1x + E2x;
            const Ey = E1y + E2y;
            const magnitude = Math.hypot(Ex, Ey);
            
            return { Ex, Ey, magnitude };
        }
        
        // 生成场强数据
        function generateFieldData() {
            const data = [];
            let maxMag = 0;
            
            // 生成网格点数据
            for (let i = -coordinateRange; i <= coordinateRange; i += 0.8) {
                for (let j = -coordinateRange; j <= coordinateRange; j += 0.8) {
                    const { Ex, Ey, magnitude } = calculateField(i, j);
                    maxMag = Math.max(maxMag, magnitude);
                    data.push([i, j, Ex, Ey, magnitude]);
                }
            }
            
            // 归一化处理
            return data.map(item => {
                const [x, y, Ex, Ey, mag] = item;
                const scale = mag > 0 ? 1.5 / maxMag : 0; // 缩放场强向量
                return [x, y, Ex * scale, Ey * scale, mag];
            });
        }

                                    : (kQ2 >= 0 ? '#ff3333' : '#3366ff');
                            }
                        },
                        label: { 
                            show: true, 
                            formatter: '{b}',
                            color: '#333'
                        }
                    }
                ]
            };
            
            potentialChart.setOption(option);
        }
        
        // 更新场强图表
        function updateFieldChart() {

            } finally {
                // 移除加载指示器
                document.querySelector('#fieldChart .loading-indicator')?.remove();
                isCalculatingField = false;
            }
        }
        
        // 更新所有图表 - 先更新电势图，延迟更新场强图
        function updateCharts() {
            // 立即更新电势图表
            updatePotentialChart();
            
            // 延迟更新场强图表，避免阻塞UI
            setTimeout(() => {
                updateFieldChart();
            }, 100);
        }
        
        // 初始渲染 - 先显示电势图，再计算场强图
        updatePotentialChart();
        // 给电势图一点渲染时间，再开始计算场强
        setTimeout(() => {
            updateFieldChart();
        }, 300);
        
        // 窗口大小变化时重绘
        window.addEventListener('resize', function() {
            potentialChart.resize();
            fieldChart.resize();
        });
    </script>


</body></html>
