<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光的全反射动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #2a3a7c, #3a4a8c);
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .animation-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }
        
        label {
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4cc9f0;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .value-display {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        
        .info-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .info-panel h3 {
            margin-bottom: 10px;
            color: #4cc9f0;
        }
        
        .info-panel p {
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .formula {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 10px 0;
        }
        
        .critical-angle {
            color: #ff9e00;
            font-weight: bold;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #4cc9f0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            background: #3ab0d6;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .reset-btn {
            background: #f04c4c;
        }
        
        .reset-btn:hover {
            background: #d63a3a;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .animation-container {
                height: 300px;
            }
            
            .control-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>光的全反射现象</h1>
        <p class="subtitle">探索光线从光密介质进入光疏介质时的传播行为</p>
        
        <div class="animation-container">
            <canvas id="reflectionCanvas"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="angle">入射角 (度):</label>
                <input type="range" id="angle" min="0" max="90" value="30">
                <div class="value-display">
                    <span>0°</span>
                    <span id="angle-value">30°</span>
                    <span>90°</span>
                </div>
            </div>
            
            <div class="control-group">
                <label for="n1">光密介质折射率 (n₁):</label>
                <input type="range" id="n1" min="12" max="20" value="15" step="0.1">
                <div class="value-display">
                    <span>1.2</span>
                    <span id="n1-value">1.5</span>
                    <span>2.0</span>
                </div>
            </div>
            
            <div class="control-group">
                <label for="n2">光疏介质折射率 (n₂):</label>
                <input type="range" id="n2" min="10" max="15" value="10" step="0.1">
                <div class="value-display">
                    <span>1.0</span>
                    <span id="n2-value">1.0</span>
                    <span>1.5</span>
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button id="play-btn">播放动画</button>
            <button id="pause-btn">暂停</button>
            <button id="reset-btn" class="reset-btn">重置</button>
        </div>
        
        <div class="info-panel">
            <h3>全反射原理</h3>
            <p>当光线从光密介质（折射率 n₁）射向光疏介质（折射率 n₂）时，如果入射角大于临界角，则会发生全反射现象。</p>
            
            <div class="formula">
                临界角 θc = arcsin(n₂/n₁)
            </div>
            
            <p>当前临界角: <span id="critical-angle-value" class="critical-angle">41.81°</span></p>
            <p id="reflection-status">当前状态: 部分反射，部分折射</p>
        </div>
    </div>

    <script>
        // 获取Canvas和上下文
        const canvas = document.getElementById('reflectionCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置Canvas尺寸
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            draw();
        }
        
        // 初始化变量
        let angle = 30; // 入射角（度）
        let n1 = 1.5;  // 光密介质折射率
        let n2 = 1.0;  // 光疏介质折射率
        let criticalAngle = 0; // 临界角
        let animationId = null;
        let isAnimating = false;
        let time = 0;
        
        // 获取DOM元素
        const angleSlider = document.getElementById('angle');
        const n1Slider = document.getElementById('n1');
        const n2Slider = document.getElementById('n2');
        const angleValue = document.getElementById('angle-value');
        const n1Value = document.getElementById('n1-value');
        const n2Value = document.getElementById('n2-value');
        const criticalAngleValue = document.getElementById('critical-angle-value');
        const reflectionStatus = document.getElementById('reflection-status');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        // 计算临界角
        function calculateCriticalAngle() {
            if (n1 <= n2) {
                criticalAngle = 90; // 不会发生全反射
            } else {
                criticalAngle = Math.asin(n2 / n1) * 180 / Math.PI;
            }
            criticalAngleValue.textContent = criticalAngle.toFixed(2) + '°';
            updateReflectionStatus();
        }
        
        // 更新反射状态
        function updateReflectionStatus() {
            if (n1 <= n2) {
                reflectionStatus.textContent = "当前状态: 不会发生全反射 (n₁ ≤ n₂)";
            } else if (angle < criticalAngle) {
                reflectionStatus.textContent = "当前状态: 部分反射，部分折射";
            } else if (angle === criticalAngle) {
                reflectionStatus.textContent = "当前状态: 临界状态 (折射角为90°)";
            } else {
                reflectionStatus.textContent = "当前状态: 全反射";
            }
        }
        
        // 绘制函数
        function draw() {
            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;
            const interfaceY = centerY;
            
            // 清空画布
            ctx.clearRect(0, 0, width, height);
            
            // 绘制两种介质
            // 光密介质（下部）
            ctx.fillStyle = 'rgba(30, 60, 150, 0.6)';
            ctx.fillRect(0, interfaceY, width, height - interfaceY);
            
            // 光疏介质（上部）
            ctx.fillStyle = 'rgba(100, 150, 220, 0.4)';
            ctx.fillRect(0, 0, width, interfaceY);
            
            // 绘制界面
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, interfaceY);
            ctx.lineTo(width, interfaceY);
            ctx.stroke();
            
            // 绘制法线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(width/2, 0);
            ctx.lineTo(width/2, height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 计算光线长度
            const rayLength = Math.min(width, height) * 0.4;
            
            // 入射角（弧度）
            const incidentAngle = angle * Math.PI / 180;
            
            // 计算折射角
            let refractionAngle = 0;
            if (n1 > n2 && angle <= criticalAngle) {
                refractionAngle = Math.asin((n1 * Math.sin(incidentAngle)) / n2);
            } else {
                refractionAngle = Math.PI/2; // 全反射时折射角为90度
            }
            
            // 绘制入射光线
            ctx.strokeStyle = '#4cc9f0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(width/2, centerY);
            ctx.lineTo(
                width/2 - rayLength * Math.sin(incidentAngle),
                centerY + rayLength * Math.cos(incidentAngle)
            );
            ctx.stroke();
            
            // 绘制反射光线
            ctx.strokeStyle = '#4cc9f0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(width/2, centerY);
            ctx.lineTo(
                width/2 + rayLength * Math.sin(incidentAngle),
                centerY + rayLength * Math.cos(incidentAngle)
            );
            ctx.stroke();
            
            // 如果不是全反射，绘制折射光线
            if (n1 > n2 && angle <= criticalAngle) {
                ctx.strokeStyle = '#4cc9f0';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath();
                ctx.moveTo(width/2, centerY);
                ctx.lineTo(
                    width/2 + rayLength * Math.sin(refractionAngle),
                    centerY - rayLength * Math.cos(refractionAngle)
                );
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            // 绘制光线动画
            if (isAnimating) {
                const progress = (Math.sin(time * 0.1) + 1) / 2; // 0到1的循环
                
                // 入射光线动画
                ctx.strokeStyle = '#ff9e00';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(width/2, centerY);
                ctx.lineTo(
                    width/2 - rayLength * Math.sin(incidentAngle) * progress,
                    centerY + rayLength * Math.cos(incidentAngle) * progress
                );
                ctx.stroke();
                
                // 反射光线动画
                ctx.beginPath();
                ctx.moveTo(width/2, centerY);
                ctx.lineTo(
                    width/2 + rayLength * Math.sin(incidentAngle) * progress,
                    centerY + rayLength * Math.cos(incidentAngle) * progress
                );
                ctx.stroke();
                
                // 如果不是全反射，绘制折射光线动画
                if (n1 > n2 && angle <= criticalAngle) {
                    ctx.strokeStyle = '#ff9e00';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 3]);
                    ctx.beginPath();
                    ctx.moveTo(width/2, centerY);
                    ctx.lineTo(
                        width/2 + rayLength * Math.sin(refractionAngle) * progress,
                        centerY - rayLength * Math.cos(refractionAngle) * progress
                    );
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                time += 0.5;
            }
            
            // 绘制角度标注
            ctx.fillStyle = 'white';
            ctx.font = '14px Arial';
            
            // 入射角标注
            const labelRadius = 40;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(width/2, centerY, labelRadius, -Math.PI/2, -Math.PI/2 - incidentAngle, true);
            ctx.stroke();
            
            ctx.fillText(
                `θ = ${angle}°`, 
                width/2 - labelRadius * 0.7 * Math.sin(incidentAngle/2),
                centerY + labelRadius * 0.7 * Math.cos(incidentAngle/2)
            );
            
            // 如果不是全反射，绘制折射角标注
            if (n1 > n2 && angle <= criticalAngle) {
                ctx.beginPath();
                ctx.arc(width/2, centerY, labelRadius, -Math.PI/2, -Math.PI/2 + refractionAngle, false);
                ctx.stroke();
                
                const refractionAngleDeg = (refractionAngle * 180 / Math.PI).toFixed(1);
                ctx.fillText(
                    `θ' = ${refractionAngleDeg}°`, 
                    width/2 + labelRadius * 0.7 * Math.sin(refractionAngle/2),
                    centerY - labelRadius * 0.7 * Math.cos(refractionAngle/2)
                );
            }
            
            // 绘制介质标签
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.fillText(`光疏介质 (n₂ = ${n2})`, 20, 30);
            ctx.fillText(`光密介质 (n₁ = ${n1})`, 20, height - 20);
            
            // 绘制临界角提示
            if (n1 > n2) {
                ctx.fillStyle = '#ff9e00';
                ctx.font = '14px Arial';
                ctx.fillText(`临界角: ${criticalAngle.toFixed(2)}°`, width - 150, 30);
            }
        }
        
        // 动画循环
        function animate() {
            draw();
            animationId = requestAnimationFrame(animate);
        }
        
        // 事件监听
        angleSlider.addEventListener('input', function() {
            angle = parseInt(this.value);
            angleValue.textContent = angle + '°';
            calculateCriticalAngle();
            draw();
        });
        
        n1Slider.addEventListener('input', function() {
            n1 = parseInt(this.value) / 10;
            n1Value.textContent = n1.toFixed(1);
            calculateCriticalAngle();
            draw();
        });
        
        n2Slider.addEventListener('input', function() {
            n2 = parseInt(this.value) / 10;
            n2Value.textContent = n2.toFixed(1);
            calculateCriticalAngle();
            draw();
        });
        
        playBtn.addEventListener('click', function() {
            if (!isAnimating) {
                isAnimating = true;
                if (!animationId) {
                    animate();
                }
            }
        });
        
        pauseBtn.addEventListener('click', function() {
            isAnimating = false;
        });
        
        resetBtn.addEventListener('click', function() {
            angleSlider.value = 30;
            n1Slider.value = 15;
            n2Slider.value = 10;
            
            angle = 30;
            n1 = 1.5;
            n2 = 1.0;
            
            angleValue.textContent = '30°';
            n1Value.textContent = '1.5';
            n2Value.textContent = '1.0';
            
            calculateCriticalAngle();
            draw();
        });
        
        // 初始化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        calculateCriticalAngle();
        
        // 开始动画
        animate();
    </script>
</body>
</html>
