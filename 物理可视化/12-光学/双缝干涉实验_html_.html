<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双缝干涉实验动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e0f7fa;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 800px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #4fc3f7, #29b6f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        .experiment-area {
            flex: 1;
            min-width: 500px;
            background-color: rgba(0, 20, 40, 0.7);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(64, 224, 208, 0.2);
        }
        
        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #0a1929;
            border: 1px solid rgba(64, 224, 208, 0.3);
        }
        
        canvas {
            display: block;
        }
        
        .controls {
            flex: 0 0 300px;
            background-color: rgba(0, 20, 40, 0.7);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(64, 224, 208, 0.2);
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #4fc3f7;
            border-bottom: 1px solid rgba(79, 195, 247, 0.3);
            padding-bottom: 8px;
        }
        
        .slider-container {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .slider-value {
            float: right;
            color: #4fc3f7;
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #1a3a5f;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #29b6f6;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(to bottom, #1a6ea0, #0d4a6e);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            background: linear-gradient(to bottom, #1e7ab9, #0f567c);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .experiment-mode {
            display: flex;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(64, 224, 208, 0.3);
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background-color: #0d4a6e;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background-color: #1a6ea0;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .description {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(10, 25, 41, 0.8);
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95rem;
            border-left: 4px solid #4fc3f7;
        }
        
        .legend {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
        }
        
        .color-box {
            width: 15px;
            height: 15px;
            margin-right: 8px;
            border-radius: 3px;
        }
        
        .wave-color {
            background-color: #4fc3f7;
        }
        
        .particle-color {
            background-color: #ff7043;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
            max-width: 800px;
        }
        
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            
            .experiment-area, .controls {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>双缝干涉实验动画</h1>
        <p class="subtitle">探索光的波粒二象性 - 量子力学的核心实验</p>
    </div>
    
    <div class="container">
        <div class="experiment-area">
            <h2>实验装置</h2>
            <div class="canvas-container">
                <canvas id="experimentCanvas" width="800" height="400"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="color-box wave-color"></div>
                    <span>波动模式</span>
                </div>
                <div class="legend-item">
                    <div class="color-box particle-color"></div>
                    <span>粒子模式</span>
                </div>
            </div>
            
            <div class="experiment-mode">
                <div class="mode-btn active" id="waveMode">波动模式</div>
                <div class="mode-btn" id="particleMode">粒子模式</div>
                <div class="mode-btn" id="quantumMode">量子模式</div>
            </div>
            
            <div class="description">
                <p><strong>实验原理：</strong>当光（或电子）通过两个狭缝时，会产生干涉图样。在波动模式下，光表现为波，产生明暗相间的干涉条纹。在粒子模式下，光表现为粒子流，不产生干涉。量子模式则展示单个粒子如何通过双缝并产生干涉。</p>
            </div>
        </div>
        
        <div class="controls">
            <h2>实验控制</h2>
            
            <div class="control-group">
                <div class="slider-container">
                    <label>粒子发射速度 <span class="slider-value" id="speedValue">5</span></label>
                    <input type="range" id="speedSlider" min="1" max="10" value="5" step="1">
                </div>
                
                <div class="slider-container">
                    <label>狭缝宽度 <span class="slider-value" id="slitWidthValue">8</span></label>
                    <input type="range" id="slitWidthSlider" min="2" max="20" value="8" step="1">
                </div>
                
                <div class="slider-container">
                    <label>狭缝间距 <span class="slider-value" id="slitSpacingValue">40</span></label>
                    <input type="range" id="slitSpacingSlider" min="20" max="80" value="40" step="5">
                </div>
                
                <div class="slider-container">
                    <label>波长/粒子大小 <span class="slider-value" id="wavelengthValue">15</span></label>
                    <input type="range" id="wavelengthSlider" min="5" max="30" value="15" step="1">
                </div>
            </div>
            
            <div class="button-group">
                <button id="startBtn">开始实验</button>
                <button id="pauseBtn">暂停</button>
                <button id="resetBtn">重置</button>
            </div>
            
            <div class="control-group">
                <h2>干涉图样</h2>
                <div class="canvas-container" style="height: 150px;">
                    <canvas id="patternCanvas" width="300" height="150"></canvas>
                </div>
            </div>
            
            <div class="description">
                <p><strong>当前模式：</strong><span id="currentMode">波动模式</span></p>
                <p><strong>粒子计数：</strong><span id="particleCount">0</span></p>
                <p><strong>干涉条纹可见性：</strong><span id="interferenceVisibility">高</span></p>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>双缝干涉实验是量子力学的基础实验之一，展示了光（和微观粒子）同时具有波动性和粒子性的波粒二象性。</p>
        <p>© 2023 量子物理模拟 | 本动画为科学教育目的制作</p>
    </div>

    <script>
        // 获取Canvas元素和上下文
        const experimentCanvas = document.getElementById('experimentCanvas');
        const patternCanvas = document.getElementById('patternCanvas');
        const expCtx = experimentCanvas.getContext('2d');
        const patCtx = patternCanvas.getContext('2d');
        
        // 实验参数
        let params = {
            mode: 'wave', // 'wave', 'particle', 'quantum'
            speed: 5,
            slitWidth: 8,
            slitSpacing: 40,
            wavelength: 15,
            isRunning: false,
            particleCount: 0
        };
        
        // 实验组件尺寸和位置
        const experiment = {
            sourceX: 50,
            slitX: 300,
            screenX: 550,
            topY: 50,
            bottomY: 350,
            slitCenterY: 200
        };
        
        // 存储粒子和波的数据
        let particles = [];
        let waves = [];
        let interferencePattern = new Array(150).fill(0);
        
        // 模式按钮事件监听
        document.getElementById('waveMode').addEventListener('click', function() {
            setMode('wave');
        });
        
        document.getElementById('particleMode').addEventListener('click', function() {
            setMode('particle');
        });
        
        document.getElementById('quantumMode').addEventListener('click', function() {
            setMode('quantum');
        });
        
        // 控制按钮事件监听
        document.getElementById('startBtn').addEventListener('click', function() {
            params.isRunning = true;
        });
        
        document.getElementById('pauseBtn').addEventListener('click', function() {
            params.isRunning = false;
        });
        
        document.getElementById('resetBtn').addEventListener('click', function() {
            resetExperiment();
        });
        
        // 滑块事件监听
        document.getElementById('speedSlider').addEventListener('input', function() {
            params.speed = parseInt(this.value);
            document.getElementById('speedValue').textContent = params.speed;
        });
        
        document.getElementById('slitWidthSlider').addEventListener('input', function() {
            params.slitWidth = parseInt(this.value);
            document.getElementById('slitWidthValue').textContent = params.slitWidth;
        });
        
        document.getElementById('slitSpacingSlider').addEventListener('input', function() {
            params.slitSpacing = parseInt(this.value);
            document.getElementById('slitSpacingValue').textContent = params.slitSpacing;
        });
        
        document.getElementById('wavelengthSlider').addEventListener('input', function() {
            params.wavelength = parseInt(this.value);
            document.getElementById('wavelengthValue').textContent = params.wavelength;
        });
        
        // 设置实验模式
        function setMode(mode) {
            params.mode = mode;
            
            // 更新模式按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (mode === 'wave') {
                document.getElementById('waveMode').classList.add('active');
                document.getElementById('currentMode').textContent = '波动模式';
            } else if (mode === 'particle') {
                document.getElementById('particleMode').classList.add('active');
                document.getElementById('currentMode').textContent = '粒子模式';
            } else {
                document.getElementById('quantumMode').classList.add('active');
                document.getElementById('currentMode').textContent = '量子模式';
            }
            
            resetExperiment();
        }
        
        // 重置实验
        function resetExperiment() {
            particles = [];
            waves = [];
            interferencePattern = new Array(150).fill(0);
            params.particleCount = 0;
            document.getElementById('particleCount').textContent = params.particleCount;
            
            // 重置干涉条纹可见性
            document.getElementById('interferenceVisibility').textContent = 
                params.mode === 'wave' ? '高' : (params.mode === 'particle' ? '无' : '中');
        }
        
        // 绘制实验装置
        function drawExperimentSetup() {
            expCtx.clearRect(0, 0, experimentCanvas.width, experimentCanvas.height);
            
            // 绘制光源
            expCtx.fillStyle = '#FFD700';
            expCtx.beginPath();
            expCtx.arc(experiment.sourceX, experiment.slitCenterY, 15, 0, Math.PI * 2);
            expCtx.fill();
            
            expCtx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            expCtx.beginPath();
            expCtx.arc(experiment.sourceX, experiment.slitCenterY, 25, 0, Math.PI * 2);
            expCtx.fill();
            
            // 绘制光源标签
            expCtx.fillStyle = '#FFD700';
            expCtx.font = '14px Arial';
            expCtx.fillText('光源', experiment.sourceX - 15, experiment.slitCenterY - 30);
            
            // 绘制双缝板
            expCtx.fillStyle = '#78909C';
            expCtx.fillRect(experiment.slitX - 10, experiment.topY, 20, experiment.bottomY - experiment.topY);
            
            // 绘制双缝
            const slitTopY = experiment.slitCenterY - params.slitSpacing/2 - params.slitWidth/2;
            const slitBottomY = experiment.slitCenterY + params.slitSpacing/2 - params.slitWidth/2;
            
            expCtx.fillStyle = '#0a1929';
            expCtx.fillRect(experiment.slitX - 10, slitTopY, 20, params.slitWidth);
            expCtx.fillRect(experiment.slitX - 10, slitBottomY, 20, params.slitWidth);
            
            // 绘制双缝标签
            expCtx.fillStyle = '#4FC3F7';
            expCtx.font = '14px Arial';
            expCtx.fillText('双缝板', experiment.slitX - 20, experiment.topY - 10);
            
            // 绘制屏幕
            expCtx.fillStyle = '#78909C';
            expCtx.fillRect(experiment.screenX - 5, experiment.topY, 10, experiment.bottomY - experiment.topY);
            
            // 绘制屏幕标签
            expCtx.fillStyle = '#4FC3F7';
            expCtx.fillText('探测屏幕', experiment.screenX - 25, experiment.topY - 10);
            
            // 绘制屏幕上的刻度
            expCtx.strokeStyle = '#B0BEC5';
            expCtx.lineWidth = 1;
            for (let i = 0; i < 10; i++) {
                const y = experiment.topY + i * 30;
                expCtx.beginPath();
                expCtx.moveTo(experiment.screenX - 10, y);
                expCtx.lineTo(experiment.screenX, y);
                expCtx.stroke();
            }
        }
        
        // 创建新粒子/波
        function createParticleOrWave() {
            if (!params.isRunning) return;
            
            // 限制粒子/波的数量
            if (params.mode === 'wave' && waves.length > 20) return;
            if (params.mode !== 'wave' && particles.length > 100) return;
            
            const sourceY = experiment.slitCenterY + (Math.random() - 0.5) * 60;
            
            if (params.mode === 'wave') {
                // 创建波
                waves.push({
                    x: experiment.sourceX,
                    y: sourceY,
                    radius: 5,
                    speed: params.speed,
                    amplitude: 5 + Math.random() * 5,
                    frequency: 0.05 + Math.random() * 0.05,
                    phase: Math.random() * Math.PI * 2,
                    color: '#4FC3F7',
                    passedSlit: false,
                    slit: null // 将通过哪个狭缝
                });
            } else {
                // 创建粒子
                particles.push({
                    x: experiment.sourceX,
                    y: sourceY,
                    radius: params.wavelength / 5,
                    speed: params.speed,
                    color: params.mode === 'particle' ? '#FF7043' : '#AB47BC',
                    passedSlit: false,
                    slit: null, // 将通过哪个狭缝
                    angle: 0, // 粒子方向
                    wavePhase: Math.random() * Math.PI * 2 // 量子模式的相位
                });
            }
            
            params.particleCount++;
            document.getElementById('particleCount').textContent = params.particleCount;
        }
        
        // 更新粒子/波的位置
        function updateParticlesAndWaves() {
            // 更新波
            for (let i = waves.length - 1; i >= 0; i--) {
                const wave = waves[i];
                
                // 波在通过狭缝前直线前进
                if (!wave.passedSlit && wave.x < experiment.slitX) {
                    wave.x += wave.speed;
                    
                    // 检查是否到达狭缝
                    if (wave.x >= experiment.slitX) {
                        wave.passedSlit = true;
                        
                        // 随机选择通过哪个狭缝
                        const slitTopY = experiment.slitCenterY - params.slitSpacing/2;
                        const slitBottomY = experiment.slitCenterY + params.slitSpacing/2;
                        
                        // 如果波的y坐标接近上部狭缝
                        if (Math.abs(wave.y - slitTopY) < params.slitWidth) {
                            wave.slit = 'top';
                            wave.y = slitTopY;
                        } 
                        // 如果波的y坐标接近下部狭缝
                        else if (Math.abs(wave.y - slitBottomY) < params.slitWidth) {
                            wave.slit = 'bottom';
                            wave.y = slitBottomY;
                        } 
                        // 如果波被挡住了
                        else {
                            waves.splice(i, 1);
                            continue;
                        }
                    }
                } 
                // 波通过狭缝后，以球面波形式传播
                else if (wave.passedSlit) {
                    wave.radius += wave.speed;
                    
                    // 如果波到达屏幕，记录干涉图样
                    if (wave.x + wave.radius >= experiment.screenX) {
                        // 计算波在屏幕上的位置
                        const screenY = wave.y;
                        
                        // 确保screenY在屏幕范围内
                        if (screenY >= experiment.topY && screenY <= experiment.bottomY) {
                            const patternIndex = Math.floor((screenY - experiment.topY) / (experiment.bottomY - experiment.topY) * interferencePattern.length);
                            if (patternIndex >= 0 && patternIndex < interferencePattern.length) {
                                interferencePattern[patternIndex] += wave.amplitude;
                            }
                        }
                        
                        waves.splice(i, 1);
                        continue;
                    }
                }
                
                // 更新波的相位
                wave.phase += wave.frequency;
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                
                // 粒子在通过狭缝前直线前进
                if (!particle.passedSlit && particle.x < experiment.slitX) {
                    particle.x += particle.speed;
                    
                    // 检查是否到达狭缝
                    if (particle.x >= experiment.slitX) {
                        particle.passedSlit = true;
                        
                        // 随机选择通过哪个狭缝（量子模式下概率分布）
                        const slitTopY = experiment.slitCenterY - params.slitSpacing/2;
                        const slitBottomY = experiment.slitCenterY + params.slitSpacing/2;
                        
                        // 计算到两个狭缝的距离
                        const distToTop = Math.abs(particle.y - slitTopY);
                        const distToBottom = Math.abs(particle.y - slitBottomY);
                        
                        // 如果粒子能通过上部狭缝
                        if (distToTop < params.slitWidth) {
                            // 在量子模式下，粒子以一定概率通过两个狭缝
                            if (params.mode === 'quantum' && Math.random() < 0.5) {
                                particle.slit = 'top';
                                particle.y = slitTopY;
                            } else if (params.mode === 'particle' || Math.random() < 0.5) {
                                particle.slit = 'top';
                                particle.y = slitTopY;
                            }
                        }
                        
                        // 如果粒子能通过下部狭缝
                        if (distToBottom < params.slitWidth) {
                            // 在量子模式下，粒子以一定概率通过两个狭缝
                            if (params.mode === 'quantum' && !particle.slit && Math.random() < 0.5) {
                                particle.slit = 'bottom';
                                particle.y = slitBottomY;
                            } else if ((params.mode === 'particle' || Math.random() < 0.5) && !particle.slit) {
                                particle.slit = 'bottom';
                                particle.y = slitBottomY;
                            }
                        }
                        
                        // 如果粒子被挡住了
                        if (!particle.slit) {
                            particles.splice(i, 1);
                            continue;
                        }
                        
                        // 粒子通过狭缝后获得随机偏转角度
                        particle.angle = (Math.random() - 0.5) * 0.5;
                        
                        // 在量子模式下，角度与相位有关
                        if (params.mode === 'quantum') {
                            particle.angle = Math.sin(particle.wavePhase) * 0.5;
                        }
                    }
                } 
                // 粒子通过狭缝后，按角度前进
                else if (particle.passedSlit) {
                    particle.x += particle.speed;
                    particle.y += Math.tan(particle.angle) * particle.speed;
                    
                    // 如果粒子到达屏幕
                    if (particle.x >= experiment.screenX) {
                        // 确保粒子在屏幕范围内
                        if (particle.y >= experiment.topY && particle.y <= experiment.bottomY) {
                            const patternIndex = Math.floor((particle.y - experiment.topY) / (experiment.bottomY - experiment.topY) * interferencePattern.length);
                            if (patternIndex >= 0 && patternIndex < interferencePattern.length) {
                                interferencePattern[patternIndex] += 1;
                            }
                        }
                        
                        particles.splice(i, 1);
                        continue;
                    }
                }
            }
        }
        
        // 绘制粒子/波
        function drawParticlesAndWaves() {
            // 绘制波
            waves.forEach(wave => {
                expCtx.strokeStyle = wave.color;
                expCtx.lineWidth = 1;
                expCtx.beginPath();
                expCtx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                expCtx.stroke();
                
                // 绘制波前
                if (wave.passedSlit) {
                    for (let r = wave.radius - 20; r > 0; r -= 20) {
                        if (r > 0) {
                            expCtx.beginPath();
                            expCtx.arc(wave.x, wave.y, r, 0, Math.PI * 2);
                            expCtx.stroke();
                        }
                    }
                }
            });
            
            // 绘制粒子
            particles.forEach(particle => {
                expCtx.fillStyle = particle.color;
                expCtx.beginPath();
                expCtx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                expCtx.fill();
                
                // 在量子模式下绘制轨迹
                if (params.mode === 'quantum') {
                    expCtx.strokeStyle = particle.color + '80';
                    expCtx.lineWidth = 0.5;
                    expCtx.beginPath();
                    expCtx.moveTo(experiment.sourceX, experiment.slitCenterY);
                    expCtx.lineTo(experiment.slitX, particle.y);
                    expCtx.lineTo(particle.x, particle.y);
                    expCtx.stroke();
                }
            });
        }
        
        // 绘制干涉图样
        function drawInterferencePattern() {
            patCtx.clearRect(0, 0, patternCanvas.width, patternCanvas.height);
            
            // 绘制背景
            patCtx.fillStyle = '#0a1929';
            patCtx.fillRect(0, 0, patternCanvas.width, patternCanvas.height);
            
            // 查找最大值用于归一化
            let maxIntensity = 0;
            for (let i = 0; i < interferencePattern.length; i++) {
                if (interferencePattern[i] > maxIntensity) {
                    maxIntensity = interferencePattern[i];
                }
            }
            
            // 绘制干涉图样
            const barWidth = patternCanvas.width / interferencePattern.length;
            
            for (let i = 0; i < interferencePattern.length; i++) {
                let intensity = interferencePattern[i];
                if (maxIntensity > 0) {
                    intensity = intensity / maxIntensity;
                }
                
                const barHeight = intensity * patternCanvas.height;
                const x = i * barWidth;
                const y = patternCanvas.height - barHeight;
                
                // 根据模式选择颜色
                let color;
                if (params.mode === 'wave') {
                    color = `rgba(79, 195, 247, ${0.5 + intensity * 0.5})`;
                } else if (params.mode === 'particle') {
                    color = `rgba(255, 112, 67, ${0.5 + intensity * 0.5})`;
                } else {
                    color = `rgba(171, 71, 188, ${0.5 + intensity * 0.5})`;
                }
                
                patCtx.fillStyle = color;
                patCtx.fillRect(x, y, barWidth, barHeight);
            }
            
            // 绘制图样标签
            patCtx.fillStyle = '#E0F7FA';
            patCtx.font = '12px Arial';
            patCtx.fillText('干涉图样', 10, 20);
            
            // 绘制坐标轴
            patCtx.strokeStyle = '#B0BEC5';
            patCtx.lineWidth = 1;
            patCtx.beginPath();
            patCtx.moveTo(0, patternCanvas.height - 1);
            patCtx.lineTo(patternCanvas.width, patternCanvas.height - 1);
            patCtx.stroke();
        }
        
        // 主动画循环
        function animate() {
            drawExperimentSetup();
            
            if (params.isRunning) {
                // 随机创建新的粒子/波
                if (Math.random() < 0.1) {
                    createParticleOrWave();
                }
                
                updateParticlesAndWaves();
            }
            
            drawParticlesAndWaves();
            drawInterferencePattern();
            
            requestAnimationFrame(animate);
        }
        
        // 初始化
        function init() {
            resetExperiment();
            animate();
            
            // 初始创建一些粒子/波
            for (let i = 0; i < 5; i++) {
                createParticleOrWave();
            }
        }
        
        // 启动动画
        init();
    </script>
</body>
</html>
